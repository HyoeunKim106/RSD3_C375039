<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Image Map</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    .layer {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .layer img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #bg-layer {
      z-index: 1;
    }

    #reveal-layer {
      z-index: 2;
      -webkit-mask-image: radial-gradient(
        circle 0px at 50% 50%,
        rgba(0,0,0,1) 0%,
        rgba(0,0,0,0.3) 60%,
        rgba(0,0,0,0) 100%
      );
      mask-image: radial-gradient(
        circle 0px at 50% 50%,
        rgba(0,0,0,1) 0%,
        rgba(0,0,0,0.3) 60%,
        rgba(0,0,0,0) 100%
      );
    }

    /* ── 텍스트 캔버스 ── */
    #text-canvas {
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- ① 배경 -->
  <div id="bg-layer" class="layer">
    <img src="./assets/sample2.jpg" alt="background" />
  </div>

  <!-- ② reveal -->
  <div id="reveal-layer" class="layer">
    <img src="./assets/sample1.jpg" alt="reveal" />
  </div>

  <!-- ③ 텍스트 -->
  <canvas id="text-canvas"></canvas>

  <script>
    /* ═══════════════════════════════════
       PART 1: 기존 Spotlight Reveal
       ═══════════════════════════════════ */
    const reveal = document.getElementById("reveal-layer");

    let targetX = window.innerWidth / 2;
    let targetY = window.innerHeight / 2;
    let currentX = targetX;
    let currentY = targetY;

    let targetR = 0;
    let currentR = 0;
    const RADIUS = 180;
    const EASE = 0.07;
    const R_EASE = 0.06;

    document.addEventListener("mousemove", (e) => {
      targetX = e.clientX;
      targetY = e.clientY;
      targetR = RADIUS;
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    document.addEventListener("mouseleave", () => {
      targetR = 0;
    });

    document.addEventListener("mouseenter", () => {
      targetR = RADIUS;
    });

    /* ═══════════════════════════════════
       PART 2: 텍스트 모션 (꾹 누르기)
       ═══════════════════════════════════ */
    const tc = document.getElementById("text-canvas");
    const ctx = tc.getContext("2d");

    let W, H;
    function resize() {
      W = tc.width = window.innerWidth;
      H = tc.height = window.innerHeight;
    }
    resize();
    window.addEventListener("resize", resize);

    const TEXT = "사과의 시각적 표상은 없지만, 벡터가 포함된 완벽한 3D 모델을 가지고 있어요.";
    const CYAN = "#00f0ff";
    const MAROON = "rgba(120, 10, 20, 0.85)";

    let mouseX = W / 2;
    let mouseY = H / 2;
    let isHolding = false;
    let spawnTimer = 0;
    let spawnIndex = 0;
    const chars = [];

    /* ── 사과 형상 포인트 생성 ── */
    function getApplePoint(angle) {
      // 사과 형상의 극좌표 (cardioid 변형)
      const r = 110;
      let x, y;

      // 사과 모양: 위쪽 움푹, 아래 둥근
      const t = angle;
      x = r * Math.sin(t);
      y = -r * (Math.cos(t) + 0.3 * Math.cos(2 * t)) * 0.85;
      y += 10; // 살짝 아래로

      return { x, y };
    }

    /* ── 글자 클래스 ── */
    class Char {
      constructor(char, mx, my) {
        this.char = char;
        this.life = 1.0;
        this.alive = true;
        this.fontSize = 14 + Math.random() * 6;

        // 사과 형상 위의 목표 위치
        const angle = Math.random() * Math.PI * 2;
        const apple = getApplePoint(angle);
        const scale = Math.min(W, H) / 500;

        this.goalX = mx + apple.x * scale;
        this.goalY = my + apple.y * scale;

        // 마우스 근처에서 시작
        this.x = mx + (Math.random() - 0.5) * 40;
        this.y = my + (Math.random() - 0.5) * 40;
        this.z = (Math.random() - 0.5) * 150;

        // 목표로 향하는 속도
        this.vx = 0;
        this.vy = 0;
        this.vz = (Math.random() - 0.5) * 1.5;

        // 미세 떨림
        this.wobblePhase = Math.random() * Math.PI * 2;
        this.wobbleSpeed = 1.5 + Math.random() * 2;
        this.wobbleAmp = 2 + Math.random() * 4;

        this.arrived = false;
        this.arriveTime = 0;
      }

      update(time) {
        if (isHolding) {
          // 목표(사과 형상 위)를 향해 부드럽게 이동
          const dx = this.goalX - this.x;
          const dy = this.goalY - this.y;
          this.vx += dx * 0.02;
          this.vy += dy * 0.02;
          this.vx *= 0.92;
          this.vy *= 0.92;

          this.x += this.vx;
          this.y += this.vy;

          // z축 미세 움직임
          this.z += this.vz;
          this.vz *= 0.98;
          if (Math.abs(this.z) > 80) this.vz *= -0.6;
          this.vz += (Math.random() - 0.5) * 0.3;

          // 도착 판정
          if (Math.abs(dx) < 5 && Math.abs(dy) < 5) {
            if (!this.arrived) {
              this.arrived = true;
              this.arriveTime = time;
            }
          }

          this.life = Math.min(1.0, this.life + 0.03);
        } else {
          // 놓으면 흩어지며 사라짐
          this.life -= 0.015;
          this.vy += 0.12;
          this.vx += (Math.random() - 0.5) * 0.5;
          this.x += this.vx;
          this.y += this.vy;
          if (this.life <= 0) this.alive = false;
        }
      }

      draw(time) {
        if (!this.alive || this.life <= 0) return;

        // z축 perspective
        const persp = 500;
        const projScale = persp / (persp + this.z);
        const sx = this.x + (this.x - W / 2) * (projScale - 1) * 0.3;
        const sy = this.y + (this.y - H / 2) * (projScale - 1) * 0.3;

        // 도착 후 미세 떨림
        let wx = 0, wy = 0;
        if (this.arrived) {
          wx = Math.sin(time * this.wobbleSpeed + this.wobblePhase) * this.wobbleAmp;
          wy = Math.cos(time * this.wobbleSpeed * 0.8 + this.wobblePhase) * this.wobbleAmp * 0.7;
        }

        const finalX = sx + wx;
        const finalY = sy + wy;
        const size = this.fontSize * projScale;
        const alpha = this.life * Math.max(0.3, projScale);

        ctx.save();

        // 박스
        ctx.font = `300 ${size}px 'Noto Serif KR', serif`;
        const charW = ctx.measureText(this.char).width;
        const padX = 3;
        const padY = 2;

        ctx.fillStyle = MAROON.replace("0.85", (alpha * 0.8).toFixed(2));
        ctx.fillRect(
          finalX - padX,
          finalY - size * 0.75 - padY,
          charW + padX * 2,
          size + padY * 2
        );

        // 글자
        ctx.fillStyle = CYAN;
        ctx.globalAlpha = alpha;
        ctx.font = `300 ${size}px 'Noto Serif KR', serif`;
        ctx.textBaseline = "middle";
        ctx.fillText(this.char, finalX, finalY - size * 0.22);

        ctx.restore();
      }
    }

    /* ── 마우스 이벤트 ── */
    document.addEventListener("mousedown", () => {
      isHolding = true;
      spawnTimer = 0;
    });
    document.addEventListener("mouseup", () => { isHolding = false; });
    document.addEventListener("touchstart", (e) => {
      e.preventDefault();
      isHolding = true;
      spawnTimer = 0;
      mouseX = e.touches[0].clientX;
      mouseY = e.touches[0].clientY;
    });
    document.addEventListener("touchmove", (e) => {
      mouseX = e.touches[0].clientX;
      mouseY = e.touches[0].clientY;
    });
    document.addEventListener("touchend", () => { isHolding = false; });

    /* ═══════════════════════════════════
       메인 애니메이션 루프
       ═══════════════════════════════════ */
    let time = 0;

    function animate() {
      time += 0.016;

      // ── spotlight ──
      currentX += (targetX - currentX) * EASE;
      currentY += (targetY - currentY) * EASE;
      currentR += (targetR - currentR) * R_EASE;

      const mask = `radial-gradient(
        circle ${currentR}px at ${currentX}px ${currentY}px,
        rgba(0,0,0,1) 0%,
        rgba(0,0,0,0.6) 50%,
        rgba(0,0,0,0) 100%
      )`;
      reveal.style.webkitMaskImage = mask;
      reveal.style.maskImage = mask;

      // ── 텍스트 ──
      ctx.clearRect(0, 0, W, H);

      // 클릭 중이면 글자 스폰
      if (isHolding) {
        spawnTimer += 0.016;
        while (spawnTimer > 0.05) {
          chars.push(new Char(TEXT[spawnIndex % TEXT.length], mouseX, mouseY));
          spawnIndex++;
          spawnTimer -= 0.05;
        }
      }

      // z 정렬 후 그리기
      chars.sort((a, b) => b.z - a.z);

      for (let i = chars.length - 1; i >= 0; i--) {
        chars[i].update(time);
        chars[i].draw(time);
        if (!chars[i].alive) chars.splice(i, 1);
      }

      // 너무 많으면 오래된 것 제거
      while (chars.length > 300) {
        chars.shift();
      }

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
