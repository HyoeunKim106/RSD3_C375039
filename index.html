<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Image Map</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden; background: #000;
    }
    .layer {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
    }
    .layer img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    #bg-layer { z-index: 1; }
    #reveal-layer {
      z-index: 2;
      -webkit-mask-image: radial-gradient(circle 0px at 50% 50%, rgba(0,0,0,1) 0%, rgba(0,0,0,0.3) 60%, rgba(0,0,0,0) 100%);
      mask-image: radial-gradient(circle 0px at 50% 50%, rgba(0,0,0,1) 0%, rgba(0,0,0,0.3) 60%, rgba(0,0,0,0) 100%);
    }
    #text-canvas {
      position: fixed; inset: 0;
      z-index: 3;
    }
  </style>
</head>
<body>

  <div id="bg-layer" class="layer">
    <img src="./assets/sample2.jpg" alt="background" />
  </div>

  <div id="reveal-layer" class="layer">
    <img src="./assets/sample1.jpg" alt="reveal" />
  </div>

  <canvas id="text-canvas"></canvas>

  <script>
    /* ═══════════ PART 1: Spotlight ═══════════ */
    const reveal = document.getElementById("reveal-layer");
    let targetX = window.innerWidth / 2, targetY = window.innerHeight / 2;
    let currentX = targetX, currentY = targetY;
    let targetR = 0, currentR = 0;
    const RADIUS = 180, EASE = 0.07, R_EASE = 0.06;

    /* ═══════════ PART 2: 3D 사과 텍스트 ═══════════ */
    const tc = document.getElementById("text-canvas");
    const ctx = tc.getContext("2d");
    let W, H;
    function resize() { W = tc.width = window.innerWidth; H = tc.height = window.innerHeight; }
    resize();
    window.addEventListener("resize", resize);

    const TEXT = "사과의 시각적 표상은 없지만, 벡터가 포함된 완벽한 3D 모델을 가지고 있어요.";
    const CYAN = "#00f0ff";

    let mouseX = W / 2, mouseY = H / 2;
    let isHolding = false;
    let holdAlpha = 0;        // 누르는 동안 서서히 나타남
    let rotY = 0;             // y축 자동 회전
    let morphTo = 0;          // 0 = 사과, 1 = 다른 도형
    let currentShape = 0;     // 놓을 때 랜덤 도형

    /* ── 3D 사과 표면 점 생성 ── */
    // 사과 형상: 회전체 (revolution surface)
    // 세로 v: 0~PI (위→아래), 가로 u: 0~2PI (둘레)
    function appleR(v) {
      // v=0 꼭대기, v=PI 바닥
      // 실제 사과 단면 프로파일
      const t = v / Math.PI; // 0~1

      // 기본 반지름
      let r = Math.sin(v) * 100;

      // 위쪽 움푹 들어감
      if (t < 0.25) {
        r *= 0.6 + 0.4 * (t / 0.25);
        r *= 1.0 - Math.pow(1.0 - t / 0.25, 2) * 0.4;
      }

      // 가장 넓은 부분을 약간 아래로
      r *= 1.0 + 0.15 * Math.sin(v * 0.85);

      // 아래쪽 살짝 좁게
      if (t > 0.8) {
        r *= 1.0 - (t - 0.8) / 0.2 * 0.25;
      }

      return r;
    }

    function appleY(v) {
      return -Math.cos(v) * 110;
    }

    // 텍스트 줄 배치: 사과 표면에 가로 띠처럼 감김
    const LINES = 14;           // 세로 줄 수
    const textLines = [];

    for (let i = 0; i < LINES; i++) {
      const v = (i + 1) / (LINES + 1) * Math.PI;  // 위~아래 분포
      const r = appleR(v);
      const y3d = appleY(v);

      textLines.push({
        v: v,
        r: r,           // 이 높이에서의 반지름
        y3d: y3d,        // 3D y좌표
        uOffset: i * 0.4 // 각 줄마다 다른 시작 각도
      });
    }

    /* ── 도형 변환: 구, 큐브, 원기둥 ── */
    function spherePos(v, u, r) {
      return {
        x: Math.sin(v) * Math.cos(u) * r,
        y: -Math.cos(v) * r,
        z: Math.sin(v) * Math.sin(u) * r
      };
    }

    function cubePos(v, u, size) {
      const t = v / Math.PI;       // 0~1 세로
      const y = (t - 0.5) * size * 2;
      const face = u / (Math.PI * 2); // 0~1 둘레
      let x, z;
      const s = size;
      if (face < 0.25) {
        x = s; z = (face / 0.25 - 0.5) * 2 * s;
      } else if (face < 0.5) {
        z = s; x = -(((face - 0.25) / 0.25) - 0.5) * 2 * s;
      } else if (face < 0.75) {
        x = -s; z = -(((face - 0.5) / 0.25) - 0.5) * 2 * s;
      } else {
        z = -s; x = (((face - 0.75) / 0.25) - 0.5) * 2 * s;
      }
      return { x, y, z };
    }

    /* ── 3D → 2D 투영 ── */
    function project(x3d, y3d, z3d, cx, cy, roty) {
      // Y축 회전
      const cosR = Math.cos(roty);
      const sinR = Math.sin(roty);
      const rx = x3d * cosR - z3d * sinR;
      const rz = x3d * sinR + z3d * cosR;
      const ry = y3d;

      const persp = 500;
      const scale = persp / (persp + rz);

      return {
        x: cx + rx * scale,
        y: cy + ry * scale,
        scale: scale,
        z: rz
      };
    }

    /* ── 그리기 ── */
    function drawAppleText(time) {
      const cx = mouseX;
      const cy = mouseY;

      // 줄마다 텍스트를 사과 표면에 배치
      const drawList = [];

      for (let i = 0; i < textLines.length; i++) {
        const line = textLines[i];
        const u = (time * 0.5 + line.uOffset) % (Math.PI * 2);

        // 사과 형태 3D 좌표
        const appleX = line.r * Math.cos(u);
        const appleZ = line.r * Math.sin(u);
        const appleYPos = line.y3d;

        // 도형 좌표
        let shapeX, shapeY, shapeZ;
        if (currentShape === 0) {
          const sp = spherePos(line.v, u, 100);
          shapeX = sp.x; shapeY = sp.y; shapeZ = sp.z;
        } else {
          const cp = cubePos(line.v, u, 80);
          shapeX = cp.x; shapeY = cp.y; shapeZ = cp.z;
        }

        // morph 보간
        const m = morphTo;
        const x3d = appleX * (1 - m) + shapeX * m;
        const y3d = appleYPos * (1 - m) + shapeY * m;
        const z3d = appleZ * (1 - m) + shapeZ * m;

        const proj = project(x3d, y3d, z3d, cx, cy, rotY);

        // 뒤쪽 면은 흐리게
        const facing = proj.z < 0 ? 1.0 : 0.15;

        drawList.push({
          x: proj.x,
          y: proj.y,
          scale: proj.scale,
          z: proj.z,
          facing: facing,
          lineIndex: i
        });
      }

      // z 정렬 (뒤→앞)
      drawList.sort((a, b) => b.z - a.z);

      for (const item of drawList) {
        const alpha = holdAlpha * item.facing;
        if (alpha < 0.01) continue;

        const size = (12 + item.lineIndex % 3) * item.scale;
        ctx.save();
        ctx.translate(item.x, item.y);

        ctx.font = `300 ${size}px 'Noto Serif KR', serif`;

        // 텍스트 잘라서 표시 (스케일에 맞게)
        const maxChars = Math.max(4, Math.floor(20 * item.scale));
        const startIdx = item.lineIndex * 3;
        let display = "";
        for (let c = 0; c < maxChars; c++) {
          display += TEXT[(startIdx + c) % TEXT.length];
        }

        const tw = ctx.measureText(display).width;
        const padX = 3, padY = 2;

        // scaleX로 원근 왜곡 (뒤로 갈수록 좁아짐)
        const scaleX = Math.max(0.3, item.scale);
        ctx.scale(scaleX, 1);

        // 박스
        ctx.fillStyle = `rgba(120, 10, 20, ${(alpha * 0.7).toFixed(2)})`;
        ctx.fillRect(-tw / 2 - padX, -size / 2 - padY, tw + padX * 2, size + padY * 2);

        // 글자
        ctx.globalAlpha = alpha;
        ctx.fillStyle = CYAN;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(display, 0, 0);

        ctx.restore();
      }
    }

    /* ═══════════ 이벤트 ═══════════ */
    tc.addEventListener("mousemove", (e) => {
      targetX = e.clientX; targetY = e.clientY;
      targetR = RADIUS;
      mouseX = e.clientX; mouseY = e.clientY;
    });
    tc.addEventListener("mouseleave", () => { targetR = 0; });
    tc.addEventListener("mouseenter", () => { targetR = RADIUS; });
    tc.addEventListener("mousedown", () => { isHolding = true; });
    tc.addEventListener("mouseup", () => {
      isHolding = false;
      currentShape = Math.floor(Math.random() * 2); // 구 or 큐브
    });

    tc.addEventListener("touchstart", (e) => {
      e.preventDefault(); isHolding = true;
      mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY;
      targetX = mouseX; targetY = mouseY; targetR = RADIUS;
    });
    tc.addEventListener("touchmove", (e) => {
      mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY;
      targetX = mouseX; targetY = mouseY;
    });
    tc.addEventListener("touchend", () => {
      isHolding = false;
      currentShape = Math.floor(Math.random() * 2);
    });

    /* ═══════════ 메인 루프 ═══════════ */
    let time = 0;

    function animate() {
      time += 0.016;

      // ── spotlight ──
      currentX += (targetX - currentX) * EASE;
      currentY += (targetY - currentY) * EASE;
      currentR += (targetR - currentR) * R_EASE;
      const mask = `radial-gradient(circle ${currentR}px at ${currentX}px ${currentY}px, rgba(0,0,0,1) 0%, rgba(0,0,0,0.6) 50%, rgba(0,0,0,0) 100%)`;
      reveal.style.webkitMaskImage = mask;
      reveal.style.maskImage = mask;

      // ── 3D 텍스트 ──
      ctx.clearRect(0, 0, W, H);

      // 누르면 나타남, 놓으면 사라짐
      if (isHolding) {
        holdAlpha = Math.min(1, holdAlpha + 0.025);
        morphTo = Math.max(0, morphTo - 0.02);  // 사과로
      } else {
        if (holdAlpha > 0) {
          morphTo = Math.min(1, morphTo + 0.015); // 도형으로
          // 도형 완성 후 사라짐
          if (morphTo > 0.8) {
            holdAlpha = Math.max(0, holdAlpha - 0.008);
          }
        }
      }

      // y축 자동 회전
      rotY += 0.012;

      if (holdAlpha > 0.01) {
        drawAppleText(time);
      }

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
