<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Image Map</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    .layer {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .layer img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #bg-layer {
      z-index: 1;
    }

    #reveal-layer {
      z-index: 2;
      -webkit-mask-image: radial-gradient(
        circle 0px at 50% 50%,
        rgba(0,0,0,1) 0%,
        rgba(0,0,0,0.3) 60%,
        rgba(0,0,0,0) 100%
      );
      mask-image: radial-gradient(
        circle 0px at 50% 50%,
        rgba(0,0,0,1) 0%,
        rgba(0,0,0,0.3) 60%,
        rgba(0,0,0,0) 100%
      );
    }
  </style>
</head>
<body>

  <div id="bg-layer" class="layer">
    <img src="./assets/sample2.jpg" alt="background" />
  </div>

  <div id="reveal-layer" class="layer">
    <img src="./assets/sample1.jpg" alt="reveal" />
  </div>

  <script>
    const reveal = document.getElementById("reveal-layer");

    let targetX = window.innerWidth / 2;
    let targetY = window.innerHeight / 2;
    let currentX = targetX;
    let currentY = targetY;

    let targetR = 0;
    let currentR = 0;
    const RADIUS = 180;
    const EASE = 0.07;
    const R_EASE = 0.06;

    document.addEventListener("mousemove", (e) => {
      targetX = e.clientX;
      targetY = e.clientY;
      targetR = RADIUS;
    });

    document.addEventListener("mouseleave", () => {
      targetR = 0;
    });

    document.addEventListener("mouseenter", () => {
      targetR = RADIUS;
    });

    function animate() {
      currentX += (targetX - currentX) * EASE;
      currentY += (targetY - currentY) * EASE;
      currentR += (targetR - currentR) * R_EASE;

      const mask = `radial-gradient(
        circle ${currentR}px at ${currentX}px ${currentY}px,
        rgba(0,0,0,1) 0%,
        rgba(0,0,0,0.6) 50%,
        rgba(0,0,0,0) 100%
      )`;

      reveal.style.webkitMaskImage = mask;
      reveal.style.maskImage = mask;

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
