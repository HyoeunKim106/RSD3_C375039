<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Image Map - Liquid Ripple Effect</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300&display=swap" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden; background: #000;
    }
    .layer {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
    }
    .layer img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    #bg-layer { z-index: 1; }
    
    #reveal-layer {
      z-index: 2;
      /* SVG 굴절 필터 적용 */
      filter: url('#liquid-ripple');
      -webkit-mask-image: radial-gradient(circle 0px at 50% 50%, rgba(0,0,0,1) 0%, rgba(0,0,0,0.3) 60%, rgba(0,0,0,0) 100%);
      mask-image: radial-gradient(circle 0px at 50% 50%, rgba(0,0,0,1) 0%, rgba(0,0,0,0.3) 60%, rgba(0,0,0,0) 100%);
    }
    
    #text-canvas {
      position: fixed; inset: 0;
      z-index: 3;
      /* 필터 영역의 가장자리 잘림 방지를 위해 이벤트 포인터 유지 */
      pointer-events: auto;
    }

    /* SVG 렌더링 영역에서 숨김 처리 */
    .svg-filters {
      position: absolute;
      width: 0; height: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <svg class="svg-filters">
    <defs>
      <filter id="liquid-ripple" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="3" result="noise" />
        <feDisplacementMap id="displacement" in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="G" />
      </filter>
    </defs>
  </svg>

  <div id="bg-layer" class="layer">
    <img src="./assets/sample2.jpg?v=2" alt="background" />
  </div>
  <div id="reveal-layer" class="layer">
    <img src="./assets/sample1.jpg?v=2" alt="reveal" />
  </div>
  <canvas id="text-canvas"></canvas>

  <script>
    /* ═══════ Spotlight & Filters ═══════ */
    const reveal = document.getElementById("reveal-layer");
    const displacement = document.getElementById("displacement");
    
    let targetX = window.innerWidth/2, targetY = window.innerHeight/2;
    let currentX = targetX, currentY = targetY;
    let targetR = 0, currentR = 0;
    const RADIUS = 180, EASE = 0.07, R_EASE = 0.06;

    /* ═══════ Canvas ═══════ */
    const tc = document.getElementById("text-canvas");
    const ctx = tc.getContext("2d");
    let W, H;
    function resize() { W = tc.width = window.innerWidth; H = tc.height = window.innerHeight; }
    resize();
    window.addEventListener("resize", resize);

    const TEXT = "사과의시각적표상은없지만벡터가포함된완벽한3D모델을가지고있어요";
    const CYAN = "#00f0ff";
    const LEAF_GREEN = "#4ecf4e";

    let mouseX = W/2, mouseY = H/2;
    let isHolding = false;
    let holdAlpha = 0;
    let rotY = 0;

    /* ═══════ 3D 사과 메쉬 ═══════ */
    function appleRadius(v) {
      const t = v / Math.PI;
      let r = Math.sin(v);
      if (t < 0.15) r *= 0.3 + 0.7 * (t / 0.15);
      r *= 1.0 + 0.2 * Math.sin(v * 0.9 - 0.1);
      if (t > 0.85) r *= 1.0 - (t - 0.85) / 0.15 * 0.3;
      return r * 90;
    }

    function appleY(v) { return -Math.cos(v) * 100; }

    const applePoints = [];
    const ROWS = 16, COLS = 22;
    let charIdx = 0;

    for (let row = 0; row < ROWS; row++) {
      const v = (row + 0.5) / ROWS * Math.PI;
      const r = appleRadius(v);
      const y = appleY(v);
      for (let col = 0; col < COLS; col++) {
        const u = (col / COLS) * Math.PI * 2;
        applePoints.push({
          ax: r * Math.cos(u), ay: y, az: r * Math.sin(u),
          char: TEXT[charIdx % TEXT.length], row, col
        });
        charIdx++;
      }
    }

    for (let i = 0; i < 6; i++) {
      const t = i / 5;
      applePoints.push({
        ax: Math.sin(t * 0.3) * 3, ay: -105 - t * 30, az: Math.cos(t * 0.2) * 2,
        char: "│", isStem: true, row: -1, col: i
      });
    }

    for (let i = 0; i < 18; i++) {
      const t = i / 17;
      const len = 40, wid = 14;
      const along = t * len, across = Math.sin(t * Math.PI) * wid;
      const ang = -0.6;
      applePoints.push({
        ax: along * Math.cos(ang) - across * Math.sin(ang) + 5,
        ay: -128 + along * Math.sin(ang) - across * Math.cos(ang),
        az: across * 0.3,
        char: "잎", isLeaf: true, row: -2, col: i
      });
    }

    /* ═══════ 투영 ═══════ */
    function project(x, y, z, cx, cy, ry) {
      const c = Math.cos(ry), s = Math.sin(ry);
      const rx2 = x * c - z * s, rz2 = x * s + z * c;
      const p = 500 / (500 + rz2);
      return { x: cx + rx2 * p, y: cy + y * p, s: p, z: rz2 };
    }

    /* ═══════ 부유 도형 ═══════ */
    let floatingShape = null;

    class FloatingShape {
      constructor(x, y) {
        this.x = x; this.y = y;
        this.vx = (Math.random() - 0.5) * 0.8;
        this.vy = -0.3 - Math.random() * 0.5;
        this.size = 25 + Math.random() * 35;
        this.rot = 0;
        this.rotSpeed = (Math.random() - 0.5) * 0.008;
        this.life = 1.0;
        this.alive = true;
        this.alpha = 0;
        this.type = Math.floor(Math.random() * 5);
      }

      update() {
        this.x += this.vx; this.y += this.vy; this.rot += this.rotSpeed;
        this.vx += (Math.random() - 0.5) * 0.01;
        this.vy += (Math.random() - 0.5) * 0.01;
        this.alpha = Math.min(0.5, this.alpha + 0.01);
        this.life -= 0.0015;
        if (this.life < 0.3) this.alpha = this.life / 0.3 * 0.5;
        if (this.life <= 0) this.alive = false;
      }

      draw() {
        if (!this.alive) return;
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rot);

        const a = this.alpha, s = this.size;
        ctx.strokeStyle = `rgba(0, 240, 255, ${a.toFixed(2)})`;
        ctx.lineWidth = 1;
        ctx.fillStyle = `rgba(0, 240, 255, ${(a * 0.1).toFixed(2)})`;

        switch(this.type) {
          case 0:
            ctx.beginPath(); ctx.arc(0, 0, s/2, 0, Math.PI*2);
            ctx.fill(); ctx.stroke(); break;
          case 1:
            ctx.beginPath();
            for (let i = 0; i < 3; i++) {
              const ang = i/3*Math.PI*2 - Math.PI/2;
              i===0 ? ctx.moveTo(Math.cos(ang)*s/2, Math.sin(ang)*s/2)
                    : ctx.lineTo(Math.cos(ang)*s/2, Math.sin(ang)*s/2);
            }
            ctx.closePath(); ctx.fill(); ctx.stroke(); break;
          case 2:
            ctx.fillRect(-s/2,-s/2,s,s); ctx.strokeRect(-s/2,-s/2,s,s); break;
          case 3:
            ctx.beginPath();
            ctx.moveTo(0,-s/2); ctx.lineTo(s/3,0);
            ctx.lineTo(0,s/2); ctx.lineTo(-s/3,0);
            ctx.closePath(); ctx.fill(); ctx.stroke(); break;
          case 4:
            ctx.beginPath(); ctx.arc(0,0,s/2,0,Math.PI*2); ctx.stroke();
            ctx.beginPath(); ctx.arc(0,0,s/3,0,Math.PI*2); ctx.stroke(); break;
        }
        ctx.restore();
      }
    }

    /* ═══════ 사과 그리기 ═══════ */
    function drawApple() {
      const cx = mouseX, cy = mouseY;
      const drawList = [];

      for (const pt of applePoints) {
        const proj = project(pt.ax, pt.ay, pt.az, cx, cy, rotY);
        drawList.push({
          x: proj.x, y: proj.y, s: proj.s, z: proj.z,
          facing: proj.z < 50 ? 1.0 : 0.12,
          char: pt.char, isLeaf: pt.isLeaf||false, isStem: pt.isStem||false
        });
      }

      drawList.sort((a, b) => b.z - a.z);

      for (const d of drawList) {
        const alpha = holdAlpha * d.facing;
        if (alpha < 0.02) continue;
        const size = Math.max(6, 13 * d.s);

        ctx.save();
        ctx.translate(d.x, d.y);
        ctx.font = `300 ${size}px 'Noto Serif KR', serif`;
        const cw = ctx.measureText(d.char).width;
        const padX = 2, padY = 1;

        ctx.fillStyle = d.isLeaf ? `rgba(20,80,20,${(alpha*0.7).toFixed(2)})`
          : d.isStem ? `rgba(80,40,10,${(alpha*0.7).toFixed(2)})`
          : `rgba(120,10,20,${(alpha*0.7).toFixed(2)})`;
        ctx.fillRect(-cw/2-padX, -size/2-padY, cw+padX*2, size+padY*2);

        ctx.globalAlpha = alpha;
        ctx.fillStyle = d.isLeaf ? LEAF_GREEN : d.isStem ? "#8B6914" : CYAN;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(d.char, 0, 0);
        ctx.restore();
      }
    }

    /* ═══════ 이벤트 ═══════ */
    tc.addEventListener("mousemove", (e) => {
      targetX = e.clientX; targetY = e.clientY; targetR = RADIUS;
      mouseX = e.clientX; mouseY = e.clientY;
    });
    tc.addEventListener("mouseleave", () => { targetR = 0; });
    tc.addEventListener("mouseenter", () => { targetR = RADIUS; });

    tc.addEventListener("mousedown", () => { isHolding = true; });
    tc.addEventListener("mouseup", () => {
      isHolding = false;
      floatingShape = new FloatingShape(mouseX, mouseY);
    });

    tc.addEventListener("touchstart", (e) => {
      e.preventDefault(); isHolding = true;
      mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY;
      targetX = mouseX; targetY = mouseY; targetR = RADIUS;
    });
    tc.addEventListener("touchmove", (e) => {
      mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY;
      targetX = mouseX; targetY = mouseY;
    });
    tc.addEventListener("touchend", () => {
      isHolding = false;
      floatingShape = new FloatingShape(mouseX, mouseY);
    });

    /* ═══════ 루프 및 모션 제어 ═══════ */
    let time = 0;

    function animate() {
      time += 0.016; // 초당 60프레임 기준 시간 변수

      currentX += (targetX - currentX) * EASE;
      currentY += (targetY - currentY) * EASE;
      currentR += (targetR - currentR) * R_EASE;

      // 2. 마스크 형태 왜곡 연산 (Wobble & Pulse)
      const waveX = Math.sin(time * 2.0) * 12;
      const waveY = Math.cos(time * 1.5) * 12;
      const pulseR = Math.sin(time * 3.0) * 8;
      
      const activeR = Math.max(0, currentR + pulseR);

      // 그라데이션 페더링 구간 확대
      reveal.style.webkitMaskImage = reveal.style.maskImage =
        `radial-gradient(circle ${activeR}px at ${currentX + waveX}px ${currentY + waveY}px, rgba(0,0,0,1) 0%, rgba(0,0,0,0.6) 40%, rgba(0,0,0,0) 100%)`;

      // 3. SVG 굴절(Displacement) 강도 연산
      const hoverIntensity = currentR / RADIUS;
      if (displacement) {
        const scaleValue = (hoverIntensity * 35) + (Math.sin(time * 4) * 10);
        displacement.setAttribute('scale', Math.max(0, scaleValue));
      }

      ctx.clearRect(0, 0, W, H);

      if (isHolding) {
        holdAlpha = Math.min(1, holdAlpha + 0.03);
      } else {
        holdAlpha = Math.max(0, holdAlpha - 0.015);
      }

      rotY += 0.015;

      if (holdAlpha > 0.01) drawApple();

      if (floatingShape) {
        floatingShape.update();
        floatingShape.draw();
        if (!floatingShape.alive) floatingShape = null;
      }

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
