<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Image Map</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    /* 로컬 폰트 — assets 폴더에 'New Century Schoolbook Roman.otf' 파일 필요 */
    @font-face {
      font-family: 'NewCenturySchoolbook';
      src: url('./assets/New Century Schoolbook Roman.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #f0ede8; }
    .bg-img {
      position: fixed; inset: 0; z-index: 1;
      width: 100%; height: 100%; object-fit: cover;
    }
    #paint-canvas {
      position: fixed; inset: 0; z-index: 2;
      width: 100%; height: 100%; pointer-events: none;
    }
    #shape-canvas {
      position: fixed; inset: 0; z-index: 3;
      width: 100%; height: 100%; pointer-events: none;
    }
    #ui-canvas {
      position: fixed; inset: 0; z-index: 4;
      pointer-events: auto; cursor: crosshair;
    }

    /* Name title — New Century Schoolbook Roman, 흰 박스 + 검정 텍스트 */
    .name-title {
      position: fixed;
      top: 24px;
      left: 28px;
      z-index: 10;
      pointer-events: none;
      font-family: 'NewCenturySchoolbook', 'Century Schoolbook', 'Times New Roman', Times, serif;
      font-weight: 400;
      font-size: 15px;
      color: #000;
      line-height: 1;
      letter-spacing: 0;
    }
    .name-title span {
      display: inline-block;
      background: #fff;
      color: #000;
      padding: 0 4px;
      line-height: 1;
    }
    .name-title .main { }
    .name-title .sub {
      margin-top: 3px;
    }
    .name-title .line {
      display: block;
    }
  </style>
</head>
<body>

  <img class="bg-img" src="./assets/sample2.jpg" alt="bg" />
  <canvas id="paint-canvas"></canvas>
  <canvas id="shape-canvas"></canvas>
  <canvas id="ui-canvas"></canvas>

  <div class="name-title">
    <span class="line main">Hyoeun Kim</span>
    <span class="line sub">Scenes without Scenes</span>
  </div>

  <script>
    const paintCvs = document.getElementById("paint-canvas");
    const paintCtx = paintCvs.getContext("2d");
    const shapeCvs = document.getElementById("shape-canvas");
    const shapeCtx = shapeCvs.getContext("2d");
    const uiCvs = document.getElementById("ui-canvas");
    const ui = uiCvs.getContext("2d");

    let W, H;
    const paintImg = new Image();
    paintImg.src = "./assets/sample1.jpg";
    let imgReady = false;
    paintImg.onload = () => { imgReady = true; };

    function resize() {
      W = window.innerWidth; H = window.innerHeight;
      paintCvs.width = W; paintCvs.height = H;
      shapeCvs.width = W; shapeCvs.height = H;
      uiCvs.width = W; uiCvs.height = H;
    }
    resize();
    window.addEventListener("resize", resize);

    /* ═══════════════════════════════════════
       BRUSH PAINT REVEAL
       ═══════════════════════════════════════ */
    const trail = [];
    const LIFETIME = 50, BRUSH_R = 80;
    let mouseX = 0, mouseY = 0, prevMX = -999, prevMY = -999;

    function addTrail(x0, y0, x1, y1, radiusBoost = 0) {
      const dx = x1 - x0, dy = y1 - y0;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const steps = Math.max(1, Math.floor(dist / 6));
      const r = BRUSH_R + Math.min(dist, 50) * 0.6 + radiusBoost;
      for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        trail.push({ x: x0 + dx * t, y: y0 + dy * t, age: 0, r: r + (Math.random() - 0.5) * 12 });
      }
    }

    // 제자리 홀딩에서도 일렁임이 지속되도록 — 포인터 근처에
    // 랜덤 오프셋으로 브러시 점을 계속 추가
    function addStationaryShimmer(x, y) {
      const count = 2;
      for (let i = 0; i < count; i++) {
        const ang = Math.random() * Math.PI * 2;
        const dist = Math.random() * 22;
        const px = x + Math.cos(ang) * dist;
        const py = y + Math.sin(ang) * dist;
        const r = BRUSH_R + (Math.random() - 0.5) * 24;
        trail.push({ x: px, y: py, age: 0, r });
      }
    }

    function renderPaint() {
      paintCtx.clearRect(0, 0, W, H);
      if (!imgReady || trail.length === 0) return;
      paintCtx.save();
      for (let i = trail.length - 1; i >= 0; i--) {
        const p = trail[i]; p.age++;
        if (p.age > LIFETIME) { trail.splice(i, 1); continue; }
        const life = p.age / LIFETIME;
        let a = life < 0.04 ? life / 0.04 : 1 - Math.pow((life - 0.04) / 0.96, 0.8);
        a *= 0.95;
        if (a < 0.005) continue;
        const g = paintCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
        g.addColorStop(0,   `rgba(255,255,255,${a.toFixed(3)})`);
        g.addColorStop(0.3, `rgba(255,255,255,${(a * 0.7).toFixed(3)})`);
        g.addColorStop(0.6, `rgba(255,255,255,${(a * 0.3).toFixed(3)})`);
        g.addColorStop(1,   `rgba(255,255,255,0)`);
        paintCtx.fillStyle = g;
        paintCtx.beginPath();
        paintCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        paintCtx.fill();
      }
      paintCtx.globalCompositeOperation = "source-in";
      paintCtx.drawImage(paintImg, 0, 0, W, H);
      paintCtx.restore();
    }

    /* ═══════════════════════════════════════
       FLOATING APPLES
       ═══════════════════════════════════════ */
    const apples = [];

    function createApple(x, y) {
      const hue = 350 + (Math.random() - 0.5) * 20;
      const sat = 65 + Math.random() * 15;
      const light = 45 + Math.random() * 10;
      apples.push({
        x, y,
        vx: (Math.random() - 0.5) * 2.2,
        vy: (Math.random() - 0.5) * 2.2 - 0.5,
        size: 22 + Math.random() * 18,
        rot: (Math.random() - 0.5) * 0.4,
        rotSpeed: (Math.random() - 0.5) * 0.015,
        color: `hsl(${hue}, ${sat}%, ${light}%)`,
        highlight: `hsla(${hue + 10}, ${sat - 20}%, ${light + 30}%, 0.55)`,
        stemColor: `hsl(25, 45%, 25%)`,
        leafColor: `hsl(95, 40%, 40%)`,
        birthTime: 0,
        nSeedX: Math.random() * 1000,
        nSeedY: Math.random() * 1000,
      });
    }

    function updateApples() {
      for (const a of apples) {
        a.birthTime++;
        a.nSeedX += 0.01;
        a.nSeedY += 0.008;
        const driftX = Math.sin(a.nSeedX) * 0.04 + Math.cos(a.nSeedX * 0.7) * 0.02;
        const driftY = Math.cos(a.nSeedY) * 0.04 + Math.sin(a.nSeedY * 1.3) * 0.02;
        a.vx += driftX;
        a.vy += driftY;
        a.vx *= 0.995;
        a.vy *= 0.995;
        const sp = Math.sqrt(a.vx * a.vx + a.vy * a.vy);
        const MAX = 1.8;
        if (sp > MAX) {
          a.vx = (a.vx / sp) * MAX;
          a.vy = (a.vy / sp) * MAX;
        }
        a.x += a.vx;
        a.y += a.vy;
        a.rot += a.rotSpeed;
        const pad = a.size;
        if (a.x < pad) { a.x = pad; a.vx = Math.abs(a.vx) * 0.8; }
        if (a.x > W - pad) { a.x = W - pad; a.vx = -Math.abs(a.vx) * 0.8; }
        if (a.y < pad) { a.y = pad; a.vy = Math.abs(a.vy) * 0.8; }
        if (a.y > H - pad) { a.y = H - pad; a.vy = -Math.abs(a.vy) * 0.8; }
      }
    }

    function drawApple(ctx, a) {
      const s = a.size;
      let scale = 1;
      if (a.birthTime < 30) {
        const t = a.birthTime / 30;
        scale = 1 + (Math.sin(t * Math.PI) * 0.15) * (1 - t * 0.5);
        if (a.birthTime < 10) scale *= a.birthTime / 10;
      }

      ctx.save();
      ctx.translate(a.x, a.y);
      ctx.rotate(a.rot);
      ctx.scale(scale, scale);

      ctx.save();
      ctx.globalAlpha = 0.18;
      ctx.fillStyle = "#000";
      ctx.beginPath();
      ctx.ellipse(2, s * 0.95, s * 0.85, s * 0.25, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      ctx.fillStyle = a.color;
      ctx.beginPath();
      ctx.ellipse(-s * 0.22, 0, s * 0.78, s * 0.85, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(s * 0.22, 0, s * 0.78, s * 0.85, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = a.color;
      ctx.beginPath();
      ctx.ellipse(0, -s * 0.7, s * 0.45, s * 0.2, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = a.highlight;
      ctx.beginPath();
      ctx.ellipse(-s * 0.35, -s * 0.25, s * 0.2, s * 0.32, -0.3, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "rgba(255,255,255,0.5)";
      ctx.beginPath();
      ctx.ellipse(-s * 0.4, -s * 0.4, s * 0.08, s * 0.12, -0.3, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = a.stemColor;
      ctx.lineWidth = s * 0.08;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(0, -s * 0.78);
      ctx.quadraticCurveTo(s * 0.08, -s * 1.0, s * 0.18, -s * 1.05);
      ctx.stroke();

      ctx.fillStyle = a.leafColor;
      ctx.beginPath();
      ctx.ellipse(s * 0.3, -s * 0.92, s * 0.22, s * 0.11, -0.6, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "rgba(0,0,0,0.15)";
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(s * 0.14, -s * 0.86);
      ctx.lineTo(s * 0.48, -s * 0.98);
      ctx.stroke();

      ctx.restore();
    }

    function renderShapes() {
      shapeCtx.clearRect(0, 0, W, H);
      for (const a of apples) drawApple(shapeCtx, a);
    }

    /* ═══════════════════════════════════════
       TEXT MOTION — 계산하듯 조직되는 모션
       
       각 글자가 좌표 격자 위에 하나씩 계산되어 배치됨.
       - Phase A: 좌표 스캐너가 격자 위를 훑으며
                  각 글자 자리에 "+" 십자 마커를 찍음
       - Phase B: 찍힌 좌표마다 글자가 작게 나타났다
                  제자리로 확장되며 도착. 각 글자 옆에
                  좌표 (x,y) 숫자가 짧게 표시됨.
       - Phase C: 연결선이 글자 사이에 순차적으로 그어짐
       ═══════════════════════════════════════ */
    const SENTENCE = "Although we don't have a visual representation of the apple, we do have a complete 3D model with vectors included. In this way, memories are sometimes organized not by images but by coordinate information such as direction, distance, and structure.";
    const CHARS = [...SENTENCE];

    let isHolding = false;
    let holdX = 0, holdY = 0;

    // Phases: idle → scanning → placing → connecting → hold → fadeout
    let textPhase = "idle";
    let textTimer = 0;
    let textAlpha = 1;
    const HOLD_DUR = 100;

    // 각 글자 상태
    let glyphs = [];
    let layoutLines = [];   // 레이아웃 캐시
    let layoutCharAnchor = []; // {x, y, w, line}
    let layoutReady = false;

    // 글자 너비 / 줄바꿈 계산
    function computeLayout() {
      const fontSize = 11;
      ui.font = `400 ${fontSize}px 'NewCenturySchoolbook', 'Century Schoolbook', 'Times New Roman', serif`;
      ui.textBaseline = "middle";
      ui.textAlign = "left";

      const maxWidth = Math.min(W * 0.45, 360);
      const lineHeight = fontSize * 1.7;

      // 단어 단위 줄바꿈
      const lines = [];
      let cur = { chars: [], totalW: 0 };
      let wordStart = 0;
      let wordW = 0;

      for (let i = 0; i < CHARS.length; i++) {
        const ch = CHARS[i];
        const w = ui.measureText(ch).width;

        if (ch === " ") {
          // 단어 완료
          cur.chars.push({ idx: i, w });
          cur.totalW += w;
          wordStart = i + 1;
          wordW = 0;
        } else {
          wordW += w;
          // 현재 단어가 다 들어갈 공간이 있는지 확인
          if (cur.totalW + wordW > maxWidth && cur.chars.length > 0) {
            // 공백을 제거하고 줄바꿈
            while (cur.chars.length > 0 && CHARS[cur.chars[cur.chars.length-1].idx] === " ") {
              cur.totalW -= cur.chars.pop().w;
            }
            lines.push(cur);
            cur = { chars: [], totalW: 0 };
            // 현재 단어 다시 추가
            for (let k = wordStart; k <= i; k++) {
              const kw = ui.measureText(CHARS[k]).width;
              cur.chars.push({ idx: k, w: kw });
              cur.totalW += kw;
            }
            wordW = cur.totalW;
          } else {
            cur.chars.push({ idx: i, w });
            cur.totalW += w;
          }
        }
      }
      if (cur.chars.length) lines.push(cur);

      layoutLines = lines;
      return { lines, lineHeight, fontSize };
    }

    function buildGlyphs() {
      glyphs = CHARS.map((ch, i) => ({
        ch,
        // 각 글자가 처리되는 순서 (왼->오, 위->아래)
        order: i,
        // 스캐너 마커 도착 시각
        scanAt: i * 0.35 + Math.random() * 0.4,
        // 글자 등장 시각 (스캔 후)
        placeAt: i * 0.35 + 8 + Math.random() * 1.5,
        // 연결선 도착 시각
        connectAt: i * 0.35 + 18,
        // 진행도
        scanProgress: 0,
        placeProgress: 0,
        connectProgress: 0,
        // 랜덤 좌표 라벨 (가상의 격자 번호)
        coordX: 0,
        coordY: 0,
        labelShow: 0,
      }));
    }

    function resetText() {
      textPhase = "running";
      textTimer = 0;
      textAlpha = 1;
      buildGlyphs();
      layoutReady = false;
    }

    function updateText() {
      if (textPhase === "idle") {
        if (isHolding) resetText();
        return;
      }
      if (!isHolding && textPhase !== "fadeout") textPhase = "fadeout";
      textTimer++;

      if (textPhase === "running") {
        let allConnected = true;
        for (const g of glyphs) {
          // 스캔 진행
          const scanT = textTimer - g.scanAt;
          g.scanProgress = Math.min(1, Math.max(0, scanT / 4));

          // 배치 진행
          const placeT = textTimer - g.placeAt;
          const placeP = Math.min(1, Math.max(0, placeT / 5));
          g.placeProgress = 1 - Math.pow(1 - placeP, 3); // easeOutCubic
          if (g.placeProgress < 1) allConnected = false;

          // 연결선 진행
          const connT = textTimer - g.connectAt;
          g.connectProgress = Math.min(1, Math.max(0, connT / 3));
          if (g.connectProgress < 1) allConnected = false;

          // 라벨 표시 시간 (짧게)
          const labelT = textTimer - g.placeAt;
          if (labelT > 0 && labelT < 8) g.labelShow = 1 - labelT / 8;
          else g.labelShow = 0;
        }
        if (allConnected && textTimer > glyphs[glyphs.length-1].connectAt + 5) {
          textPhase = "hold";
          textTimer = 0;
        }
      }
      else if (textPhase === "hold") {
        if (textTimer > HOLD_DUR) { textPhase = "fadeout"; textTimer = 0; }
      }
      else if (textPhase === "fadeout") {
        textAlpha -= 0.04;
        if (textAlpha <= 0) {
          textAlpha = 0;
          if (isHolding) resetText();
          else textPhase = "idle";
        }
      }
    }

    function drawText() {
      if (textPhase === "idle") return;

      // 레이아웃 계산 (매번 — holdX/Y 변하니까)
      const { lines, lineHeight, fontSize } = computeLayout();

      // 각 글자 좌표 계산
      const anchor = new Array(CHARS.length);
      const totalH = lines.length * lineHeight;
      const topY = holdY - totalH / 2 + lineHeight / 2;

      // 전체 블록 경계
      let blockLeft = Infinity, blockRight = -Infinity;
      for (let l = 0; l < lines.length; l++) {
        const line = lines[l];
        const lineStartX = holdX - line.totalW / 2;
        let x = lineStartX;
        const y = topY + l * lineHeight;
        blockLeft = Math.min(blockLeft, lineStartX);
        blockRight = Math.max(blockRight, lineStartX + line.totalW);
        for (const c of line.chars) {
          anchor[c.idx] = { x, y, w: c.w, line: l };
          x += c.w;
        }
      }

      // 각 글자의 가상 좌표 라벨 할당 (한 번만)
      if (!layoutReady) {
        for (let i = 0; i < CHARS.length; i++) {
          const a = anchor[i];
          if (!a) continue;
          glyphs[i].coordX = Math.floor((a.x - holdX) * 2 + 500);
          glyphs[i].coordY = Math.floor((a.y - holdY) * 2 + 500);
        }
        layoutReady = true;
      }

      // ── 격자/프레임 마커 (블록 경계) ──────────────
      const frameAlpha = textAlpha * 0.35;
      if (frameAlpha > 0.01) {
        ui.save();
        ui.globalAlpha = frameAlpha;
        ui.strokeStyle = "#111";
        ui.lineWidth = 0.5;

        const pad = 12;
        const top = topY - fontSize * 0.7 - pad / 2;
        const bot = topY + (lines.length - 1) * lineHeight + fontSize * 0.7 + pad / 2;
        const left = blockLeft - pad;
        const right = blockRight + pad;

        // 코너 크롭 마커
        const cL = 6;
        ui.beginPath();
        // TL
        ui.moveTo(left, top + cL); ui.lineTo(left, top); ui.lineTo(left + cL, top);
        // TR
        ui.moveTo(right - cL, top); ui.lineTo(right, top); ui.lineTo(right, top + cL);
        // BL
        ui.moveTo(left, bot - cL); ui.lineTo(left, bot); ui.lineTo(left + cL, bot);
        // BR
        ui.moveTo(right - cL, bot); ui.lineTo(right, bot); ui.lineTo(right, bot - cL);
        ui.stroke();
        ui.restore();
      }

      // ── 각 글자별 렌더링 ──
      for (let i = 0; i < CHARS.length; i++) {
        const g = glyphs[i];
        const a = anchor[i];
        if (!a) continue;
        const ax = a.x + a.w / 2;
        const ay = a.y;

        // Phase A — 스캐너 십자 마커
        if (g.scanProgress > 0 && g.placeProgress < 0.5) {
          const crossAlpha = g.scanProgress * (1 - g.placeProgress * 2) * textAlpha;
          if (crossAlpha > 0.01) {
            ui.save();
            ui.globalAlpha = crossAlpha * 0.7;
            ui.strokeStyle = "#111";
            ui.lineWidth = 0.6;
            const cs = 3 + g.scanProgress * 1.5;
            ui.beginPath();
            ui.moveTo(ax - cs, ay);
            ui.lineTo(ax + cs, ay);
            ui.moveTo(ax, ay - cs);
            ui.lineTo(ax, ay + cs);
            ui.stroke();

            // 작은 원
            ui.globalAlpha = crossAlpha * 0.3;
            ui.beginPath();
            ui.arc(ax, ay, 2 + g.scanProgress * 1.5, 0, Math.PI * 2);
            ui.stroke();
            ui.restore();
          }
        }

        // Phase B — 글자 배치 (작게 → 원래 크기)
        if (g.placeProgress > 0) {
          const scale = 0.3 + g.placeProgress * 0.7;
          const gAlpha = Math.min(1, g.placeProgress * 2) * textAlpha;

          ui.save();
          ui.globalAlpha = gAlpha;
          ui.translate(ax, ay);
          ui.scale(scale, scale);
          ui.fillStyle = "#111";
          ui.font = `400 ${fontSize}px 'NewCenturySchoolbook', 'Century Schoolbook', 'Times New Roman', serif`;
          ui.textAlign = "center";
          ui.textBaseline = "middle";
          ui.fillText(CHARS[i], 0, 0);
          ui.restore();

          // 좌표 라벨 (등장 직후 짧게)
          if (g.labelShow > 0 && CHARS[i] !== " ") {
            ui.save();
            ui.globalAlpha = g.labelShow * textAlpha * 0.45;
            ui.fillStyle = "#111";
            ui.font = `400 6.5px 'Pretendard', monospace`;
            ui.textAlign = "center";
            ui.textBaseline = "top";
            const label = g.coordX + "," + g.coordY;
            ui.fillText(label, ax, ay - fontSize * 0.95);
            ui.restore();
          }
        }

        // Phase C — 이웃 글자로 연결선
        // 같은 줄 내 이전 글자 → 현재 글자로
        if (g.connectProgress > 0 && i > 0) {
          const prev = anchor[i - 1];
          if (prev && prev.line === a.line && CHARS[i] !== " " && CHARS[i-1] !== " ") {
            const px = prev.x + prev.w / 2;
            const py = prev.y;
            ui.save();
            ui.globalAlpha = g.connectProgress * textAlpha * 0.25;
            ui.strokeStyle = "#111";
            ui.lineWidth = 0.3;
            ui.beginPath();
            ui.moveTo(px, py + fontSize * 0.55);
            ui.lineTo(ax, ay + fontSize * 0.55);
            ui.stroke();
            ui.restore();
          }
        }
      }
    }

    /* ═══════════════════════════════════════
       EVENTS
       ═══════════════════════════════════════ */
    uiCvs.addEventListener("mousemove", e => {
      mouseX = e.clientX; mouseY = e.clientY;
      if (prevMX > -900) {
        // 홀딩 중에는 브러시 반경을 키워 더 강한 일렁임
        addTrail(prevMX, prevMY, mouseX, mouseY, isHolding ? 15 : 0);
      }
      prevMX = mouseX; prevMY = mouseY;
      if (isHolding) { holdX = mouseX; holdY = mouseY; }
    });
    uiCvs.addEventListener("mouseleave", () => { prevMX = -999; });

    uiCvs.addEventListener("mousedown", e => {
      isHolding = true;
      holdX = e.clientX; holdY = e.clientY;
      mouseX = e.clientX; mouseY = e.clientY;
    });
    uiCvs.addEventListener("mouseup", e => {
      isHolding = false;
      createApple(e.clientX, e.clientY);
    });

    uiCvs.addEventListener("touchstart", e => {
      e.preventDefault(); isHolding = true;
      mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY;
      holdX = mouseX; holdY = mouseY;
      prevMX = mouseX; prevMY = mouseY;
    });
    uiCvs.addEventListener("touchmove", e => {
      const tx = e.touches[0].clientX, ty = e.touches[0].clientY;
      if (prevMX > -900) addTrail(prevMX, prevMY, tx, ty, isHolding ? 15 : 0);
      mouseX = tx; mouseY = ty; prevMX = tx; prevMY = ty;
      holdX = tx; holdY = ty;
    });
    uiCvs.addEventListener("touchend", () => {
      isHolding = false; prevMX = -999;
      createApple(mouseX, mouseY);
    });

    /* ═══════════════════════════════════════
       LOOP
       ═══════════════════════════════════════ */
    function animate() {
      // 홀딩 중에는 제자리에서도 일렁임 지속
      if (isHolding) addStationaryShimmer(holdX, holdY);

      renderPaint();
      updateApples();
      renderShapes();
      ui.clearRect(0, 0, W, H);
      updateText();
      drawText();
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
