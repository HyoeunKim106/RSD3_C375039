<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Image Map</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    /* 로컬 폰트 — assets 폴더에 'New Century Schoolbook Roman.otf' 파일 필요 */
    @font-face {
      font-family: 'NewCenturySchoolbook';
      src: url('./assets/New Century Schoolbook Roman.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #f0ede8; }
    .bg-img {
      position: fixed; inset: 0; z-index: 1;
      width: 100%; height: 100%; object-fit: cover;
    }
    #paint-canvas {
      position: fixed; inset: 0; z-index: 2;
      width: 100%; height: 100%; pointer-events: none;
    }
    #shape-canvas {
      position: fixed; inset: 0; z-index: 3;
      width: 100%; height: 100%; pointer-events: none;
    }
    #ui-canvas {
      position: fixed; inset: 0; z-index: 4;
      pointer-events: auto; cursor: crosshair;
    }

    /* Name title — New Century Schoolbook Roman, 흰 박스 + 검정 텍스트 */
    .name-title {
      position: fixed;
      top: 24px;
      left: 28px;
      z-index: 10;
      pointer-events: none;
      font-family: 'NewCenturySchoolbook', 'Century Schoolbook', 'Times New Roman', Times, serif;
      font-weight: 400;
      font-size: 15px;
      color: #000;
      line-height: 1;
      letter-spacing: 0;
    }
    .name-title span {
      display: inline-block;
      background: #fff;
      color: #000;
      padding: 0 4px;
      line-height: 1;
    }
    .name-title .main { }
    .name-title .sub {
      margin-top: 3px;
    }
    .name-title .line {
      display: block;
    }
  </style>
</head>
<body>

  <img class="bg-img" src="./assets/sample2.jpg" alt="bg" />
  <canvas id="paint-canvas"></canvas>
  <canvas id="shape-canvas"></canvas>
  <canvas id="ui-canvas"></canvas>

  <div class="name-title">
    <span class="line main">Hyoeun Kim</span>
    <span class="line sub">Scenes without Scenes</span>
  </div>

  <script>
    const paintCvs = document.getElementById("paint-canvas");
    const paintCtx = paintCvs.getContext("2d");
    const shapeCvs = document.getElementById("shape-canvas");
    const shapeCtx = shapeCvs.getContext("2d");
    const uiCvs = document.getElementById("ui-canvas");
    const ui = uiCvs.getContext("2d");

    let W, H;
    const paintImg = new Image();
    paintImg.src = "./assets/sample1.jpg";
    let imgReady = false;
    paintImg.onload = () => { imgReady = true; };

    function resize() {
      W = window.innerWidth; H = window.innerHeight;
      paintCvs.width = W; paintCvs.height = H;
      shapeCvs.width = W; shapeCvs.height = H;
      uiCvs.width = W; uiCvs.height = H;
    }
    resize();
    window.addEventListener("resize", resize);

    /* ═══════════════════════════════════════
       BRUSH PAINT REVEAL
       ═══════════════════════════════════════ */
    const trail = [];
    const LIFETIME = 50, BRUSH_R = 80;
    let mouseX = 0, mouseY = 0, prevMX = -999, prevMY = -999;

    function addTrail(x0, y0, x1, y1, radiusBoost = 0) {
      const dx = x1 - x0, dy = y1 - y0;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const steps = Math.max(1, Math.floor(dist / 6));
      const r = BRUSH_R + Math.min(dist, 50) * 0.6 + radiusBoost;
      for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        trail.push({ x: x0 + dx * t, y: y0 + dy * t, age: 0, r: r + (Math.random() - 0.5) * 12 });
      }
    }

    // 제자리 홀딩에서도 일렁임이 지속되도록 — 포인터 근처에
    // 랜덤 오프셋으로 브러시 점을 계속 추가
    function addStationaryShimmer(x, y) {
      const count = 2;
      for (let i = 0; i < count; i++) {
        const ang = Math.random() * Math.PI * 2;
        const dist = Math.random() * 22;
        const px = x + Math.cos(ang) * dist;
        const py = y + Math.sin(ang) * dist;
        const r = BRUSH_R + (Math.random() - 0.5) * 24;
        trail.push({ x: px, y: py, age: 0, r });
      }
    }

    function renderPaint() {
      paintCtx.clearRect(0, 0, W, H);
      if (!imgReady || trail.length === 0) return;
      paintCtx.save();
      for (let i = trail.length - 1; i >= 0; i--) {
        const p = trail[i]; p.age++;
        if (p.age > LIFETIME) { trail.splice(i, 1); continue; }
        const life = p.age / LIFETIME;
        let a = life < 0.04 ? life / 0.04 : 1 - Math.pow((life - 0.04) / 0.96, 0.8);
        a *= 0.95;
        if (a < 0.005) continue;
        const g = paintCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
        g.addColorStop(0,   `rgba(255,255,255,${a.toFixed(3)})`);
        g.addColorStop(0.3, `rgba(255,255,255,${(a * 0.7).toFixed(3)})`);
        g.addColorStop(0.6, `rgba(255,255,255,${(a * 0.3).toFixed(3)})`);
        g.addColorStop(1,   `rgba(255,255,255,0)`);
        paintCtx.fillStyle = g;
        paintCtx.beginPath();
        paintCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        paintCtx.fill();
      }
      paintCtx.globalCompositeOperation = "source-in";
      paintCtx.drawImage(paintImg, 0, 0, W, H);
      paintCtx.restore();
    }

    /* ═══════════════════════════════════════
       FLOATING APPLES
       ═══════════════════════════════════════ */
    const apples = [];

    function createApple(x, y) {
      const hue = 350 + (Math.random() - 0.5) * 20;
      const sat = 65 + Math.random() * 15;
      const light = 45 + Math.random() * 10;
      apples.push({
        x, y,
        vx: (Math.random() - 0.5) * 2.2,
        vy: (Math.random() - 0.5) * 2.2 - 0.5,
        size: 22 + Math.random() * 18,
        rot: (Math.random() - 0.5) * 0.4,
        rotSpeed: (Math.random() - 0.5) * 0.015,
        color: `hsl(${hue}, ${sat}%, ${light}%)`,
        highlight: `hsla(${hue + 10}, ${sat - 20}%, ${light + 30}%, 0.55)`,
        stemColor: `hsl(25, 45%, 25%)`,
        leafColor: `hsl(95, 40%, 40%)`,
        birthTime: 0,
        nSeedX: Math.random() * 1000,
        nSeedY: Math.random() * 1000,
      });
    }

    function updateApples() {
      for (const a of apples) {
        a.birthTime++;
        a.nSeedX += 0.01;
        a.nSeedY += 0.008;
        const driftX = Math.sin(a.nSeedX) * 0.04 + Math.cos(a.nSeedX * 0.7) * 0.02;
        const driftY = Math.cos(a.nSeedY) * 0.04 + Math.sin(a.nSeedY * 1.3) * 0.02;
        a.vx += driftX;
        a.vy += driftY;
        a.vx *= 0.995;
        a.vy *= 0.995;
        const sp = Math.sqrt(a.vx * a.vx + a.vy * a.vy);
        const MAX = 1.8;
        if (sp > MAX) {
          a.vx = (a.vx / sp) * MAX;
          a.vy = (a.vy / sp) * MAX;
        }
        a.x += a.vx;
        a.y += a.vy;
        a.rot += a.rotSpeed;
        const pad = a.size;
        if (a.x < pad) { a.x = pad; a.vx = Math.abs(a.vx) * 0.8; }
        if (a.x > W - pad) { a.x = W - pad; a.vx = -Math.abs(a.vx) * 0.8; }
        if (a.y < pad) { a.y = pad; a.vy = Math.abs(a.vy) * 0.8; }
        if (a.y > H - pad) { a.y = H - pad; a.vy = -Math.abs(a.vy) * 0.8; }
      }
    }

    function drawApple(ctx, a) {
      const s = a.size;
      let scale = 1;
      if (a.birthTime < 30) {
        const t = a.birthTime / 30;
        scale = 1 + (Math.sin(t * Math.PI) * 0.15) * (1 - t * 0.5);
        if (a.birthTime < 10) scale *= a.birthTime / 10;
      }

      ctx.save();
      ctx.translate(a.x, a.y);
      ctx.rotate(a.rot);
      ctx.scale(scale, scale);

      ctx.save();
      ctx.globalAlpha = 0.18;
      ctx.fillStyle = "#000";
      ctx.beginPath();
      ctx.ellipse(2, s * 0.95, s * 0.85, s * 0.25, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      ctx.fillStyle = a.color;
      ctx.beginPath();
      ctx.ellipse(-s * 0.22, 0, s * 0.78, s * 0.85, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(s * 0.22, 0, s * 0.78, s * 0.85, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = a.color;
      ctx.beginPath();
      ctx.ellipse(0, -s * 0.7, s * 0.45, s * 0.2, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = a.highlight;
      ctx.beginPath();
      ctx.ellipse(-s * 0.35, -s * 0.25, s * 0.2, s * 0.32, -0.3, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "rgba(255,255,255,0.5)";
      ctx.beginPath();
      ctx.ellipse(-s * 0.4, -s * 0.4, s * 0.08, s * 0.12, -0.3, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = a.stemColor;
      ctx.lineWidth = s * 0.08;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(0, -s * 0.78);
      ctx.quadraticCurveTo(s * 0.08, -s * 1.0, s * 0.18, -s * 1.05);
      ctx.stroke();

      ctx.fillStyle = a.leafColor;
      ctx.beginPath();
      ctx.ellipse(s * 0.3, -s * 0.92, s * 0.22, s * 0.11, -0.6, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "rgba(0,0,0,0.15)";
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(s * 0.14, -s * 0.86);
      ctx.lineTo(s * 0.48, -s * 0.98);
      ctx.stroke();

      ctx.restore();
    }

    function renderShapes() {
      shapeCtx.clearRect(0, 0, W, H);
      for (const a of apples) drawApple(shapeCtx, a);
    }

    /* ═══════════════════════════════════════
       TEXT MOTION — 낱자(자소) 단위 조립

       각 한글 글자를 초/중/종성으로 분해하여
       각 자소가 주변에서 날아들어와 글자로 조립.
       "방향과 거리, 관계와 구조를 계산하듯 조직되는" 모션.
       ═══════════════════════════════════════ */
    const SENTENCE = "사과의 시각적 표상은 없지만, 벡터가 포함된 완벽한 3D 모델을 가지고 있어요. 어떤 기억은 장면으로 남기보다, 방향과 거리, 관계와 구조를 계산하듯 조직되기도 합니다.";
    const CHARS = [...SENTENCE];

    // 한글 분해 테이블
    const CHO = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
    const JUNG = ["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ","ㅙ","ㅚ","ㅛ","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"];
    const JONG = ["","ㄱ","ㄲ","ㄳ","ㄴ","ㄵ","ㄶ","ㄷ","ㄹ","ㄺ","ㄻ","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ","ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];

    // 한글 분해 — 낱자 배열 반환
    function decomposeHangul(ch) {
      const code = ch.charCodeAt(0);
      if (code < 0xAC00 || code > 0xD7A3) return null;
      const offset = code - 0xAC00;
      const cho = Math.floor(offset / (21 * 28));
      const jung = Math.floor((offset % (21 * 28)) / 28);
      const jong = offset % 28;
      const parts = [CHO[cho], JUNG[jung]];
      if (jong > 0) parts.push(JONG[jong]);
      return parts;
    }

    let isHolding = false;
    let holdX = 0, holdY = 0;

    // Phases: idle → assembling → hold → fadeout
    let textPhase = "idle";
    let textTimer = 0;
    let textAlpha = 1;
    const HOLD_DUR = 90;
    const ASSEMBLE_PER_CHAR = 1.1;  // 글자 간 등장 지연 프레임
    const JAMO_TRAVEL = 22;          // 자소가 날아오는 시간

    // 글자별 상태 — 각 글자는 여러 낱자를 가짐
    // jamo: { ch, sx, sy, rot0, delay, progress, settled }
    let glyphs = [];

    function buildGlyphs() {
      glyphs = CHARS.map((ch, i) => {
        const parts = decomposeHangul(ch);
        const charDelay = i * ASSEMBLE_PER_CHAR;
        if (parts) {
          // 한글 — 낱자별로 서로 다른 방향에서 날아옴
          const jamos = parts.map((p, j) => {
            const ang = Math.random() * Math.PI * 2;
            const dist = 60 + Math.random() * 100;
            return {
              ch: p,
              sx: Math.cos(ang) * dist,
              sy: Math.sin(ang) * dist,
              rot0: (Math.random() - 0.5) * 1.2,
              delay: charDelay + j * 1.5 + Math.random() * 1.5,
              progress: 0,
              settled: false,
              settleFlash: 0,
              alpha: 0,
            };
          });
          return { ch, jamos, isHangul: true, charDelay };
        } else {
          // 공백, 영문, 숫자, 구두점 — 그대로 한 덩어리
          const ang = Math.random() * Math.PI * 2;
          const dist = 60 + Math.random() * 100;
          return {
            ch,
            isHangul: false,
            charDelay,
            single: {
              sx: Math.cos(ang) * dist,
              sy: Math.sin(ang) * dist,
              rot0: (Math.random() - 0.5) * 1.0,
              delay: charDelay + Math.random() * 2,
              progress: 0,
              settled: false,
              settleFlash: 0,
              alpha: 0,
            }
          };
        }
      });
    }
    buildGlyphs();

    function resetText() {
      textPhase = "assembling";
      textTimer = 0;
      textAlpha = 1;
      buildGlyphs();
    }

    function updateJamo(j) {
      const localT = textTimer - j.delay;
      if (localT < 0) {
        j.alpha = 0;
        return false;
      }
      const p = Math.min(1, localT / JAMO_TRAVEL);
      // easeOutCubic
      j.progress = 1 - Math.pow(1 - p, 3);
      j.alpha = Math.min(1, p * 1.8);
      if (p >= 1 && !j.settled) {
        j.settled = true;
        j.settleFlash = 7;
      }
      if (j.settleFlash > 0) j.settleFlash--;
      return p >= 1;
    }

    function updateText() {
      if (textPhase === "idle") {
        if (isHolding) resetText();
        return;
      }
      if (!isHolding && textPhase !== "fadeout") textPhase = "fadeout";
      textTimer++;

      if (textPhase === "assembling") {
        let allDone = true;
        for (const g of glyphs) {
          if (g.isHangul) {
            for (const j of g.jamos) {
              if (!updateJamo(j)) allDone = false;
            }
          } else {
            if (!updateJamo(g.single)) allDone = false;
          }
        }
        // 모든 자소가 제자리에 도착하면 hold로 전환 (추가 대기 30 프레임)
        if (allDone && textTimer > glyphs[glyphs.length-1].charDelay + JAMO_TRAVEL + 30) {
          textPhase = "hold";
          textTimer = 0;
        }
      }
      else if (textPhase === "hold") {
        if (textTimer > HOLD_DUR) { textPhase = "fadeout"; textTimer = 0; }
      }
      else if (textPhase === "fadeout") {
        textAlpha -= 0.03;
        if (textAlpha <= 0) {
          textAlpha = 0;
          if (isHolding) resetText();
          else textPhase = "idle";
        }
      }
    }

    function drawText() {
      if (textPhase === "idle") return;

      const fontSize = 15;
      // 한 줄에 너무 길면 줄바꿈
      ui.font = `400 ${fontSize}px 'Noto Serif KR', serif`;
      ui.textBaseline = "middle";
      ui.textAlign = "left";

      // 각 글자 너비 측정 + 줄바꿈 계산
      const maxWidth = Math.min(W * 0.7, 620);
      const lineHeight = fontSize * 1.9;

      // lines[i] = { chars: [{idx, w}], totalW }
      const lines = [];
      let cur = { chars: [], totalW: 0 };
      for (let i = 0; i < CHARS.length; i++) {
        const w = ui.measureText(CHARS[i]).width;
        if (cur.totalW + w > maxWidth && CHARS[i] !== " ") {
          // 공백에서 줄바꿈 시도 — 이전 공백까지 되돌아감
          let breakIdx = cur.chars.length - 1;
          while (breakIdx >= 0 && CHARS[cur.chars[breakIdx].idx] !== " ") breakIdx--;
          if (breakIdx > 0) {
            const remainder = cur.chars.slice(breakIdx + 1);
            cur.chars = cur.chars.slice(0, breakIdx);
            cur.totalW = cur.chars.reduce((s, c) => s + c.w, 0);
            lines.push(cur);
            cur = { chars: remainder, totalW: remainder.reduce((s, c) => s + c.w, 0) };
          } else {
            lines.push(cur);
            cur = { chars: [], totalW: 0 };
          }
        }
        cur.chars.push({ idx: i, w });
        cur.totalW += w;
      }
      if (cur.chars.length) lines.push(cur);

      // 각 글자의 anchor 좌표 계산
      const anchor = new Array(CHARS.length);
      const totalH = lines.length * lineHeight;
      const topY = holdY - totalH / 2 + lineHeight / 2;

      for (let l = 0; l < lines.length; l++) {
        const line = lines[l];
        const lineStartX = holdX - line.totalW / 2;
        let x = lineStartX;
        const y = topY + l * lineHeight;
        for (const c of line.chars) {
          anchor[c.idx] = { x, y, w: c.w };
          x += c.w;
        }
      }

      // ── 낱자별 렌더링 ──
      // 한글 글자 렌더링 시, 조합된 완성형은 anchor에 그리되
      // assembling 중에는 각 낱자가 날아들어오는 모션으로 그림.
      // 트릭: 각 낱자는 anchor 위치에서 시작 오프셋으로부터 보간되어 그려짐.
      // 이때 한글 완성형 자체는 progress가 충분할 때만 보이게 함.

      for (let i = 0; i < CHARS.length; i++) {
        const g = glyphs[i];
        const a = anchor[i];
        if (!a) continue;
        const ax = a.x + a.w / 2;
        const ay = a.y;

        if (g.isHangul) {
          // 각 낱자의 평균 진행도로 "완성 알파" 계산
          let avgProg = 0;
          let settledCount = 0;
          for (const j of g.jamos) {
            avgProg += j.progress;
            if (j.settled) settledCount++;
          }
          avgProg /= g.jamos.length;

          // 완성형 한글을 그리되, 낱자들이 모두 도착한 뒤에 본격적으로 선명해짐
          const fullAlpha = Math.max(0, (settledCount / g.jamos.length - 0.6) / 0.4);

          // 자소가 날아오는 동안에는 각 자소를 개별 그려 효과를 만듦
          for (const j of g.jamos) {
            if (j.alpha <= 0.01) continue;
            if (j.settled && fullAlpha > 0.5) continue; // 완성형이 가리면 자소 숨김

            const curX = ax + j.sx * (1 - j.progress);
            const curY = ay + j.sy * (1 - j.progress);
            const curRot = j.rot0 * (1 - j.progress);
            const scale = 0.5 + j.progress * 0.5;

            // 궤적선 (도착 전에만 잠깐)
            if (j.progress < 0.9 && j.progress > 0.05) {
              ui.save();
              ui.globalAlpha = textAlpha * 0.15 * j.alpha;
              ui.strokeStyle = "#111";
              ui.lineWidth = 0.4;
              ui.setLineDash([1, 2]);
              ui.beginPath();
              ui.moveTo(curX, curY);
              ui.lineTo(ax, ay);
              ui.stroke();
              ui.setLineDash([]);
              ui.restore();
            }

            ui.save();
            ui.globalAlpha = textAlpha * j.alpha * (1 - fullAlpha * 0.9);
            ui.translate(curX, curY);
            ui.rotate(curRot);
            ui.scale(scale, scale);
            ui.fillStyle = "#111";
            ui.font = `400 ${fontSize}px 'Noto Serif KR', serif`;
            ui.textAlign = "center";
            ui.textBaseline = "middle";
            ui.fillText(j.ch, 0, 0);
            ui.restore();
          }

          // 완성형 한글
          if (fullAlpha > 0.01) {
            ui.save();
            ui.globalAlpha = textAlpha * fullAlpha;
            ui.fillStyle = "#111";
            ui.font = `400 ${fontSize}px 'Noto Serif KR', serif`;
            ui.textAlign = "center";
            ui.textBaseline = "middle";
            ui.fillText(g.ch, ax, ay);
            ui.restore();
          }

          // 도착 플래시 — 가장 최근 도착한 낱자의 플래시를 글자 단위로 표시
          const maxFlash = Math.max(...g.jamos.map(j => j.settleFlash));
          if (maxFlash > 0 && fullAlpha > 0.3) {
            const fa = (maxFlash / 7) * textAlpha * 0.25;
            ui.fillStyle = `rgba(30,30,30,${fa.toFixed(3)})`;
            ui.fillRect(a.x - 1, a.y - fontSize * 0.6, a.w + 2, fontSize * 1.2);
          }
        } else {
          // 한글이 아닌 글자 (공백/영문/숫자/구두점) — 한 덩어리로 이동
          const j = g.single;
          if (j.alpha <= 0.01) continue;
          const curX = ax + j.sx * (1 - j.progress);
          const curY = ay + j.sy * (1 - j.progress);
          const curRot = j.rot0 * (1 - j.progress);
          const scale = 0.7 + j.progress * 0.3;

          if (j.progress < 0.9 && j.progress > 0.05 && CHARS[i] !== " ") {
            ui.save();
            ui.globalAlpha = textAlpha * 0.15 * j.alpha;
            ui.strokeStyle = "#111";
            ui.lineWidth = 0.4;
            ui.setLineDash([1, 2]);
            ui.beginPath();
            ui.moveTo(curX, curY);
            ui.lineTo(ax, ay);
            ui.stroke();
            ui.setLineDash([]);
            ui.restore();
          }

          ui.save();
          ui.globalAlpha = textAlpha * j.alpha;
          ui.translate(curX, curY);
          ui.rotate(curRot);
          ui.scale(scale, scale);
          ui.fillStyle = "#111";
          ui.font = `400 ${fontSize}px 'Noto Serif KR', serif`;
          ui.textAlign = "center";
          ui.textBaseline = "middle";
          ui.fillText(g.ch, 0, 0);
          ui.restore();

          if (j.settleFlash > 0) {
            const fa = (j.settleFlash / 7) * textAlpha * 0.25;
            ui.fillStyle = `rgba(30,30,30,${fa.toFixed(3)})`;
            ui.fillRect(a.x - 1, a.y - fontSize * 0.6, a.w + 2, fontSize * 1.2);
          }
        }
      }
    }

    /* ═══════════════════════════════════════
       EVENTS
       ═══════════════════════════════════════ */
    uiCvs.addEventListener("mousemove", e => {
      mouseX = e.clientX; mouseY = e.clientY;
      if (prevMX > -900) {
        // 홀딩 중에는 브러시 반경을 키워 더 강한 일렁임
        addTrail(prevMX, prevMY, mouseX, mouseY, isHolding ? 15 : 0);
      }
      prevMX = mouseX; prevMY = mouseY;
      if (isHolding) { holdX = mouseX; holdY = mouseY; }
    });
    uiCvs.addEventListener("mouseleave", () => { prevMX = -999; });

    uiCvs.addEventListener("mousedown", e => {
      isHolding = true;
      holdX = e.clientX; holdY = e.clientY;
      mouseX = e.clientX; mouseY = e.clientY;
    });
    uiCvs.addEventListener("mouseup", e => {
      isHolding = false;
      createApple(e.clientX, e.clientY);
    });

    uiCvs.addEventListener("touchstart", e => {
      e.preventDefault(); isHolding = true;
      mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY;
      holdX = mouseX; holdY = mouseY;
      prevMX = mouseX; prevMY = mouseY;
    });
    uiCvs.addEventListener("touchmove", e => {
      const tx = e.touches[0].clientX, ty = e.touches[0].clientY;
      if (prevMX > -900) addTrail(prevMX, prevMY, tx, ty, isHolding ? 15 : 0);
      mouseX = tx; mouseY = ty; prevMX = tx; prevMY = ty;
      holdX = tx; holdY = ty;
    });
    uiCvs.addEventListener("touchend", () => {
      isHolding = false; prevMX = -999;
      createApple(mouseX, mouseY);
    });

    /* ═══════════════════════════════════════
       LOOP
       ═══════════════════════════════════════ */
    function animate() {
      // 홀딩 중에는 제자리에서도 일렁임 지속
      if (isHolding) addStationaryShimmer(holdX, holdY);

      renderPaint();
      updateApples();
      renderShapes();
      ui.clearRect(0, 0, W, H);
      updateText();
      drawText();
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
