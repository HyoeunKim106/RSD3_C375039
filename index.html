<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Image Map</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300&display=swap" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden; background: #000;
    }
    .layer {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
    }
    .layer img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    #bg-layer { z-index: 1; }
    #reveal-layer {
      z-index: 2;
      -webkit-mask-image: radial-gradient(circle 0px at 50% 50%, rgba(0,0,0,1) 0%, rgba(0,0,0,0.3) 60%, rgba(0,0,0,0) 100%);
      mask-image: radial-gradient(circle 0px at 50% 50%, rgba(0,0,0,1) 0%, rgba(0,0,0,0.3) 60%, rgba(0,0,0,0) 100%);
    }
    #text-canvas {
      position: fixed; inset: 0;
      z-index: 3;
    }
  </style>
</head>
<body>

  <div id="bg-layer" class="layer">
    <img src="./assets/sample2.jpg" alt="background" />
  </div>
  <div id="reveal-layer" class="layer">
    <img src="./assets/sample1.jpg" alt="reveal" />
  </div>
  <canvas id="text-canvas"></canvas>

  <script>
    /* ═══════ Spotlight ═══════ */
    const reveal = document.getElementById("reveal-layer");
    let targetX = window.innerWidth/2, targetY = window.innerHeight/2;
    let currentX = targetX, currentY = targetY;
    let targetR = 0, currentR = 0;
    const RADIUS = 180, EASE = 0.07, R_EASE = 0.06;

    /* ═══════ Canvas ═══════ */
    const tc = document.getElementById("text-canvas");
    const ctx = tc.getContext("2d");
    let W, H;
    function resize() { W = tc.width = window.innerWidth; H = tc.height = window.innerHeight; }
    resize();
    window.addEventListener("resize", resize);

    const TEXT = "사과의시각적표상은없지만벡터가포함된완벽한3D모델을가지고있어요";
    const CYAN = "#00f0ff";
    const LEAF_GREEN = "#4ecf4e";

    let mouseX = W/2, mouseY = H/2;
    let isHolding = false;
    let holdAlpha = 0;
    let rotY = 0;
    let morphTo = 0;
    let currentShape = 0; // 0=구, 1=큐브, 2=원기둥, 3=토러스, 4=피라미드

    /* ═══════ 3D 사과 메쉬 생성 ═══════ */

    // 사과 몸통 프로파일
    function appleRadius(v) {
      const t = v / Math.PI; // 0(위)~1(아래)
      let r = Math.sin(v);

      // 위쪽 움푹
      if (t < 0.15) {
        r *= 0.3 + 0.7 * (t / 0.15);
      }
      // 가장 볼록한 부분을 살짝 아래로
      r *= 1.0 + 0.2 * Math.sin(v * 0.9 - 0.1);
      // 아래 살짝 모임
      if (t > 0.85) {
        r *= 1.0 - (t - 0.85) / 0.15 * 0.3;
      }
      return r * 90;
    }

    function appleY(v) {
      return -Math.cos(v) * 100;
    }

    // 사과 포인트
    const applePoints = [];
    const ROWS = 16, COLS = 22;
    let charIdx = 0;

    for (let row = 0; row < ROWS; row++) {
      const v = (row + 0.5) / ROWS * Math.PI;
      const r = appleRadius(v);
      const y = appleY(v);

      for (let col = 0; col < COLS; col++) {
        const u = (col / COLS) * Math.PI * 2;
        applePoints.push({
          // 사과 좌표
          ax: r * Math.cos(u),
          ay: y,
          az: r * Math.sin(u),
          char: TEXT[charIdx % TEXT.length],
          row, col,
          u, v
        });
        charIdx++;
      }
    }

    // 꼭지 (줄기)
    const stemPoints = [];
    for (let i = 0; i < 6; i++) {
      const t = i / 5;
      stemPoints.push({
        ax: Math.sin(t * 0.3) * 3,
        ay: -105 - t * 30,
        az: Math.cos(t * 0.2) * 2,
        char: "│",
        row: -1, col: i, u: 0, v: 0
      });
    }

    // 나뭇잎
    const leafPoints = [];
    const LEAF_CHARS = "잎잎잎잎잎잎잎잎잎잎잎잎";
    for (let i = 0; i < 18; i++) {
      const t = i / 17;
      // 잎 형태: 타원 곡선
      const leafLen = 40;
      const leafWid = 14;
      const along = t * leafLen;
      const across = Math.sin(t * Math.PI) * leafWid;

      // 잎이 오른쪽 위로 뻗음
      const angle = -0.6; // 기울기
      const lx = along * Math.cos(angle) - across * Math.sin(angle);
      const ly = along * Math.sin(angle) - across * Math.cos(angle);

      leafPoints.push({
        ax: lx + 5,
        ay: -128 + ly,
        az: across * 0.3,
        char: LEAF_CHARS[i % LEAF_CHARS.length],
        isLeaf: true,
        row: -2, col: i, u: 0, v: 0
      });
    }

    // 전체 포인트 합치기
    const allPoints = [...applePoints, ...stemPoints, ...leafPoints];

    // 각 포인트에 도형 좌표 미리 계산
    allPoints.forEach((p, i) => {
      const t = i / allPoints.length;
      const v = p.v || t * Math.PI;
      const u = p.u || t * Math.PI * 2;

      // 구
      p.sx = Math.sin(v) * Math.cos(u) * 90;
      p.sy = -Math.cos(v) * 90;
      p.sz = Math.sin(v) * Math.sin(u) * 90;

      // 큐브
      const ci = i % 6; // 6면
      const ct = (i % 50) / 50;
      const cs = 70;
      if (ci === 0) { p.cx = cs; p.cy = (ct-0.5)*cs*2; p.cz = (((i*7)%50)/50-0.5)*cs*2; }
      else if (ci === 1) { p.cx = -cs; p.cy = (ct-0.5)*cs*2; p.cz = (((i*7)%50)/50-0.5)*cs*2; }
      else if (ci === 2) { p.cy = cs; p.cx = (ct-0.5)*cs*2; p.cz = (((i*7)%50)/50-0.5)*cs*2; }
      else if (ci === 3) { p.cy = -cs; p.cx = (ct-0.5)*cs*2; p.cz = (((i*7)%50)/50-0.5)*cs*2; }
      else if (ci === 4) { p.cz = cs; p.cx = (ct-0.5)*cs*2; p.cy = (((i*7)%50)/50-0.5)*cs*2; }
      else { p.cz = -cs; p.cx = (ct-0.5)*cs*2; p.cy = (((i*7)%50)/50-0.5)*cs*2; }

      // 원기둥
      const cylA = (i / allPoints.length) * Math.PI * 2 * 3;
      const cylH = ((i % 30) / 30 - 0.5) * 180;
      p.ylx = Math.cos(cylA) * 60;
      p.yly = cylH;
      p.ylz = Math.sin(cylA) * 60;

      // 토러스
      const torU = (i / allPoints.length) * Math.PI * 2 * 4;
      const torV = ((i * 3) % allPoints.length) / allPoints.length * Math.PI * 2;
      const torR = 70, torr = 28;
      p.tx = (torR + torr * Math.cos(torV)) * Math.cos(torU);
      p.ty = torr * Math.sin(torV);
      p.tz = (torR + torr * Math.cos(torV)) * Math.sin(torU);

      // 피라미드
      const pyrT = (i % 40) / 40;
      const pyrH = ((i % 8) / 8 - 0.5) * 160;
      const pyrR2 = Math.max(0, 80 * (1 - (pyrH + 80) / 160));
      const pyrA2 = pyrT * Math.PI * 2;
      p.px = pyrR2 * Math.cos(pyrA2);
      p.py = pyrH;
      p.pz = pyrR2 * Math.sin(pyrA2);
    });

    /* ═══════ 투영 ═══════ */
    function project(x, y, z, cx, cy, ry) {
      const c = Math.cos(ry), s = Math.sin(ry);
      const rx2 = x * c - z * s;
      const rz2 = x * s + z * c;
      const p = 500 / (500 + rz2);
      return { x: cx + rx2 * p, y: cy + y * p, s: p, z: rz2 };
    }

    /* ═══════ 도형 좌표 얻기 ═══════ */
    function getShapePos(pt, shape) {
      switch(shape) {
        case 0: return { x: pt.sx, y: pt.sy, z: pt.sz };
        case 1: return { x: pt.cx, y: pt.cy, z: pt.cz };
        case 2: return { x: pt.ylx, y: pt.yly, z: pt.ylz };
        case 3: return { x: pt.tx, y: pt.ty, z: pt.tz };
        case 4: return { x: pt.px, y: pt.py, z: pt.pz };
        default: return { x: pt.sx, y: pt.sy, z: pt.sz };
      }
    }

    /* ═══════ 그리기 ═══════ */
    function drawAll(time) {
      const cx = mouseX, cy = mouseY;
      const drawList = [];

      for (const pt of allPoints) {
        const m = morphTo;
        const sh = getShapePos(pt, currentShape);

        const x3 = pt.ax * (1-m) + sh.x * m;
        const y3 = pt.ay * (1-m) + sh.y * m;
        const z3 = pt.az * (1-m) + sh.z * m;

        const proj = project(x3, y3, z3, cx, cy, rotY);
        const facing = proj.z < 50 ? 1.0 : 0.12;

        drawList.push({
          x: proj.x, y: proj.y,
          s: proj.s, z: proj.z,
          facing,
          char: pt.char,
          isLeaf: pt.isLeaf || false,
          isStem: pt.row === -1
        });
      }

      drawList.sort((a, b) => b.z - a.z);

      for (const d of drawList) {
        const alpha = holdAlpha * d.facing;
        if (alpha < 0.02) continue;

        const size = Math.max(6, 13 * d.s);

        ctx.save();
        ctx.translate(d.x, d.y);

        ctx.font = `300 ${size}px 'Noto Serif KR', serif`;
        const cw = ctx.measureText(d.char).width;

        // 박스
        const padX = 2, padY = 1;
        if (d.isLeaf) {
          ctx.fillStyle = `rgba(20, 80, 20, ${(alpha * 0.7).toFixed(2)})`;
        } else if (d.isStem) {
          ctx.fillStyle = `rgba(80, 40, 10, ${(alpha * 0.7).toFixed(2)})`;
        } else {
          ctx.fillStyle = `rgba(120, 10, 20, ${(alpha * 0.7).toFixed(2)})`;
        }
        ctx.fillRect(-cw/2 - padX, -size/2 - padY, cw + padX*2, size + padY*2);

        // 글자
        ctx.globalAlpha = alpha;
        if (d.isLeaf) {
          ctx.fillStyle = LEAF_GREEN;
        } else if (d.isStem) {
          ctx.fillStyle = "#8B6914";
        } else {
          ctx.fillStyle = CYAN;
        }
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(d.char, 0, 0);

        ctx.restore();
      }
    }

    /* ═══════ 이벤트 ═══════ */
    tc.addEventListener("mousemove", (e) => {
      targetX = e.clientX; targetY = e.clientY; targetR = RADIUS;
      mouseX = e.clientX; mouseY = e.clientY;
    });
    tc.addEventListener("mouseleave", () => { targetR = 0; });
    tc.addEventListener("mouseenter", () => { targetR = RADIUS; });
    tc.addEventListener("mousedown", () => { isHolding = true; });
    tc.addEventListener("mouseup", () => {
      isHolding = false;
      currentShape = Math.floor(Math.random() * 5);
    });
    tc.addEventListener("touchstart", (e) => {
      e.preventDefault(); isHolding = true;
      mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY;
      targetX = mouseX; targetY = mouseY; targetR = RADIUS;
    });
    tc.addEventListener("touchmove", (e) => {
      mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY;
      targetX = mouseX; targetY = mouseY;
    });
    tc.addEventListener("touchend", () => {
      isHolding = false;
      currentShape = Math.floor(Math.random() * 5);
    });

    /* ═══════ 루프 ═══════ */
    let time = 0;

    function animate() {
      time += 0.016;

      // spotlight
      currentX += (targetX - currentX) * EASE;
      currentY += (targetY - currentY) * EASE;
      currentR += (targetR - currentR) * R_EASE;
      reveal.style.webkitMaskImage = reveal.style.maskImage =
        `radial-gradient(circle ${currentR}px at ${currentX}px ${currentY}px, rgba(0,0,0,1) 0%, rgba(0,0,0,0.6) 50%, rgba(0,0,0,0) 100%)`;

      // 텍스트
      ctx.clearRect(0, 0, W, H);

      if (isHolding) {
        holdAlpha = Math.min(1, holdAlpha + 0.03);
        morphTo = Math.max(0, morphTo - 0.025);
      } else {
        if (holdAlpha > 0) {
          morphTo = Math.min(1, morphTo + 0.018);
          if (morphTo > 0.85) holdAlpha = Math.max(0, holdAlpha - 0.01);
        }
      }

      rotY += 0.015;

      if (holdAlpha > 0.01) drawAll(time);

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
