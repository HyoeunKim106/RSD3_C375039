  /* ─────────────────────────────────────────────
     14가지 시각 타입 정의
     각각: 폰트 / 색상 / 낱자 애니메이션 로직
  ───────────────────────────────────────────── */
  const TYPES = [
    /* 0 — 부유: 물속처럼 낱자가 각자 천천히 흐느적거림 */
    {
      font: "'Noto Serif KR', serif", size: "15px", weight: "200",
      color: () => `hsla(220,60%,55%,${0.5 + Math.random() * 0.4})`,
      anim: (el, i) => {
        const dx = (Math.random()-0.5)*60, dy = (Math.random()-0.5)*40;
        const dur = 4000 + Math.random()*3000;
        let start = null;
        const tick = ts => {
          if (!start) start = ts;
          const t = (ts - start) / dur;
          el.style.transform = `translate(${dx*Math.sin(t*Math.PI*2)}px,${dy*Math.cos(t*Math.PI*1.7+i)}px) rotate(${Math.sin(t*Math.PI*2)*3}deg)`;
          el.style.opacity = 0.4 + 0.55*(0.5 + 0.5*Math.sin(t*Math.PI*2+i));
          requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
      }
    },

    /* 1 — 하이라이트: 노란 형광펜 + 손글씨체, 글자 위아래 살랑 */

      font: "'Gaegu', cursive", size: "15px", weight: "700",
      color: () => "#1a1a1a",
      extraStyle: "background:linear-gradient(transparent 58%,#ffe066 58%);padding:0 1px;",
      anim: (el, i) => {
        const dur = 3000 + i*200;
        let start = null;
        const tick = ts => {
          if (!start) start = ts;
          const t = ((ts-start)%dur)/dur;
          el.style.transform = `scaleY(${1 + 0.08*Math.sin(t*Math.PI*2+i*0.8)}) translateY(${Math.sin(t*Math.PI*2+i)*2}px)`;

    },

      anim: (el, i) => {

        const dur = 5500 + i*280;
        let start = null;
        const tick = ts => {
          if (!start) start = ts;
          const t = ((ts-start)%dur)/dur;
          const ease = 0.5 - 0.5*Math.cos(t*Math.PI*2);

        const dur = 2000;
        let start = null;
        const tick = ts => {
          if (!start) start = ts;
          const t = ((ts-start + i*140) % dur) / dur;
          const lit = t < 0.09;
          el.style.opacity = lit ? 1 : 0.13;
          el.style.textShadow = lit ? `0 0 8px hsla(45,100%,65%,0.9)` : "none";

          requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
      }

    {

          vy += 0.28;
          y += vy;

          requestAnimationFrame(tick);
        };
        setTimeout(() => requestAnimationFrame(tick), i*190);
      }
    },

    /* 10 — 거울: 낱자가 좌우 뒤집히며 투명도 흔들림 */
    {
      font: "'Noto Serif KR', serif", size: "14px", weight: "200",
      color: () => `rgba(80,80,105,0.62)`,
      anim: (el, i) => {
        let s = null;
        const tick = ts => {
          if (!s) s = ts;
          const t = (ts-s)/1000;
          el.style.transform = `scaleX(${Math.cos(t*0.65+i*0.4) > 0 ? 1 : -1}) translateY(${Math.sin(t*1.2+i)*4}px)`;
          el.style.opacity = 0.25 + 0.55*Math.abs(Math.sin(t*0.9+i));
          requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
      }
    },

    /* 11 — 깨짐: 낱자들이 사방으로 흩어졌다 다시 조립 */
    {
      font: "'Black Han Sans', sans-serif", size: "18px", weight: "400",
      color: () => `rgba(20,20,20,${0.6+Math.random()*0.4})`,
      anim: (el, i) => {
        const ox = (Math.random()-0.5)*85, oy = (Math.random()-0.5)*65, rot = (Math.random()-0.5)*95;
        const dur = 8500;
        let s = null;
        const tick = ts => {
          if (!s) s = ts;
          const t = ((ts-s)%dur)/dur;
          const scatter = t < 0.45 ? (t/0.45) : 0;
          const gather = t > 0.6 ? Math.min((t-0.6)/0.32, 1) : 0;
          const g = 1 - Math.pow(1-gather, 3);
          const sc = scatter*(1-g);
          el.style.transform = `translate(${ox*sc}px,${oy*sc}px) rotate(${rot*sc}deg)`;
          el.style.opacity = g > 0 ? g : Math.max(1 - sc*0.7, 0.1);
          requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
      }
    },

    /* 12 — 밑줄파동: 손글씨체 + 밑줄 굵기가 같이 흔들림 */
    {
      font: "'Gaegu', cursive", size: "15px", weight: "700",
      color: () => `hsla(120,50%,${28+Math.random()*22}%,0.9)`,
      anim: (el, i) => {
        let s = null;
        const tick = ts => {
          if (!s) s = ts;
          const t = (ts-s)/1000;
          const v = Math.sin(t*2+i*0.6);
          el.style.transform = `translateY(${v*3}px) rotate(${v*2}deg)`;
          el.style.borderBottom = `${1+Math.abs(v)*2.5}px solid currentColor`;
          el.style.paddingBottom = "2px";
          requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
      }
    },

    /* 13 — 소용돌이: 낱자들이 원형 궤도를 그리며 나선 */
    {
      font: "'IBM Plex Mono', monospace", size: "13px", weight: "600",
      color: () => `hsla(${270+Math.random()*40},70%,${38+Math.random()*28}%,0.88)`,
      anim: (el, i, total) => {
        let s = null;
        const tick = ts => {
          if (!s) s = ts;
          const t = (ts-s)/1000;
          const angle = t*(0.5+i*0.05) + (i/total)*Math.PI*2;
          const r = (20+i*3)*(1 - Math.sin(t*0.28)*0.3);
          el.style.transform = `translate(${Math.cos(angle)*r/4}px,${Math.sin(angle)*r/6}px) rotate(${angle*30}deg) scale(${0.68+0.42*Math.abs(Math.sin(t+i))})`;
          el.style.opacity = 0.38 + 0.62*Math.abs(Math.sin(t*0.8+i));
          requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
      }
    },
  ];

  /* ─────────────────────────────────────────────
     CSV 파싱 유틸
  ───────────────────────────────────────────── */
  function parseCSV(text) {
    const lines = text.trim().split("\n");
    const headers = splitCSVLine(lines[0]);
    return lines.slice(1).map(line => {
      const vals = splitCSVLine(line), obj = {};
      headers.forEach((h, i) => { obj[h.trim()] = (vals[i] || "").trim(); });
      return obj;
    });
  }

  function splitCSVLine(line) {
    const res = []; let cur = "", inQ = false;
    for (const ch of line) {
      if (ch === '"') inQ = !inQ;
      else if (ch === ',' && !inQ) { res.push(cur); cur = ""; }
      else cur += ch;
    }
    res.push(cur);
    return res;
  }

  /* ─────────────────────────────────────────────
     DOM 노드 생성: 텍스트 → .mem > .ch 구조
  ───────────────────────────────────────────── */
  function buildNode(text, typeId, x, y) {
    const T = TYPES[typeId];
    const wrap = document.createElement('div');
    wrap.className = 'mem';
    wrap.style.left = x + "px";
    wrap.style.top  = y + "px";
    wrap.style.fontFamily = T.font;
    wrap.style.fontSize   = T.size;
    wrap.style.fontWeight = T.weight;

    const chars = [...text];
    const chEls = [];

    chars.forEach((ch, ci) => {
      if (ch === ' ') {
        const sp = document.createElement('span');
        sp.style.display = 'inline-block';
        sp.style.width = '0.32em';
        wrap.appendChild(sp);
        return;
      }
      const el = document.createElement('span');
      el.className = 'ch';
      el.textContent = ch;
      el.style.color = T.color();
      if (T.extraStyle) el.style.cssText += T.extraStyle;
      wrap.appendChild(el);
      chEls.push({ el, ci });
    });

    return { wrap, chEls, total: chEls.length, T };
  }

  /* ─────────────────────────────────────────────
     배치 충돌 방지
  ───────────────────────────────────────────── */
  const placed = [];
  function findPos(W, H, estW, estH) {
    let x, y, tries = 0;
    do {
      x = 20 + Math.random() * (W - estW - 40);
      y = 10 + Math.random() * (H - estH - 20);
      tries++;
    } while (tries < 50 && placed.some(r =>
      x < r.x+r.w+28 && x+estW+28 > r.x && y < r.y+r.h+28 && y+estH+28 > r.y
    ));
    placed.push({ x, y, w: estW, h: estH });
    return { x, y };
  }

  /* ─────────────────────────────────────────────
     컨테이너 자체의 완만한 부유 드리프트
  ───────────────────────────────────────────── */
  function startDrift(nodes) {
    const seeds = nodes.map(() => ({
      dx: (Math.random()-0.5)*55,
      dy: (Math.random()-0.5)*38,
      phase: Math.random()*Math.PI*2,
      spd: 0.00025 + Math.random()*0.00035
    }));
    let start = null;
    const tick = ts => {
      if (!start) start = ts;
      const elapsed = ts - start;
      nodes.forEach((wrap, i) => {
        const s = seeds[i];
        wrap.style.transform = `translate(${s.dx*Math.sin(elapsed*s.spd+s.phase)}px,${s.dy*Math.cos(elapsed*s.spd*0.7+s.phase+1)}px)`;
      });
      requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }

  /* ─────────────────────────────────────────────
     데이터 로드 및 렌더링
  ───────────────────────────────────────────── */
  const canvas = document.getElementById("canvas");
  const W = window.innerWidth;
  const H = window.innerHeight;
  let fallbackCounter = 0;
  const fallbackMap = new Map();

  fetch(CSV_URL)
    .then(r => r.text())
    .then(text => {
      const rows = parseCSV(text);
      const wraps = [];

      rows.forEach(row => {
        const noteText = (row[KEYS.note] || "").trim();
        const typeName = (row[KEYS.type] || "").trim();
        if (!noteText) return;

        let typeId;
        if (TYPE_NAME_TO_ID.hasOwnProperty(typeName)) {
          typeId = TYPE_NAME_TO_ID[typeName];
        } else if (fallbackMap.has(typeName)) {
          typeId = fallbackMap.get(typeName);
        } else {
          typeId = fallbackCounter % TYPES.length;
          fallbackMap.set(typeName, typeId);
          fallbackCounter++;
        }

        const estW = Math.min([...noteText].length * parseInt(TYPES[typeId].size) * 0.82, 240);
        const estH = 44;
        const { x, y } = findPos(W, H, estW, estH);

        const { wrap, chEls, total, T } = buildNode(noteText, typeId, x, y);
        canvas.appendChild(wrap);
        wraps.push(wrap);

        chEls.forEach(({ el, ci }) => T.anim(el, ci, total));
      });

      startDrift(wraps);
    })
    .catch(err => console.error("CSV 로드 실패:", err));
</script>
