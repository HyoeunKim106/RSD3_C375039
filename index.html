<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Image Map</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden; background: #f0ede8;
    }

    .layer {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
    }
    .layer img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    /* sample2 = base (no apple) */
    #bg-layer { z-index: 1; }

    /* sample1 = reveal (has apple emboss) — masked by canvas */
    #reveal-layer { z-index: 2; }

    /* interaction canvas on top */
    #ui-canvas {
      position: fixed; inset: 0;
      z-index: 4;
      pointer-events: auto;
    }

    .click-hint {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      font-family: 'Pretendard', sans-serif;
      font-size: 11px;
      font-weight: 300;
      color: rgba(80,80,80,0.35);
      letter-spacing: 0.04em;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- sample2 = background (plain, no apple) -->
  <div id="bg-layer" class="layer">
    <img src="./sample2.jpg" alt="background" />
  </div>

  <!-- sample1 = reveal layer (has the embossed apple) -->
  <div id="reveal-layer" class="layer">
    <img src="./sample1.jpg" alt="reveal" />
  </div>

  <canvas id="ui-canvas"></canvas>
  <div class="click-hint">hover to reveal · hold click for 3D</div>

  <script>
    /* ═══════════════════════════════════════════
       BRUSH-TRAIL REVEAL
       
       A trail of soft brush marks follows the
       cursor. Old marks fade quickly so the
       reveal only lives near the cursor — like
       running your finger over fogged glass.
       
       The mask canvas is converted to a data URL
       and applied as CSS mask on the reveal layer.
       ═══════════════════════════════════════════ */

    const reveal = document.getElementById("reveal-layer");
    const uiCanvas = document.getElementById("ui-canvas");
    const uiCtx = uiCanvas.getContext("2d");

    // Off-screen mask canvas
    const maskCvs = document.createElement("canvas");
    const maskCtx = maskCvs.getContext("2d", { willReadFrequently: true });

    let W, H;

    function resize() {
      W = window.innerWidth;
      H = window.innerHeight;
      uiCanvas.width = W;
      uiCanvas.height = H;
      // Mask at quarter res for performance
      maskCvs.width = Math.ceil(W / 3);
      maskCvs.height = Math.ceil(H / 3);
    }
    resize();
    window.addEventListener("resize", resize);

    /* ── Brush trail state ── */
    // We store recent brush points; each fades over time
    const trail = []; // { x, y, age, r }
    const TRAIL_LIFETIME = 40; // frames until fully gone
    const BRUSH_R = 90;       // base brush radius in full-res px

    let mouseX = W / 2, mouseY = H / 2;
    let prevMX = -999, prevMY = -999;
    let mouseInside = false;

    function addTrailPoints(x0, y0, x1, y1) {
      const dx = x1 - x0, dy = y1 - y0;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const steps = Math.max(1, Math.floor(dist / 8));
      const speed = Math.min(dist, 60);
      const r = BRUSH_R + speed * 0.5;

      for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        trail.push({
          x: x0 + dx * t,
          y: y0 + dy * t,
          age: 0,
          r: r + (Math.random() - 0.5) * 10
        });
      }
    }

    function buildMask() {
      const s = 1 / 3; // scale factor
      maskCtx.clearRect(0, 0, maskCvs.width, maskCvs.height);

      for (let i = trail.length - 1; i >= 0; i--) {
        const p = trail[i];
        p.age++;

        if (p.age > TRAIL_LIFETIME) {
          trail.splice(i, 1);
          continue;
        }

        // Alpha: fade in quickly, fade out over lifetime
        const life = p.age / TRAIL_LIFETIME; // 0→1
        let alpha;
        if (life < 0.05) {
          alpha = life / 0.05; // quick fade in
        } else {
          alpha = 1.0 - ((life - 0.05) / 0.95);
        }
        alpha = Math.pow(alpha, 1.5) * 0.9; // ease out

        if (alpha < 0.01) continue;

        const mx = p.x * s, my = p.y * s, mr = p.r * s;
        const grad = maskCtx.createRadialGradient(mx, my, 0, mx, my, mr);
        grad.addColorStop(0, `rgba(255,255,255,${alpha.toFixed(3)})`);
        grad.addColorStop(0.4, `rgba(255,255,255,${(alpha * 0.55).toFixed(3)})`);
        grad.addColorStop(0.7, `rgba(255,255,255,${(alpha * 0.2).toFixed(3)})`);
        grad.addColorStop(1, `rgba(255,255,255,0)`);

        maskCtx.fillStyle = grad;
        maskCtx.beginPath();
        maskCtx.arc(mx, my, mr, 0, Math.PI * 2);
        maskCtx.fill();
      }
    }

    function applyMask() {
      const url = maskCvs.toDataURL();
      reveal.style.webkitMaskImage = `url(${url})`;
      reveal.style.maskImage = `url(${url})`;
      reveal.style.webkitMaskSize = "100% 100%";
      reveal.style.maskSize = "100% 100%";
    }


    /* ═══════════════════════════════════════════
       SVG FILTER — subtle organic ripple on reveal
       ═══════════════════════════════════════════ */

    const svgNS = "http://www.w3.org/2000/svg";
    const svgEl = document.createElementNS(svgNS, "svg");
    svgEl.setAttribute("width", "0");
    svgEl.setAttribute("height", "0");
    svgEl.style.position = "absolute";
    svgEl.innerHTML = `
      <defs>
        <filter id="ink-ripple" x="-5%" y="-5%" width="110%" height="110%">
          <feTurbulence id="turb" type="fractalNoise"
            baseFrequency="0.03 0.025" numOctaves="3" seed="1" result="noise"/>
          <feDisplacementMap id="disp" in="SourceGraphic" in2="noise"
            scale="8" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
      </defs>
    `;
    document.body.appendChild(svgEl);
    const turbEl = document.getElementById("turb");
    reveal.style.filter = "url(#ink-ripple)";


    /* ═══════════════════════════════════════════
       3D APPLE — tilted elliptical orbit rings
       ═══════════════════════════════════════════ */

    const TEXT = "사과의시각적표상은없지만벡터가포함된완벽한3D모델을가지고있어요";

    let isHolding = false;
    let holdAlpha = 0;
    let rotY = 0;

    // Apple profile: realistic cross-section
    function appleProfile(t) {
      // t: 0=top(stem), 1=bottom
      const y = (t - 0.45) * 210;
      let r;
      if (t < 0.08) {
        r = t / 0.08 * 0.35;
      } else if (t < 0.40) {
        const s = (t - 0.08) / 0.32;
        r = 0.35 + 0.65 * Math.pow(Math.sin(s * Math.PI / 2), 0.7);
      } else if (t < 0.75) {
        const s = (t - 0.40) / 0.35;
        r = 1.0 - 0.08 * s;
      } else {
        const s = (t - 0.75) / 0.25;
        r = 0.92 * (1.0 - Math.pow(s, 1.5));
        if (s > 0.85) r *= 1.0 - (s - 0.85) / 0.15 * 0.3;
      }
      return { r: r * 75, y };
    }

    const applePoints = [];
    let charIdx = 0;
    const NUM_ORBITS = 12;
    const PTS_PER_ORBIT = 38;

    for (let o = 0; o < NUM_ORBITS; o++) {
      const tiltAngle = (o / NUM_ORBITS) * Math.PI;

      for (let i = 0; i < PTS_PER_ORBIT; i++) {
        const theta = (i / PTS_PER_ORBIT) * Math.PI * 2;
        let sx = Math.cos(theta), sy = Math.sin(theta), sz = 0;

        const ct = Math.cos(tiltAngle), st = Math.sin(tiltAngle);
        const rx = sx * ct - sz * st;
        const rz = sx * st + sz * ct;

        const t = (sy + 1) / 2;
        const prof = appleProfile(t);
        const hLen = Math.sqrt(rx * rx + rz * rz);
        let hx = 0, hz = 0;
        if (hLen > 0.001) {
          hx = (rx / hLen) * prof.r;
          hz = (rz / hLen) * prof.r;
        }

        applePoints.push({
          ax: hx, ay: prof.y, az: hz,
          char: TEXT[charIdx % TEXT.length]
        });
        charIdx++;
      }
    }

    // Stem
    for (let i = 0; i < 6; i++) {
      const t = i / 5;
      applePoints.push({ ax: Math.sin(t * 0.4) * 2, ay: -98 - t * 22, az: 0, char: "│", isStem: true });
    }
    // Leaf
    for (let i = 0; i < 10; i++) {
      const t = i / 9;
      const along = t * 24, across = Math.sin(t * Math.PI) * 8;
      const a = -0.5;
      applePoints.push({
        ax: along * Math.cos(a) - across * Math.sin(a) + 3,
        ay: -108 + along * Math.sin(a) - across * Math.cos(a),
        az: across * 0.2,
        char: "잎", isLeaf: true
      });
    }

    function project(x, y, z, cx, cy, ry) {
      const c = Math.cos(ry), s = Math.sin(ry);
      const rx2 = x * c - z * s, rz2 = x * s + z * c;
      const p = 500 / (500 + rz2);
      return { x: cx + rx2 * p, y: cy + y * p, s: p, z: rz2 };
    }

    function drawApple() {
      const cx = mouseX, cy = mouseY;
      const list = [];

      for (const pt of applePoints) {
        const proj = project(pt.ax, pt.ay, pt.az, cx, cy, rotY);
        list.push({
          x: proj.x, y: proj.y, s: proj.s, z: proj.z,
          facing: proj.z < 60 ? 1.0 : 0.04,
          char: pt.char
        });
      }
      list.sort((a, b) => b.z - a.z);

      for (const d of list) {
        const a = holdAlpha * d.facing;
        if (a < 0.015) continue;
        const size = Math.max(4, 9 * d.s);

        uiCtx.save();
        uiCtx.translate(d.x, d.y);
        uiCtx.font = `300 ${size}px 'Pretendard', sans-serif`;
        uiCtx.globalAlpha = a;
        uiCtx.fillStyle = "#222";
        uiCtx.textAlign = "center";
        uiCtx.textBaseline = "middle";
        uiCtx.letterSpacing = "-0.5px";
        uiCtx.fillText(d.char, 0, 0);
        uiCtx.restore();
      }
    }


    /* ═══════════════════════════════════════════
       EVENTS
       ═══════════════════════════════════════════ */

    uiCanvas.addEventListener("mousemove", (e) => {
      mouseX = e.clientX; mouseY = e.clientY;
      mouseInside = true;
      if (prevMX > -900) {
        addTrailPoints(prevMX, prevMY, mouseX, mouseY);
      }
      prevMX = mouseX; prevMY = mouseY;
    });

    uiCanvas.addEventListener("mouseleave", () => {
      mouseInside = false;
      prevMX = -999; prevMY = -999;
    });
    uiCanvas.addEventListener("mouseenter", () => {
      mouseInside = true;
    });

    uiCanvas.addEventListener("mousedown", () => { isHolding = true; });
    uiCanvas.addEventListener("mouseup", () => { isHolding = false; });

    uiCanvas.addEventListener("touchstart", (e) => {
      e.preventDefault();
      isHolding = true; mouseInside = true;
      mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY;
      prevMX = mouseX; prevMY = mouseY;
    });
    uiCanvas.addEventListener("touchmove", (e) => {
      const tx = e.touches[0].clientX, ty = e.touches[0].clientY;
      if (prevMX > -900) addTrailPoints(prevMX, prevMY, tx, ty);
      mouseX = tx; mouseY = ty;
      prevMX = tx; prevMY = ty;
    });
    uiCanvas.addEventListener("touchend", () => {
      isHolding = false; mouseInside = false;
      prevMX = -999; prevMY = -999;
    });


    /* ═══════════════════════════════════════════
       ANIMATION LOOP
       ═══════════════════════════════════════════ */

    let time = 0;
    let frame = 0;

    function animate() {
      time += 0.016;
      frame++;

      // Build + apply mask
      buildMask();
      if (frame % 2 === 0) applyMask(); // every other frame for perf

      // Subtle turbulence animation for organic ripple
      const bf1 = 0.028 + Math.sin(time * 0.35) * 0.004;
      const bf2 = 0.023 + Math.cos(time * 0.28) * 0.003;
      turbEl.setAttribute("baseFrequency", `${bf1.toFixed(4)} ${bf2.toFixed(4)}`);

      // UI canvas: 3D apple
      uiCtx.clearRect(0, 0, W, H);

      if (isHolding) holdAlpha = Math.min(1, holdAlpha + 0.035);
      else holdAlpha = Math.max(0, holdAlpha - 0.025);

      rotY += 0.01;

      if (holdAlpha > 0.01) drawApple();

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
