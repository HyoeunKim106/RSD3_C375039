<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Image Map</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #f0ede8; }
    .bg-img {
      position: fixed; inset: 0; z-index: 1;
      width: 100%; height: 100%; object-fit: cover;
    }
    #paint-canvas {
      position: fixed; inset: 0; z-index: 2;
      width: 100%; height: 100%; pointer-events: none;
    }
    #ui-canvas {
      position: fixed; inset: 0; z-index: 3;
      pointer-events: auto; cursor: crosshair;
    }
    .hint {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%); z-index: 5;
      font: 300 11px 'Pretendard', sans-serif;
      color: rgba(80,80,80,0.25);
      letter-spacing: 0.04em; pointer-events: none;
    }
  </style>
</head>
<body>

  <img class="bg-img" src="./assets/sample2.jpg" alt="bg" />
  <canvas id="paint-canvas"></canvas>
  <canvas id="ui-canvas"></canvas>
  <div class="hint">hover to reveal · hold for text</div>

  <script>
    const paintCvs = document.getElementById("paint-canvas");
    const paintCtx = paintCvs.getContext("2d");
    const uiCvs = document.getElementById("ui-canvas");
    const ui = uiCvs.getContext("2d");

    let W, H;
    const paintImg = new Image();
    paintImg.src = "./assets/sample1.jpg";
    let imgReady = false;
    paintImg.onload = () => { imgReady = true; };

    function resize() {
      W = window.innerWidth; H = window.innerHeight;
      paintCvs.width = W; paintCvs.height = H;
      uiCvs.width = W; uiCvs.height = H;
    }
    resize();
    window.addEventListener("resize", resize);

    /* ═══════════════════════════════════════
       BRUSH PAINT REVEAL
       ═══════════════════════════════════════ */
    const trail = [];
    const LIFETIME = 50, BRUSH_R = 80;
    let mouseX = 0, mouseY = 0, prevMX = -999, prevMY = -999;

    function addTrail(x0, y0, x1, y1) {
      const dx = x1 - x0, dy = y1 - y0;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const steps = Math.max(1, Math.floor(dist / 6));
      const r = BRUSH_R + Math.min(dist, 50) * 0.6;
      for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        trail.push({ x: x0 + dx * t, y: y0 + dy * t, age: 0, r: r + (Math.random() - 0.5) * 12 });
      }
    }

    function renderPaint() {
      paintCtx.clearRect(0, 0, W, H);
      if (!imgReady || trail.length === 0) return;
      paintCtx.save();
      for (let i = trail.length - 1; i >= 0; i--) {
        const p = trail[i]; p.age++;
        if (p.age > LIFETIME) { trail.splice(i, 1); continue; }
        const life = p.age / LIFETIME;
        let a = life < 0.04 ? life / 0.04 : 1 - Math.pow((life - 0.04) / 0.96, 0.8);
        a *= 0.95;
        if (a < 0.005) continue;
        const g = paintCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
        g.addColorStop(0,   `rgba(255,255,255,${a.toFixed(3)})`);
        g.addColorStop(0.3, `rgba(255,255,255,${(a * 0.7).toFixed(3)})`);
        g.addColorStop(0.6, `rgba(255,255,255,${(a * 0.3).toFixed(3)})`);
        g.addColorStop(1,   `rgba(255,255,255,0)`);
        paintCtx.fillStyle = g;
        paintCtx.beginPath();
        paintCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        paintCtx.fill();
      }
      paintCtx.globalCompositeOperation = "source-in";
      paintCtx.drawImage(paintImg, 0, 0, W, H);
      paintCtx.restore();
    }

    /* ═══════════════════════════════════════
       TEXT MOTION — loops while holding

       One sentence, typed out char by char,
       holds briefly, fades out, then restarts.
       All while mouse is held down.
       ═══════════════════════════════════════ */

    const SENTENCE = "사과의 시각적 표상은 없지만 벡터가 포함된 완벽한 3D 모델을 가지고 있어요";
    const CHARS = [...SENTENCE];

    let isHolding = false;
    let holdX = 0, holdY = 0;

    // Animation state machine
    // phases: idle → typing → hold → fadeout → (restart)
    let textPhase = "idle";
    let textTimer = 0;
    let revealed = 0;       // float, how many chars shown
    let textAlpha = 1;
    const TYPE_SPEED = 0.55;
    const HOLD_DUR = 70;    // frames to hold after typing

    // Per-char glitch
    const glitch = CHARS.map(() => ({ ox: 0, oy: 0, on: false, t: 0 }));

    function resetText() {
      textPhase = "typing";
      textTimer = 0;
      revealed = 0;
      textAlpha = 1;
      glitch.forEach(g => { g.ox = 0; g.oy = 0; g.on = false; g.t = 0; });
    }

    function updateText() {
      if (textPhase === "idle") {
        if (isHolding) resetText();
        return;
      }

      // If released during any phase, fade out
      if (!isHolding && textPhase !== "fadeout") {
        textPhase = "fadeout";
      }

      textTimer++;

      if (textPhase === "typing") {
        revealed += TYPE_SPEED;
        // random micro-stutter
        if (Math.random() < 0.04) revealed -= 0.2;
        if (revealed >= CHARS.length) {
          revealed = CHARS.length;
          textPhase = "hold";
          textTimer = 0;
        }
      }
      else if (textPhase === "hold") {
        if (textTimer > HOLD_DUR) {
          textPhase = "fadeout";
          textTimer = 0;
        }
      }
      else if (textPhase === "fadeout") {
        textAlpha -= 0.025;
        if (textAlpha <= 0) {
          textAlpha = 0;
          // If still holding, restart loop
          if (isHolding) {
            resetText();
          } else {
            textPhase = "idle";
          }
        }
      }

      // Glitch updates
      for (let i = 0; i < CHARS.length; i++) {
        const g = glitch[i];
        if (g.on) {
          g.t--;
          g.ox = (Math.random() - 0.5) * 2.5;
          g.oy = (Math.random() - 0.5) * 1.5;
          if (g.t <= 0) { g.on = false; g.ox = 0; g.oy = 0; }
        } else if (Math.random() < 0.01 && textPhase !== "fadeout") {
          g.on = true;
          g.t = 2 + Math.floor(Math.random() * 3);
        }
      }
    }

    function drawText() {
      if (textPhase === "idle") return;

      const fontSize = 14;
      ui.font = `300 ${fontSize}px 'Pretendard', sans-serif`;
      ui.textBaseline = "middle";
      ui.letterSpacing = "-0.3px";

      const nShow = Math.floor(revealed);

      // Measure char widths
      const cw = [];
      let totalW = 0;
      for (const ch of CHARS) {
        const w = ui.measureText(ch).width;
        cw.push(w);
        totalW += w;
      }

      const startX = holdX - totalW / 2;
      const baseY = holdY;
      let cx = startX;

      for (let i = 0; i < CHARS.length; i++) {
        const w = cw[i];
        const g = glitch[i];

        if (i < nShow) {
          // Recent-char highlight box
          const recency = nShow - i;
          if (recency <= 3 && textPhase === "typing") {
            const boxA = (1 - recency / 3) * 0.18 * textAlpha;
            ui.fillStyle = `rgba(30,30,30,${boxA.toFixed(3)})`;
            ui.fillRect(cx - 1, baseY - fontSize * 0.55, w + 2, fontSize * 1.1);
          }

          ui.save();
          ui.globalAlpha = textAlpha;
          ui.fillStyle = "#111";
          ui.fillText(CHARS[i], cx + g.ox, baseY + g.oy);
          ui.restore();
        }

        // Blinking cursor at typing head
        if (i === nShow && textPhase === "typing") {
          if (Math.sin(textTimer * 0.3) > 0) {
            ui.save();
            ui.globalAlpha = 0.75 * textAlpha;
            ui.fillStyle = "#111";
            ui.fillRect(cx, baseY - fontSize * 0.45, 1.2, fontSize * 0.9);
            ui.restore();
          }
        }

        cx += w;
      }

      // Underline after typed
      if (textPhase === "hold" || textPhase === "fadeout") {
        const prog = textPhase === "hold" ? Math.min(1, textTimer / 12) : 1;
        ui.save();
        ui.globalAlpha = textAlpha * 0.15;
        ui.strokeStyle = "#111";
        ui.lineWidth = 0.5;
        ui.beginPath();
        ui.moveTo(startX, baseY + fontSize * 0.6);
        ui.lineTo(startX + totalW * prog, baseY + fontSize * 0.6);
        ui.stroke();
        ui.restore();
      }
    }

    /* ═══════════════════════════════════════
       EVENTS
       ═══════════════════════════════════════ */
    uiCvs.addEventListener("mousemove", e => {
      mouseX = e.clientX; mouseY = e.clientY;
      if (prevMX > -900) addTrail(prevMX, prevMY, mouseX, mouseY);
      prevMX = mouseX; prevMY = mouseY;
      // Update hold position if holding
      if (isHolding) { holdX = mouseX; holdY = mouseY; }
    });
    uiCvs.addEventListener("mouseleave", () => { prevMX = -999; });

    uiCvs.addEventListener("mousedown", e => {
      isHolding = true;
      holdX = e.clientX; holdY = e.clientY;
    });
    uiCvs.addEventListener("mouseup", () => { isHolding = false; });

    uiCvs.addEventListener("touchstart", e => {
      e.preventDefault(); isHolding = true;
      mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY;
      holdX = mouseX; holdY = mouseY;
      prevMX = mouseX; prevMY = mouseY;
    });
    uiCvs.addEventListener("touchmove", e => {
      const tx = e.touches[0].clientX, ty = e.touches[0].clientY;
      if (prevMX > -900) addTrail(prevMX, prevMY, tx, ty);
      mouseX = tx; mouseY = ty; prevMX = tx; prevMY = ty;
      holdX = tx; holdY = ty;
    });
    uiCvs.addEventListener("touchend", () => { isHolding = false; prevMX = -999; });

    /* ═══════════════════════════════════════
       LOOP
       ═══════════════════════════════════════ */
    function animate() {
      renderPaint();
      ui.clearRect(0, 0, W, H);
      updateText();
      drawText();
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
