<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grouped Memory Map</title>
    <style>
      /* 1. 화면 전체를 도화지로 쓰는 기본 뼈대 */
      body {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden; /* 스크롤바 방지 */
        background-color: #ffffff;
        font-family: sans-serif;
      }

      #canvas {
        position: relative;
        width: 100%;
        height: 100%;
      }

      /* 2. 텍스트 조각들의 공통 속성 */
      .floating-text {
        position: absolute;
        font-size: 11px;
        color: #333333;
        max-width: 150px;
        word-break: keep-all;
        line-height: 1.4;
        user-select: none;
      }

      /* 3. 8가지 기억 조직 방식별 애니메이션 및 색상 부여 */
      .type-0 { color: #ff4d4d; animation: moveY_slow 3s infinite alternate ease-in-out; }
      @keyframes moveY_slow { from { transform: translateY(0); } to { transform: translateY(-15px); } }

      .type-1 { color: #3498db; animation: pulse_opacity 2.5s infinite alternate ease-in-out; }
      @keyframes pulse_opacity { from { opacity: 1; } to { opacity: 0.3; } }

      .type-2 { color: #27ae60; animation: scale_gently 4s infinite alternate ease-in-out; }
      @keyframes scale_gently { from { transform: scale(1); } to { transform: scale(1.3); } }

      .type-3 { color: #8e44ad; animation: moveX_subtle 3.5s infinite alternate ease-in-out; }
      @keyframes moveX_subtle { from { transform: translateX(-10px); } to { transform: translateX(10px); } }

      .type-4 { color: #f1c40f; animation: rotate_gentle 3.2s infinite alternate ease-in-out; }
      @keyframes rotate_gentle { from { transform: rotate(0deg); } to { transform: rotate(10deg); } }

      .type-5 { color: #e67e22; animation: stretch_gentle 3.8s infinite alternate ease-in-out; }
      @keyframes stretch_gentle { from { transform: scaleX(1); } to { transform: scaleX(1.4); } }

      .type-6 { color: #e84393; animation: pulse_both 2.8s infinite alternate ease-in-out; }
      @keyframes pulse_both { from { opacity: 1; transform: scale(1); } to { opacity: 0.4; transform: scale(1.2); } }

      .type-7 { color: #7f8c8d; animation: shake_blink 2.6s infinite alternate ease-in-out; }
      @keyframes shake_blink { 
        0% { transform: translateY(0); opacity: 1; } 
        50% { transform: translateY(-5px); }
        100% { transform: translateY(5px); opacity: 0.5; }
      }
    </style>
  </head>
  <body>

    <div id="canvas"></div>

    <script>
      const SPREADSHEET_ID = "1pintIO8VNpryzS56eqXaNjqzx5f3EeAV";
      
      // ★ 여기가 수정된 부분입니다: 시트의 새로운 헤더 이름과 정확히 맞춤 ★
      const KEYS = { 
        note: "당사자의 직접 설명", // 기존 "UL-Note"에서 변경
        type: "기억 조직 방식" 
      }; 

      const CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv`;

      // CSV 텍스트를 자바스크립트 객체 배열로 변환
      function parseCSV(text) {
        const lines = text.trim().split("\n");
        const headers = splitCSVLine(lines[0]);
        return lines.slice(1).map((line) => {
          const values = splitCSVLine(line);
          const obj = {};
          headers.forEach((h, i) => {
            obj[h.trim()] = (values[i] || "").trim();
          });
          return obj;
        });
      }

      // 쉼표로 구분하되, 큰따옴표 안의 쉼표는 무시하는 함수
      function splitCSVLine(line) {
        const result = [];
        let current = "";
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (ch === '"') {
            inQuotes = !inQuotes;
          } else if (ch === "," && !inQuotes) {
            result.push(current);
            current = "";
          } else {
            current += ch;
          }
        }
        result.push(current);
        return result;
      }

      // 시트 데이터 가져오기
      fetch(CSV_URL)
        .then((res) => {
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return res.text();
        })
        .then((text) => {
          const rows = parseCSV(text);
          const canvas = document.getElementById("canvas");

          const typeMap = new Map();
          let typeCounter = 0;

          rows.forEach((row) => {
            const noteText = row[KEYS.note];
            const typeName = row[KEYS.type] || "미분류";
            
            // 텍스트가 비어있으면 출력하지 않음
            if (!noteText || noteText.trim() === "") return;

            // 새로운 유형이 나올 때마다 번호(0~7)를 순차적으로 부여
            if (!typeMap.has(typeName)) {
              typeMap.set(typeName, typeCounter % 8); 
              typeCounter++;
            }

            const typeId = typeMap.get(typeName);
            const span = document.createElement("div");
            
            // 기본 클래스와 해당 그룹의 애니메이션 클래스를 함께 부여
            span.className = `floating-text type-${typeId}`;
            span.textContent = noteText;

            // 화면의 5% ~ 90% 사이 무작위 좌표에 배치
            const randomTop = Math.floor(Math.random() * 85) + 5;
            const randomLeft = Math.floor(Math.random() * 85) + 5;

            span.style.top = `${randomTop}vh`;
            span.style.left = `${randomLeft}vw`;

            canvas.appendChild(span);
          });
        })
        .catch((err) => {
          console.error("Error:", err);
          document.body.innerHTML = `<p style="color:red; text-align:center; margin-top:20px;">데이터를 불러오는 중 오류가 발생했습니다. 시트 공유 설정과 헤더 이름을 확인해 주세요.</p>`;
        });
    </script>
  </body>
</html>
