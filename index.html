function parseCSV(text) {
  const lines = text.trim().split("\n");
  const headers = splitLine(lines[0]);
  return lines.slice(1).map(line => {
    const v = splitLine(line), obj = {};
    headers.forEach((h,i) => { obj[h.trim()]=(v[i]||"").trim(); });
    return obj;
  });
}
function splitLine(line) {
  const r=[]; let cur="", inQ=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"') inQ=!inQ;
    else if(ch===','&&!inQ){r.push(cur);cur="";}
    else cur+=ch;
  }
  r.push(cur); return r;
}

const floatingChars = [];

function buildCharsForText(text, typeId, groupX, groupY) {
  const style = T[typeId] || T[0];
  const chars = [...text];
  const total = chars.length;
  // 11px Noto Serif KR + scaleX(0.98) + letter-spacing -0.03em 기준 평균 글자 폭
  const charW = 9.8;
  const startX = groupX - (total * charW) / 2;

  chars.forEach((char, i) => {
    if (char === ' ') return;
    const el = document.createElement('span');
    el.className = 'char-node';
    el.textContent = char;
    el.style.fontWeight = style.weight;
    if (style.color) el.style.color = style.color;
    if (typeof style.opacity === 'number') el.style.opacity = style.opacity;

    const baseX = startX + i * charW;
    const baseY = groupY;
    el.style.left = baseX + "px";
    el.style.top  = baseY + "px";

    style.effect(el, i, total);
    document.getElementById("canvas").appendChild(el);

    if (style.float > 0) {
      floatingChars.push({
        el, baseX, baseY,
        freqX:  0.0003 + Math.random() * style.speed * 2,
        freqY:  0.0002 + Math.random() * style.speed * 2,
        phaseX: Math.random() * Math.PI * 2,
        phaseY: Math.random() * Math.PI * 2,
        ampX:   style.float * (0.4 + Math.random() * 0.6),
        ampY:   style.float * (0.4 + Math.random() * 0.6),
        rotAmp: (Math.random() - 0.5) * 2.5,
        freqR:  0.0001 + Math.random() * 0.0003,
        phaseR: Math.random() * Math.PI * 2,
      });
    }
  });
}

function animate(ts) {
  floatingChars.forEach(fc => {
    const dx = Math.sin(ts * fc.freqX + fc.phaseX) * fc.ampX;
    const dy = Math.cos(ts * fc.freqY + fc.phaseY) * fc.ampY;
    const dr = Math.sin(ts * fc.freqR + fc.phaseR) * fc.rotAmp;
    fc.el.style.left = fc.baseX + "px";
    fc.el.style.top  = fc.baseY + "px";
    // scaleX(0.98) 장평 항상 포함
    fc.el.style.transform = `translate(${dx}px,${dy}px) rotate(${dr}deg) scaleX(0.98)`;
  });
  requestAnimationFrame(animate);
}

fetch(CSV_URL)
  .then(r => r.text())
  .then(text => {
    const rows = parseCSV(text);
    const fallback = new Map(); let fc = 0;
    const W = window.innerWidth, H = window.innerHeight;
    rows.forEach(row => {
      const note = row[KEYS.note];
      const typeName = (row[KEYS.type]||"").trim();
      if (!note || !note.trim()) return;
      const id = TYPE_NAME_TO_ID.hasOwnProperty(typeName)
        ? TYPE_NAME_TO_ID[typeName]
        : (fallback.has(typeName)?fallback.get(typeName):(fallback.set(typeName,fc%80),fc++,fallback.get(typeName)));
      buildCharsForText(note.trim(), id,
        80 + Math.random()*(W-160),
        60 + Math.random()*(H-120));
    });
    requestAnimationFrame(animate);
  })
  .catch(() => {
    const demos = [
      ["그날의 공기가 기억난다",0],["사실만 남기고 싶었다",3],
      ["연결되어 있다는 느낌",2],["몸이 먼저 알았다",24],
      ["이름을 붙이면 사라진다",7],["수치로 변환하면 편하다",46],
      ["형광펜을 그었다",47],["조각들이 맞춰졌다",58],
    ];
    const W=window.innerWidth, H=window.innerHeight;
    demos.forEach(([t,id])=>{ buildCharsForText(t,id,100+Math.random()*(W-200),80+Math.random()*(H-160)); });
    requestAnimationFrame(animate);
  });
</script>
