<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory Typo Map - Drifting Shapes</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />

    <style>
      body {
        margin: 0; padding: 0; width: 100vw; height: 100vh;
        overflow: hidden; background-color: #ffffff;
        font-family: 'Pretendard', -apple-system, BlinkMacSystemFont,
                     'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      }
      #canvas { position: relative; width: 100%; height: 100%; }

      .floating-text {
        position: absolute;
        font-size: 11px;
        font-weight: 300;
        color: #000000;
        max-width: 150px;
        word-break: keep-all;
        line-height: 1.5;
        user-select: none;
        transition: all 0.3s ease;
        z-index: 10;
        cursor: pointer;
        font-family: inherit;
      }
      .floating-text:hover {
        font-size: 18px;
        font-weight: 500;
        text-shadow: 0 0 10px rgba(255,255,255,0.8);
      }

      .memory-shape {
        position: absolute; width: 45px; height: 45px;
        background-color: #333;
        pointer-events: none; z-index: 5;
        margin-left: -22.5px; margin-top: -22.5px;
        opacity: 0;
        transition: left 8s ease-in-out, top 8s ease-in-out, transform 8s ease-in-out, opacity 0.5s ease-out;
      }
      .shape-0{clip-path:circle(50% at 50% 50%)}
      .shape-1{clip-path:inset(5% 10% 5% 10%)}
      .shape-2{clip-path:polygon(50% 0%,0% 100%,100% 100%)}
      .shape-3{clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%)}
      .shape-4{clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%)}
      .shape-5{clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%)}
      .shape-6{clip-path:ellipse(25% 45% at 50% 50%)}
      .shape-7{clip-path:polygon(20% 0%,80% 0%,100% 100%,0% 100%)}

      /* 0: 남의 일처럼 읽기 — 작고 멀게, 가장자리에서 천천히 지나감 */
      .type-0{animation:t0 12s infinite ease-in-out}
      @keyframes t0{0%,100%{transform:translateX(-18px) scale(.82);opacity:.35}50%{transform:translateX(18px) scale(.82);opacity:.40}}

      /* 1: 증거 자료 확인하기 — step 방식으로 순차 등장 */
      .type-1{animation:t1 6s infinite step-end}
      @keyframes t1{0%{opacity:.1;letter-spacing:3px}25%{opacity:.45;letter-spacing:2px}50%{opacity:.75;letter-spacing:1px}75%{opacity:1;letter-spacing:0}100%{opacity:.1;letter-spacing:3px}}

      /* 2: 남남인 사건 연결 — 각자 움직이다 연결만 성립 */
      .type-2{animation:t2 8s infinite ease-in-out}
      @keyframes t2{0%,100%{transform:translateX(-10px);opacity:.6}50%{transform:translateX(10px);opacity:1}}

      /* 3: 키워드로 요약하기 — 자간 압축, 핵심어만 남음 */
      .type-3{animation:t3 7s infinite alternate ease-in-out}
      @keyframes t3{0%{letter-spacing:4px;opacity:.5;transform:scaleX(1.1)}100%{letter-spacing:-.5px;opacity:1;transform:scaleX(.88)}}

      /* 4: 눈앞에 있을 때만 작동 — 잠깐 선명했다 흐려짐 */
      .type-4{animation:t4 5s infinite}
      @keyframes t4{0%,100%{opacity:.2;filter:blur(2.5px)}15%,25%{opacity:1;filter:blur(0)}35%{opacity:.2;filter:blur(2.5px)}}

      /* 5: 외부 신호로 불러오기 — 화면 밖에서 신호 후 등장 */
      .type-5{animation:t5 7s infinite}
      @keyframes t5{0%,65%{transform:translateX(-35px);opacity:0}78%,88%{transform:translateX(0);opacity:1}100%{transform:translateX(-35px);opacity:0}}

      /* 6: 슬픔의 논리적 이해 — 딱딱하고 규칙적, 감정 없음 */
      .type-6{animation:t6 8s infinite ease-in-out}
      @keyframes t6{0%,100%{transform:translateX(0);letter-spacing:2px;opacity:.65}50%{transform:translateX(6px);letter-spacing:2px;opacity:1}}

      /* 7: 감정에 이름표 달기 — 라벨 먼저, 본문 나중 */
      .type-7{animation:t7 6s infinite ease-in-out}
      @keyframes t7{0%{transform:translateY(-6px);font-size:9px;opacity:.5}40%{transform:translateY(-3px);font-size:9px;opacity:.75}100%{transform:translateY(0);font-size:11px;opacity:1}}

      /* 8: 수학적인 규칙 찾기 — 정확한 주기 반복 */
      .type-8{animation:t8 4s infinite linear}
      @keyframes t8{0%{transform:translateX(0)}25%{transform:translateX(10px)}50%{transform:translateX(0)}75%{transform:translateX(-10px)}100%{transform:translateX(0)}}

      /* 9: 사전적 정의 내리기 — 표제어 후 아래로 정의 확장 */
      .type-9{animation:t9 6s infinite ease-in-out}
      @keyframes t9{0%,100%{transform:scaleY(.75) translateY(-6px);opacity:.6}50%{transform:scaleY(1.08) translateY(4px);opacity:1}}

      /* 10: 거리와 위치 계산 — 정밀 위치 이동 */
      .type-10{animation:t10 6s infinite step-end}
      @keyframes t10{0%{transform:translate(0,0)}33%{transform:translate(14px,0)}66%{transform:translate(14px,-9px)}100%{transform:translate(0,0)}}

      /* 11: 차트처럼 분류하기 — 축 기준 상하 정렬 */
      .type-11{animation:t11 6s infinite alternate ease-in-out}
      @keyframes t11{0%{transform:translateY(12px);opacity:.5}100%{transform:translateY(-12px);opacity:1}}

      /* 12: 칸칸이 나누어 담기 — 자간 넓게, 셀 구조 */
      .type-12{animation:t12 7s infinite alternate ease-in-out}
      @keyframes t12{0%{letter-spacing:1px;opacity:.6;transform:scaleX(1)}100%{letter-spacing:7px;opacity:1;transform:scaleX(1.05)}}

      /* 13: 관계망 중심으로 엮기 — 중심에서 방사형 확장 */
      .type-13{animation:t13 6s infinite alternate ease-in-out}
      @keyframes t13{0%{transform:scale(.85);opacity:.55;letter-spacing:0}100%{transform:scale(1.1);opacity:1;letter-spacing:2px}}

      /* 14: 몸의 거리 측정 — 가까웠다 멀어짐 */
      .type-14{animation:t14 5s infinite ease-in-out}
      @keyframes t14{0%,100%{transform:scale(1.2);opacity:.45}50%{transform:scale(.8);opacity:1}}

      /* 15: 확신으로만 기억하기 — 흔들리다 하나만 고정 */
      .type-15{animation:t15 8s infinite}
      @keyframes t15{0%,35%{transform:translateX(-3px) skewX(-2deg);opacity:.4;filter:blur(1px)}40%,45%{transform:translateX(3px) skewX(2deg);opacity:.4;filter:blur(1px)}50%,55%{transform:translateX(-2px)}85%,100%{transform:none;opacity:1;filter:blur(0)}}

      /* 16: 여러 갈래로 찾아가기 — 여러 방향으로 분기 */
      .type-16{animation:t16 7s infinite ease-in-out}
      @keyframes t16{0%,100%{transform:translate(0,0);opacity:1}33%{transform:translate(-16px,-6px);opacity:.55}66%{transform:translate(16px,-6px);opacity:.55}}

      /* 17: 숫자와 사실만 남기기 — 감정 탈락, 건조 압축 */
      .type-17{animation:t17 8s infinite alternate ease-in-out}
      @keyframes t17{0%{letter-spacing:2px;opacity:1;transform:scaleX(1)}100%{letter-spacing:-.5px;opacity:.85;transform:scaleX(.9) scaleY(.95)}}

      /* 18: 글자로 옮겨 적기 — 블러에서 선명하게 */
      .type-18{animation:t18 7s infinite ease-in-out}
      @keyframes t18{0%,100%{filter:blur(3px);opacity:.3;transform:translateX(-6px)}50%{filter:blur(0);opacity:1;transform:translateX(0)}}

      /* 19: 핵심 내용만 추리기 — 단계적 압축 */
      .type-19{animation:t19 8s infinite alternate ease-in-out}
      @keyframes t19{0%{letter-spacing:3px;opacity:.8;transform:scaleX(1.08)}100%{letter-spacing:0;opacity:1;transform:scaleX(.87)}}

      /* 20: 간접 지식으로 보관 — 지연 등장 */
      .type-20{animation:t20 8s infinite}
      @keyframes t20{0%,35%{opacity:0;transform:translateX(12px)}55%{opacity:.5;transform:translateX(5px)}80%,100%{opacity:1;transform:translateX(0)}}

      /* 21: 기록 보관소에 넣기 — 아래 서랍으로 미끄러짐 */
      .type-21{animation:t21 6s infinite}
      @keyframes t21{0%,50%{transform:translateY(0);opacity:1}75%{transform:translateY(18px);opacity:.25}80%{transform:translateY(18px);opacity:0}85%{transform:translateY(0);opacity:0}100%{transform:translateY(0);opacity:1}}

      /* 22: 몸의 경고등 켜기 — 특정 지점만 경고 점멸 */
      .type-22{animation:t22 4s infinite}
      @keyframes t22{0%,100%{opacity:.25;filter:blur(1px);transform:scale(1)}20%,30%{opacity:1;filter:blur(0);transform:scale(1.06)}25%{opacity:.55}}

      /* 23: 말과 느낌의 결합 — 이동과 무게감 동시 변화 */
      .type-23{animation:t23 6s infinite ease-in-out}
      @keyframes t23{0%,100%{transform:translateX(-5px) skewX(-3deg);opacity:.65}50%{transform:translateX(5px) skewX(3deg);opacity:1}}

      /* 24: 신체 부위에 각인 — 특정 위치에 박히듯 점등 */
      .type-24{animation:t24 5s infinite}
      @keyframes t24{0%,40%{opacity:.15;transform:scale(.97)}50%,60%{opacity:1;transform:scale(1.02)}70%,100%{opacity:.85;transform:scale(1)}}

      /* 25: 외부 기록과 선 긋기 — 밑줄·연결선 강조 */
      .type-25{animation:t25 7s infinite alternate ease-in-out}
      @keyframes t25{0%{text-decoration:none;opacity:.6;letter-spacing:0}50%{text-decoration:underline;opacity:1;letter-spacing:1px}100%{text-decoration:none;opacity:.6;letter-spacing:0}}

      /* 26: 조건 맞춰 불러내기 — 조건 충족 후 등장 */
      .type-26{animation:t26 8s infinite}
      @keyframes t26{0%,60%{opacity:0;transform:scale(.88)}72%{opacity:.45;transform:scale(.95)}85%,100%{opacity:1;transform:scale(1)}}

      /* 27: 중요 지점만 찍기 — 넓은 자간, 핀처럼 */
      .type-27{animation:t27 7s infinite alternate ease-in-out}
      @keyframes t27{0%{letter-spacing:10px;opacity:.35;transform:scale(.88)}100%{letter-spacing:4px;opacity:1;transform:scale(1)}}

      /* 28: 드문드문 점 찍기 — 불규칙 간헐 등장 */
      .type-28{animation:t28 6s infinite}
      @keyframes t28{0%,100%{opacity:.08}10%,18%{opacity:.95}25%,52%{opacity:.08}58%,66%{opacity:.7}72%,88%{opacity:.08}90%,96%{opacity:.5}}

      /* 29: 좌표로 위치 확인 — x·y축 딱딱한 이동 */
      .type-29{animation:t29 6s infinite step-end}
      @keyframes t29{0%{transform:translate(0,0)}33%{transform:translate(13px,0)}66%{transform:translate(0,-9px)}100%{transform:translate(0,0)}}

      /* 30: 틀에 맞춰 짜 넣기 — 어긋나다 정렬 */
      .type-30{animation:t30 6s infinite ease-in-out}
      @keyframes t30{0%,100%{transform:translateX(-4px) skewX(-2deg);opacity:.55}50%{transform:translateX(0) skewX(0);opacity:1}}

      /* 31: 폴더별로 정리하기 — 접혔다 펴지는 구조 */
      .type-31{animation:t31 6s infinite ease-in-out}
      @keyframes t31{0%,100%{transform:scaleY(1) translateY(0);opacity:1}50%{transform:scaleY(.45) translateY(-12px);opacity:.4}}

      /* 32: 정답지만 보고 알기 — 결론 먼저 */
      .type-32{animation:t32 7s infinite ease-in-out}
      @keyframes t32{0%,100%{transform:translateY(-6px);opacity:1}50%{transform:translateY(6px);opacity:.65}}

      /* 33: 지식으로 통합하기 — 조각이 하나로 수렴 */
      .type-33{animation:t33 8s infinite alternate ease-in-out}
      @keyframes t33{0%{letter-spacing:5px;opacity:.5;transform:scale(.92)}100%{letter-spacing:0;opacity:1;transform:scale(1)}}

      /* 34: 지도로 경로 파악 — 경로 따라 이동 */
      .type-34{animation:t34 8s infinite ease-in-out}
      @keyframes t34{0%{transform:translate(0,0);opacity:.65}25%{transform:translate(10px,-6px);opacity:1}50%{transform:translate(20px,0);opacity:.65}75%{transform:translate(10px,6px);opacity:1}100%{transform:translate(0,0);opacity:.65}}

      /* 35: 힌트 보고 길 찾기 — 힌트 깜빡이다 공개 */
      .type-35{animation:t35 6s infinite}
      @keyframes t35{0%,40%{opacity:.25;filter:blur(1.5px)}45%,55%{opacity:.85;filter:blur(0)}60%,100%{opacity:.25;filter:blur(1.5px)}}

      /* 36: 사실 위주로 거르기 — 감정어 탈락 */
      .type-36{animation:t36 8s infinite alternate ease-in-out}
      @keyframes t36{0%{letter-spacing:2px;opacity:1;transform:scaleX(1)}100%{letter-spacing:-.5px;opacity:.9;transform:scaleX(.9) scaleY(.95)}}

      /* 37: 상태 보고서 작성 — 항목·줄 정렬 */
      .type-37{animation:t37 8s infinite ease-in-out}
      @keyframes t37{0%,100%{transform:translateY(0);letter-spacing:1.5px;opacity:.85}50%{transform:translateY(3px);letter-spacing:1.5px;opacity:1}}

      /* 38: 글로 읽고 이해하기 — 흩어진 글자가 문장으로 */
      .type-38{animation:t38 9s infinite alternate ease-in-out}
      @keyframes t38{0%{letter-spacing:7px;opacity:.3;filter:blur(2.5px)}100%{letter-spacing:0;opacity:1;filter:blur(0)}}

      /* 39: 희미하게 위치 잡기 — 여러 잔상 */
      .type-39{animation:t39 7s infinite ease-in-out}
      @keyframes t39{0%,100%{transform:translateX(-4px);opacity:.35;filter:blur(1px)}33%{transform:translateX(4px);opacity:.45;filter:blur(1px)}66%{transform:translateX(0);opacity:.55;filter:blur(.5px)}}

      /* 40: 그물망처럼 연결 — 자간 확장, 다중 연결 */
      .type-40{animation:t40 7s infinite alternate ease-in-out}
      @keyframes t40{0%{letter-spacing:0;transform:scale(.9);opacity:.6}100%{letter-spacing:4px;transform:scale(1.08);opacity:1}}

      /* 41: 결과물만 저장하기 — 과정 사라지고 결론만 */
      .type-41{animation:t41 7s infinite}
      @keyframes t41{0%,30%{opacity:1;transform:translateY(0) scale(1)}55%{opacity:.2;transform:translateY(6px) scale(.95)}80%,100%{opacity:1;transform:translateY(0) scale(1.05)}}

      /* 42: 주변에 물어보기 — 가장자리에서 중앙으로 */
      .type-42{animation:t42 7s infinite ease-in-out}
      @keyframes t42{0%,100%{transform:translateX(16px);opacity:.35}50%{transform:translateX(0);opacity:1}}

      /* 43: 수수께끼 풀듯 추측 — 빈칸에서 복원 */
      .type-43{animation:t43 8s infinite}
      @keyframes t43{0%,20%{opacity:.1;letter-spacing:6px;filter:blur(2px)}40%{opacity:.4;letter-spacing:3px;filter:blur(1px)}70%{opacity:.75;letter-spacing:1px;filter:blur(0)}100%{opacity:1;letter-spacing:0;filter:blur(0)}}

      /* 44: 강렬한 조각 남기기 — 파편만 강하게 */
      .type-44{animation:t44 6s infinite}
      @keyframes t44{0%,100%{opacity:1;transform:scale(1)}30%,50%{opacity:.2;transform:scale(.88)}38%{opacity:1;transform:scale(1.15)}70%,85%{opacity:.15}76%{opacity:1;transform:scale(1.18)}}

      /* 45: 감정 온도 빼기 — 평평하게 냉각 */
      .type-45{animation:t45 9s infinite alternate ease-in-out}
      @keyframes t45{0%{letter-spacing:2px;transform:skewX(-2deg);opacity:.9}100%{letter-spacing:0;transform:skewX(0) scaleY(.92);opacity:.65}}

      /* 46: 머리로 감정 계산 — 분석적 치환 */
      .type-46{animation:t46 6s infinite ease-in-out}
      @keyframes t46{0%,100%{letter-spacing:2px;transform:translateX(0);opacity:.75}33%{letter-spacing:0;transform:translateX(6px);opacity:1}66%{letter-spacing:4px;transform:translateX(-6px);opacity:.75}}

      /* 47: 필요한 부분 발췌 — 선택 구간만 강조 */
      .type-47{animation:t47 6s infinite alternate ease-in-out}
      @keyframes t47{0%{opacity:.35;transform:scale(1);filter:blur(1px)}100%{opacity:1;transform:scale(1.04);filter:blur(0)}}

      /* 48: 보이지 않는 충격 — 지연 후 여파 */
      .type-48{animation:t48 7s infinite}
      @keyframes t48{0%,40%{transform:none;opacity:1}50%{transform:translateX(-5px) skewX(-2deg);opacity:.75}55%{transform:translateX(5px) skewX(2deg)}60%{transform:translateX(-2px)}66%,100%{transform:none;opacity:1}}

      /* 49: 교훈만 남기기 — 한 줄로 압축 */
      .type-49{animation:t49 8s infinite alternate ease-in-out}
      @keyframes t49{0%{letter-spacing:3px;transform:scaleX(1.12);opacity:1}100%{letter-spacing:-.5px;transform:scaleX(.82);opacity:1}}

      /* 50: 소리에 집중하기 — 음절 리듬 진동 */
      .type-50{animation:t50 1.5s infinite ease-in-out}
      @keyframes t50{0%,100%{transform:translateY(0)}25%{transform:translateY(-3px)}75%{transform:translateY(3px)}}

      /* 51: 문장으로 변환하기 — 낱자 조립 */
      .type-51{animation:t51 9s infinite alternate ease-in-out}
      @keyframes t51{0%{letter-spacing:9px;opacity:.25;filter:blur(2.5px)}100%{letter-spacing:0;opacity:1;filter:blur(0)}}

      /* 52: 차례대로 줄 세우기 — 순서·열 정렬 */
      .type-52{animation:t52 6s infinite ease-in-out}
      @keyframes t52{0%,100%{transform:translateX(4px) skewX(1.5deg);opacity:.65}50%{transform:translateX(0) skewX(0);opacity:1}}

      /* 53: 개념으로만 소유 — 추상적, 희박 */
      .type-53{animation:t53 9s infinite alternate ease-in-out}
      @keyframes t53{0%{opacity:.4;letter-spacing:5px;transform:scale(.9)}100%{opacity:.75;letter-spacing:2px;transform:scale(1)}}

      /* 54: 멀리서 관찰하기 — 축소, 전체 윤곽 */
      .type-54{animation:t54 8s infinite alternate ease-in-out}
      @keyframes t54{0%{transform:scale(.72);opacity:.55;letter-spacing:1px}100%{transform:scale(.88);opacity:.8;letter-spacing:.5px}}

      /* 55: 구조물 돌려보기 — 입체 회전 */
      .type-55{animation:t55 8s infinite alternate ease-in-out}
      @keyframes t55{0%{transform:perspective(350px) rotateY(0deg);opacity:1}100%{transform:perspective(350px) rotateY(18deg);opacity:.8}}

      /* 56: 특징 리스트 만들기 — 항목화, 아래로 나열 */
      .type-56{animation:t56 7s infinite ease-in-out}
      @keyframes t56{0%,100%{transform:scaleY(1) translateY(0);opacity:1}50%{transform:scaleY(1.12) translateY(6px);opacity:.8}}

      /* 57: 부피 느껴보기 — 덩어리감, 숨쉬듯 팽창·수축 */
      .type-57{animation:t57 4s infinite ease-in-out}
      @keyframes t57{0%,100%{transform:scale(1);filter:blur(0);opacity:1}50%{transform:scale(1.09);filter:blur(.6px);opacity:.8}}

      /* 58: 조각 맞춰 복구하기 — 흩어진 조각 복원 */
      .type-58{animation:t58 9s infinite alternate ease-in-out}
      @keyframes t58{0%{letter-spacing:7px;opacity:.25;transform:translateX(-10px);filter:blur(2px)}60%{letter-spacing:2px;opacity:.7;transform:translateX(0);filter:blur(0)}100%{letter-spacing:0;opacity:1;transform:translateX(0)}}

      /* 59: 주소 찍기 — 핀처럼 꽂힘 */
      .type-59{animation:t59 5s infinite}
      @keyframes t59{0%,100%{transform:translateY(0) scale(1);opacity:1}50%{transform:translateY(-4px) scale(1.06);opacity:.85}}

      /* 60: 레이아웃 기억하기 — 내용 희미, 구조만 또렷 */
      .type-60{animation:t60 8s infinite alternate ease-in-out}
      @keyframes t60{0%{opacity:.25;filter:blur(1.5px);letter-spacing:0}100%{opacity:.55;filter:blur(.5px);letter-spacing:1.5px}}

      /* 61: 방향과 길이 계산 — 벡터 방향 이동 */
      .type-61{animation:t61 7s infinite ease-in-out}
      @keyframes t61{0%,100%{transform:translateX(0) scaleX(1);opacity:.65}50%{transform:translateX(22px) scaleX(.88);opacity:1}}

      /* 62: 서로의 거리 재기 — 간격 변화로 관계 표현 */
      .type-62{animation:t62 7s infinite alternate ease-in-out}
      @keyframes t62{0%{letter-spacing:0;opacity:.75}100%{letter-spacing:6px;opacity:1}}

      /* 63: 반사된 신호 읽기 — 반사본이 더 강조 */
      .type-63{animation:t63 7s infinite alternate ease-in-out}
      @keyframes t63{0%{transform:skewX(0) translateY(0);opacity:.35;filter:blur(1px)}100%{transform:skewX(-5deg) translateY(4px);opacity:.85;filter:blur(0)}}

      /* 64: 행동 순서 기억 — step 번호처럼 순차 점등 */
      .type-64{animation:t64 8s infinite step-end}
      @keyframes t64{0%,10%{opacity:.3;transform:translateX(0)}25%,35%{opacity:1;transform:translateX(6px)}50%,60%{opacity:.5;transform:translateX(12px)}75%,85%{opacity:.8;transform:translateX(18px)}90%,100%{opacity:.3;transform:translateX(0)}}

      /* 65: 몸의 움직임 기록 — 궤적 따라 배열 */
      .type-65{animation:t65 8s infinite ease-in-out}
      @keyframes t65{0%{transform:translate(0,0) rotate(0deg);opacity:.65}25%{transform:translate(9px,-5px) rotate(2deg);opacity:1}50%{transform:translate(17px,0) rotate(0deg);opacity:.65}75%{transform:translate(9px,5px) rotate(-2deg);opacity:1}100%{transform:translate(0,0) rotate(0deg);opacity:.65}}

      /* 66: 공간끼리 이어 붙이기 — 분리된 공간이 맞물림 */
      .type-66{animation:t66 6s infinite ease-in-out}
      @keyframes t66{0%,100%{transform:translateX(-10px);opacity:.4}50%{transform:translateX(0);opacity:1}}

      /* 67: 도면 위로 걷기 — 특정 지점 차례로 점등 */
      .type-67{animation:t67 5s infinite}
      @keyframes t67{0%,40%{opacity:.2;letter-spacing:3px;filter:blur(1px)}50%,65%{opacity:1;letter-spacing:1px;filter:blur(0)}75%,100%{opacity:.2;letter-spacing:3px;filter:blur(1px)}}

      /* 68: 머릿속 기계 작동 — 톱니처럼 기계적 전개 */
      .type-68{animation:t68 4s infinite linear}
      @keyframes t68{0%{transform:rotate(0deg) translateX(0)}25%{transform:rotate(1.2deg) translateX(6px)}50%{transform:rotate(0deg) translateX(12px)}75%{transform:rotate(-1.2deg) translateX(6px)}100%{transform:rotate(0deg) translateX(0)}}

      /* 69: 표 형식으로 담기 — 행·열 셀 정렬 */
      .type-69{animation:t69 7s infinite alternate ease-in-out}
      @keyframes t69{0%{letter-spacing:6px;transform:scaleY(1);opacity:.6}100%{letter-spacing:2px;transform:scaleY(.88);opacity:1}}

      /* 70: 말로 풀어서 보관 — 키워드에서 문장으로 확장 */
      .type-70{animation:t70 8s infinite alternate ease-in-out}
      @keyframes t70{0%{letter-spacing:-.5px;opacity:.55;transform:scaleX(.82)}100%{letter-spacing:2.5px;opacity:1;transform:scaleX(1.06)}}

      /* 71: 역사적 사실로 저장 — 타임라인 구조 정렬 */
      .type-71{animation:t71 8s infinite alternate ease-in-out}
      @keyframes t71{0%{transform:translateX(0);opacity:.75;letter-spacing:.5px}100%{transform:translateX(10px);opacity:1;letter-spacing:2px}}

      /* 72: 좌표값 설정하기 — 공간 수치로 환원 */
      .type-72{animation:t72 6s infinite ease-in-out}
      @keyframes t72{0%,100%{transform:translate(-5px,-5px);opacity:.5}50%{transform:translate(5px,5px);opacity:1}}

      /* 73: 공간 부품 끼워맞추기 — 분리 후 삽입 */
      .type-73{animation:t73 8s infinite alternate ease-in-out}
      @keyframes t73{0%{transform:translateX(-12px) skewX(-5deg);opacity:.3}100%{transform:translateX(0) skewX(0);opacity:1}}

      /* 74: 시간을 길로 만들기 — 선형 경로 이동 */
      .type-74{animation:t74 9s infinite alternate linear}
      @keyframes t74{0%{transform:translateX(-18px);opacity:.55}100%{transform:translateX(18px);opacity:1}}

      /* 75: 지도의 점으로 표시 — 점 마커 분포 */
      .type-75{animation:t75 7s infinite alternate ease-in-out}
      @keyframes t75{0%{transform:scale(.68);opacity:.35;letter-spacing:4px}100%{transform:scale(1);opacity:1;letter-spacing:0}}

      /* 76: 나를 중심으로 찾기 — 자기 중심 반경 */
      .type-76{animation:t76 7s infinite ease-in-out}
      @keyframes t76{0%,100%{transform:scale(1) rotate(0deg);opacity:.75}50%{transform:scale(.93) rotate(2deg);opacity:1}}

      /* 77: 너와 나의 거리 재기 — 간격이 관계 자체 */
      .type-77{animation:t77 7s infinite alternate ease-in-out}
      @keyframes t77{0%{letter-spacing:10px;opacity:.5}100%{letter-spacing:0;opacity:1}}

      /* 78: 보이지 않는 부피 감지 — 여백이 눌리며 덩어리 암시 */
      .type-78{animation:t78 8s infinite alternate ease-in-out}
      @keyframes t78{0%{opacity:.18;filter:blur(2.5px);transform:scale(1)}100%{opacity:.45;filter:blur(1px);transform:scale(1.06)}}

      /* 79: 작동 원리 파악하기 — 한 겹씩 열림 */
      .type-79{animation:t79 9s infinite}
      @keyframes t79{0%,15%{opacity:.15;transform:translateY(-6px);filter:blur(2px)}35%{opacity:.5;transform:translateY(-3px);filter:blur(1px)}65%{opacity:.85;transform:translateY(0);filter:blur(0)}85%,100%{opacity:1;transform:translateY(0) scale(1.02)}}
    </style>
  </head>
  <body>
    <div id="canvas"></div>

    <script>
      const SPREADSHEET_ID = "1pintIO8VNpryzS56eqXaNjqzx5f3EeAV";
      const KEYS = { note: "당사자의 직접 설명", type: "기억 형식" };
      const CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv`;

      /* 기억 조직 방식 이름 → 애니메이션 ID 1:1 매핑 */
      const TYPE_NAME_TO_ID = {
        "남의 일처럼 읽기":0,"증거 자료 확인하기":1,"남남인 사건 연결":2,
        "키워드로 요약하기":3,"눈앞에 있을 때만 작동":4,"외부 신호로 불러오기":5,
        "슬픔의 논리적 이해":6,"감정에 이름표 달기":7,"수학적인 규칙 찾기":8,
        "사전적 정의 내리기":9,"거리와 위치 계산":10,"차트처럼 분류하기":11,
        "칸칸이 나누어 담기":12,"관계망 중심으로 엮기":13,"몸의 거리 측정":14,
        "확신으로만 기억하기":15,"여러 갈래로 찾아가기":16,"숫자와 사실만 남기기":17,
        "글자로 옮겨 적기":18,"핵심 내용만 추리기":19,"간접 지식으로 보관":20,
        "기록 보관소에 넣기":21,"몸의 경고등 켜기":22,"말과 느낌의 결합":23,
        "신체 부위에 각인":24,"외부 기록과 선 긋기":25,"조건 맞춰 불러내기":26,
        "중요 지점만 찍기":27,"드문드문 점 찍기":28,"좌표로 위치 확인":29,
        "틀에 맞춰 짜 넣기":30,"폴더별로 정리하기":31,"정답지만 보고 알기":32,
        "지식으로 통합하기":33,"지도로 경로 파악":34,"힌트 보고 길 찾기":35,
        "사실 위주로 거르기":36,"상태 보고서 작성":37,"글로 읽고 이해하기":38,
        "희미하게 위치 잡기":39,"그물망처럼 연결":40,"결과물만 저장하기":41,
        "주변에 물어보기":42,"수수께끼 풀듯 추측":43,"강렬한 조각 남기기":44,
        "감정 온도 빼기":45,"머리로 감정 계산":46,"필요한 부분 발췌":47,
        "보이지 않는 충격":48,"교훈만 남기기":49,"소리에 집중하기":50,
        "문장으로 변환하기":51,"차례대로 줄 세우기":52,"개념으로만 소유":53,
        "멀리서 관찰하기":54,"구조물 돌려보기":55,"특징 리스트 만들기":56,
        "부피 느껴보기":57,"조각 맞춰 복구하기":58,"주소 찍기":59,
        "레이아웃 기억하기":60,"방향과 길이 계산":61,"서로의 거리 재기":62,
        "반사된 신호 읽기":63,"행동 순서 기억":64,"몸의 움직임 기록":65,
        "공간끼리 이어 붙이기":66,"도면 위로 걷기":67,"머릿속 기계 작동":68,
        "표 형식으로 담기":69,"말로 풀어서 보관":70,"역사적 사실로 저장":71,
        "좌표값 설정하기":72,"공간 부품 끼워맞추기":73,"시간을 길로 만들기":74,
        "지도의 점으로 표시":75,"나를 중심으로 찾기":76,"너와 나의 거리 재기":77,
        "보이지 않는 부피 감지":78,"작동 원리 파악하기":79
      };

      function createDriftingShape(typeId, startX, startY) {
        const canvas = document.getElementById("canvas");
        const shape  = document.createElement("div");
        shape.className = `memory-shape shape-${typeId % 8}`;
        shape.style.left = `${startX}px`;
        shape.style.top  = `${startY}px`;
        canvas.appendChild(shape);
        setTimeout(() => { shape.style.opacity = "0.7"; }, 10);
        function drift() {
          if (!shape.parentElement) return;
          shape.style.left      = `${Math.floor(Math.random()*(window.innerWidth-100))+50}px`;
          shape.style.top       = `${Math.floor(Math.random()*(window.innerHeight-100))+50}px`;
          shape.style.transform = `rotate(${Math.floor(Math.random()*360)}deg)`;
        }
        setTimeout(drift, 100);
        setInterval(drift, 8000);
      }

      function parseCSV(text) {
        const lines   = text.trim().split("\n");
        const headers = splitCSVLine(lines[0]);
        return lines.slice(1).map(line => {
          const values = splitCSVLine(line), obj = {};
          headers.forEach((h,i) => { obj[h.trim()] = (values[i]||"").trim(); });
          return obj;
        });
      }

      function splitCSVLine(line) {
        const result=[]; let cur="", inQ=false;
        for(let i=0;i<line.length;i++){
          const ch=line[i];
          if(ch==='"') inQ=!inQ;
          else if(ch===','&&!inQ){result.push(cur);cur="";}
          else cur+=ch;
        }
        result.push(cur); return result;
      }

      fetch(CSV_URL)
        .then(r => r.text())
        .then(text => {
          const rows = parseCSV(text);
          const canvas = document.getElementById("canvas");
          const fallback = new Map(); let fc = 0;

          rows.forEach(row => {
            const noteText = row[KEYS.note];
            const typeName = (row[KEYS.type]||"").trim();
            if (!noteText || !noteText.trim()) return;

            const typeId = TYPE_NAME_TO_ID.hasOwnProperty(typeName)
              ? TYPE_NAME_TO_ID[typeName]
              : (fallback.has(typeName) ? fallback.get(typeName) : (fallback.set(typeName, fc%80), fc++, fallback.get(typeName)));

            const span = document.createElement("div");
            span.className = `floating-text type-${typeId}`;
            span.innerText = noteText;
            span.style.top  = `${Math.floor(Math.random()*80)+10}vh`;
            span.style.left = `${Math.floor(Math.random()*80)+10}vw`;

            span.addEventListener("click", e => {
              createDriftingShape(typeId, e.pageX, e.pageY);
              span.remove();
            });
            canvas.appendChild(span);
          });
        });
    </script>
  </body>
