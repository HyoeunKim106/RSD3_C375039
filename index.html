<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory Typo Map</title>
    <style>
      /* 1. 배경 설정 (새하얀 도화지) */
      body {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background-color: #ffffff;
        font-family: sans-serif;
      }

      #canvas {
        position: relative;
        width: 100%;
        height: 100%;
      }

      /* 2. 텍스트 공통 스타일 (블랙 통일) */
      .floating-text {
        position: absolute;
        font-size: 11px;
        color: #000000; /* 블랙으로 통일 */
        max-width: 150px;
        word-break: keep-all;
        line-height: 1.5;
        user-select: none;
      }

      /* =========================================================
         3. 8가지 유형별 모션 (기억 조직 방식의 특성 반영)
         ========================================================= */

      /* [Type 0] 선형 서사형: 아래에서 위로 느리게 이어지듯 흐름 */
      .type-0 { animation: fadeUpFlow 8s infinite ease-in-out; }
      @keyframes fadeUpFlow {
        0% { opacity: 0; transform: translateY(10px); }
        30% { opacity: 1; transform: translateY(0); }
        70% { opacity: 1; transform: translateY(-5px); }
        100% { opacity: 0; transform: translateY(-15px); }
      }

      /* [Type 1] 병렬 정보형: 분절되고 탁! 맞춰지는 스냅 정렬 */
      .type-1 { animation: snapAlign 4s infinite step-end; }
      @keyframes snapAlign {
        0% { transform: skewX(-5deg) translateY(2px); opacity: 0.7; }
        10% { transform: skewX(0deg) translateY(0); opacity: 1; } /* 탁! 정렬 */
        90% { transform: skewX(0deg) translateY(0); opacity: 1; }
        100% { transform: skewX(5deg) translateY(2px); opacity: 0.7; }
      }

      /* [Type 2] 공간 좌표형: 느리고 거리가 먼 드리프트 (위치 이동 중심) */
      .type-2 { animation: slowDrift 10s infinite alternate linear; }
      @keyframes slowDrift {
        0% { transform: translate(0, 0); }
        100% { transform: translate(20px, -10px); }
      }

      /* [Type 3] 경로·네트워크형: 자간이 움직이며 궤적 형성 */
      .type-3 { animation: trackNetwork 6s infinite alternate ease-in-out; }
      @keyframes trackNetwork {
        0% { letter-spacing: 0px; transform: translateX(0); }
        100% { letter-spacing: 2px; transform: translateX(15px); }
      }

      /* [Type 4] 추상 도식형: Y축 압축 및 골격화 (reduction) */
      .type-4 { animation: compressSchema 5s infinite alternate ease-in-out; transform-origin: left center; }
      @keyframes compressSchema {
        0% { transform: scaleY(1); opacity: 1; }
        100% { transform: scaleY(0.4) scaleX(0.9); opacity: 0.8; }
      }

      /* [Type 5] 추상 이미지형: 구조물처럼 틀어지는 3D 형상 */
      .type-5 { animation: skewImage 8s infinite alternate ease-in-out; perspective: 1000px; }
      @keyframes skewImage {
        0% { transform: rotateY(0deg) rotateZ(0deg) skew(0deg); }
        100% { transform: rotateY(20deg) rotateZ(3deg) skew(-10deg); opacity: 0.8; }
      }

      /* [Type 6] 정동·감각 잔류형: 숨쉬기 + 잔여하는 번짐(blur) */
      .type-6 { animation: breathResidual 6s infinite alternate ease-in-out; }
      @keyframes breathResidual {
        0% { transform: scale(1); filter: blur(0px); opacity: 1; }
        100% { transform: scale(1.05); filter: blur(1.5px); opacity: 0.6; }
      }

      /* [Type 7] 촉발·잔상형: 긴 지연 후 희미하게 나타났다 사라짐 (flicker/afterimage) */
      .type-7 { animation: flashAfterimage 7s infinite; }
      @keyframes flashAfterimage {
        0%, 80% { opacity: 0.1; filter: blur(2px); } /* 평소엔 거의 안 보임 */
        85% { opacity: 0.9; filter: blur(0px); } /* 잠깐 나타남 */
        87% { opacity: 0.4; filter: blur(1px); } /* 깜빡임 */
        90% { opacity: 0.8; filter: blur(0px); }
        100% { opacity: 0.1; filter: blur(2px); }
      }

    </style>
  </head>
  <body>
    <div id="canvas"></div>

    <script>
      const SPREADSHEET_ID = "1pintIO8VNpryzS56eqXaNjqzx5f3EeAV";
      const KEYS = { 
        note: "당사자의 직접 설명", 
        type: "기억 조직 방식" 
      }; 

      const CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv`;

      function parseCSV(text) {
        const lines = text.trim().split("\n");
        const headers = splitCSVLine(lines[0]);
        return lines.slice(1).map((line) => {
          const values = splitCSVLine(line);
          const obj = {};
          headers.forEach((h, i) => {
            obj[h.trim()] = (values[i] || "").trim();
          });
          return obj;
        });
      }

      function splitCSVLine(line) {
        const result = []; let current = ""; let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (ch === '"') inQuotes = !inQuotes;
          else if (ch === "," && !inQuotes) { result.push(current); current = ""; }
          else current += ch;
        }
        result.push(current); return result;
      }

      fetch(CSV_URL)
        .then((res) => { if (!res.ok) throw new Error(`HTTP ${res.status}`); return res.text(); })
        .then((text) => {
          const rows = parseCSV(text);
          const canvas = document.getElementById("canvas");

          const typeMap = new Map();
          let typeCounter = 0;

          rows.forEach((row) => {
            const noteText = row[KEYS.note];
            const typeName = row[KEYS.type] || "미분류";
            
            if (!noteText || noteText.trim() === "") return;

            if (!typeMap.has(typeName)) {
              typeMap.set(typeName, typeCounter % 8); 
              typeCounter++;
            }

            const typeId = typeMap.get(typeName);
            const span = document.createElement("div");
            
            span.className = `floating-text type-${typeId}`;
            
            // ★ 낱자(글자 하나하나) 단위를 조작하기 쉽게 만들기 위한 세팅 (선택적 사용)
            // 나중에 CSS로 글자별 딜레이를 줄 수 있도록 한 글자씩 <span>으로 쪼개서 넣음
            const chars = noteText.split("");
            span.innerHTML = chars.map(char => `<span>${char}</span>`).join("");

            const randomTop = Math.floor(Math.random() * 85) + 5;
            const randomLeft = Math.floor(Math.random() * 85) + 5;

            span.style.top = `${randomTop}vh`;
            span.style.left = `${randomLeft}vw`;

            canvas.appendChild(span);
          });
        })
        .catch((err) => {
          console.error("Error:", err);
        });
    </script>
  </body>
</html>
