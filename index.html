<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Text Map</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden; /* 화면 밖으로 넘치는 텍스트 숨김 (스크롤바 방지) */
        background-color: #ffffff; /* 배경색 */
        font-family: sans-serif;
      }

      #canvas {
        position: relative;
        width: 100%;
        height: 100%;
      }

      .floating-text {
        position: absolute;
        font-size: 11px; /* 텍스트 크기를 작게 설정 */
        color: #333333;
        max-width: 150px; /* 텍스트가 너무 길면 자동으로 줄바꿈되도록 제한 */
        word-break: keep-all;
        line-height: 1.4;
        /* 텍스트가 마우스에 선택되지 않게 하려면 아래 속성을 유지하세요 */
        user-select: none; 
      }
    </style>
  </head>
  <body>

    <div id="canvas"></div>

    <script>
      const SPREADSHEET_ID = "1pintIO8VNpryzS56eqXaNjqzx5f3EeAV";
      
      // 노트 데이터 하나만 가져옵니다
      const KEYS = { note: "UL-Note" }; 

      const CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv`;

      function parseCSV(text) {
        const lines = text.trim().split("\n");
        const headers = splitCSVLine(lines[0]);
        return lines.slice(1).map((line) => {
          const values = splitCSVLine(line);
          const obj = {};
          headers.forEach((h, i) => {
            obj[h.trim()] = (values[i] || "").trim();
          });
          return obj;
        });
      }

      function splitCSVLine(line) {
        const result = [];
        let current = "";
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (ch === '"') {
            inQuotes = !inQuotes;
          } else if (ch === "," && !inQuotes) {
            result.push(current);
            current = "";
          } else {
            current += ch;
          }
        }
        result.push(current);
        return result;
      }

      fetch(CSV_URL)
        .then((res) => {
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return res.text();
        })
        .then((text) => {
          const rows = parseCSV(text);
          const canvas = document.getElementById("canvas");

          rows.forEach((row) => {
            const noteText = row[KEYS.note];
            
            // 텍스트가 비어있으면 출력하지 않음
            if (!noteText || noteText.trim() === "") return;

            const span = document.createElement("div");
            span.className = "floating-text";
            span.textContent = noteText;

            // 화면의 5% ~ 90% 사이 무작위 좌표에 배치 (완전히 잘리는 것 방지)
            const randomTop = Math.floor(Math.random() * 85) + 5;
            const randomLeft = Math.floor(Math.random() * 85) + 5;

            span.style.top = `${randomTop}vh`;
            span.style.left = `${randomLeft}vw`;

            canvas.appendChild(span);
          });
        })
        .catch((err) => {
          console.error("Error:", err);
          document.body.innerHTML = `<p style="color:red; text-align:center; margin-top:20px;">Failed to load data.</p>`;
        });
    </script>
  </body>
</html>
