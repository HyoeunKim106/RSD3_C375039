<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSD3_C375039</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ───────── 로컬 폰트 ───────── */
    @font-face {
      font-family: 'Binomic';
      src: url('./assets/binomic-3.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Eulyoo1945-Regular';
      src: url('./assets/Eulyoo1945-Regular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Vivaldi';
      src: url('./assets/vivaldi.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'GravesendSansLight';
      src: url('./assets/fonnts.com-Gravesend_Sans_Light.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      cursor: grab;
      -webkit-user-select: none;
      user-select: none;
      overscroll-behavior: none;
      touch-action: none;
    }

    #world {
      position: fixed;
      inset: 0;
      transform-origin: 50% 50%;
      will-change: transform;
      pointer-events: none;
    }
    #reveal-root {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    /* ───────── 우상단 캡처 버튼 ───────── */
    #capture-btn {
      position: fixed;
      top: 18px;
      right: 18px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #000000;
      border: none;
      padding: 0;
      cursor: pointer;
      z-index: 100;
      transition: transform 0.18s ease, opacity 0.18s ease;
    }
    #capture-btn:hover { transform: scale(1.18); }
    #capture-btn:active { transform: scale(0.92); }
    #capture-btn.is-busy { opacity: 0.5; pointer-events: none; }

    /* ───────── 좌측 하단 HUD ───────── */
    .hud {
      position: fixed;
      left: 16px;
      bottom: 14px;
      z-index: 10;
      pointer-events: none;
      color: #000000;
      font-family: 'GravesendSansLight', sans-serif;
      font-weight: 400;
      font-size: 15px;
      line-height: 18px;
      white-space: nowrap;
      text-transform: uppercase;
    }
    .hud .row { display: block; }

    /* ───────── Reveal Image ───────── */
    .reveal {
      position: fixed;
      z-index: 5;
      pointer-events: none;
    }
    .reveal-img-area {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .reveal-img-area canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .reveal-text-box {
      position: absolute;
      left: 0;
      top: 0;
      width: 0;
      height: 0;
      background: #ffffff;
      overflow: hidden;
      pointer-events: none;
      transform-origin: top left;
      -webkit-mask-image: linear-gradient(to bottom,
        rgba(0,0,0,1) 0%,
        rgba(0,0,0,1) 75%,
        rgba(0,0,0,0) 100%);
              mask-image: linear-gradient(to bottom,
        rgba(0,0,0,1) 0%,
        rgba(0,0,0,1) 75%,
        rgba(0,0,0,0) 100%);
    }
    .reveal-text-content {
      padding: 14px 16px;
      font-family: 'Vivaldi', 'Eulyoo1945-Regular', serif;
      font-size: 16px;
      line-height: 1.55;
      color: #000000;
      white-space: pre-wrap;
      word-break: keep-all;
    }
    .reveal-text-content .caret {
      display: inline-block;
      width: 0.5em;
      height: 1em;
      margin-left: 1px;
      background: #000000;
      vertical-align: -0.12em;
      animation: reveal-caret-blink 0.9s steps(2) infinite;
    }
    @keyframes reveal-caret-blink {
      to { opacity: 0; }
    }
    .reveal-img-source {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    /* ───────── 부피 텍스트 클라우드 ───────── */
    .text-volume {
      position: fixed;
      pointer-events: none;
      z-index: 4;
      perspective: 900px;
      perspective-origin: 50% 50%;
      will-change: transform;
    }
    .text-volume-stage {
      position: absolute;
      left: 50%;
      top:  50%;
      width: 0;
      height: 0;
      transform-style: preserve-3d;
      will-change: transform;
    }
    .text-volume-glyph {
      position: absolute;
      left: 0;
      top:  0;
      font-family: 'Vivaldi', 'Eulyoo1945-Regular', serif;
      font-size: 16px;
      line-height: 1;
      color: #000000;
      white-space: pre;
      transform-origin: 0 0;
      will-change: transform, opacity;
    }

    /* ───────── 붕괴(decay) 텍스트 모션 ───────── */
    .text-decay {
      position: fixed;
      pointer-events: none;
      z-index: 4;
      perspective: 550px;
      perspective-origin: 50% 50%;
      will-change: transform;
    }
    .text-decay-stage {
      position: absolute;
      left: 50%;
      top:  50%;
      width: 0;
      height: 0;
      transform-style: preserve-3d;
    }
    .text-decay-glyph {
      position: absolute;
      left: 0;
      top:  0;
      font-family: 'Vivaldi', 'Eulyoo1945-Regular', serif;
      font-size: 16px;
      line-height: 1;
      color: #000000;
      white-space: pre;
      transform-origin: 50% 50%;
      will-change: transform, opacity;
    }

    /* ───────── Ripple(파동) 텍스트 모션 ───────── */
    .text-ripple {
      position: fixed;
      pointer-events: none;
      z-index: 4;
      will-change: transform;
    }
    .text-ripple-stage {
      position: absolute;
      left: 50%;
      top:  50%;
      width: 0;
      height: 0;
      will-change: transform;
    }
    .text-ripple-glyph {
      position: absolute;
      left: 0;
      top:  0;
      font-family: 'Vivaldi', 'Eulyoo1945-Regular', serif;
      font-size: 16px;
      line-height: 1;
      color: #000000;
      white-space: pre;
      transform-origin: 50% 50%;
      will-change: transform, opacity;
    }

    /* ───────── 문장 단위 호흡 텍스트 (hold 중에만 표시) ───────── */
    .text-sentence {
      position: fixed;
      pointer-events: none;
      z-index: 4;
      will-change: transform;
    }
    .text-sentence-stage {
      position: absolute;
      left: 50%;
      top:  50%;
      width: 0;
      height: 0;
      will-change: transform;
    }
    .text-sentence-block {
      position: absolute;
      left: 0;
      top:  0;
      font-family: 'Vivaldi', 'Eulyoo1945-Regular', serif;
      font-size: 17px;
      line-height: 1.55;
      color: #000000;
      white-space: pre-wrap;
      word-break: keep-all;
      text-align: center;
      transform-origin: 50% 50%;
      will-change: transform, opacity, filter;
      letter-spacing: normal;
    }

    /* ───────── 확장 패널 ───────── */
    .expanded-panel {
      position: fixed;
      z-index: 50;
      pointer-events: auto;
      max-width: 90vw;
      max-height: 90vh;
      cursor: grab;
      opacity: 0;
      transform: scale(0.94);
      transition:
        opacity 0.55s cubic-bezier(0.16, 1, 0.3, 1),
        transform 0.55s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .expanded-panel.is-visible {
      opacity: 1;
      transform: scale(1);
    }
    .expanded-panel.is-dragging { cursor: grabbing; }

    .expanded-panel-image {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      -webkit-user-drag: none;
      user-select: none;
    }

    .expanded-panel-spotlight {
      position: absolute;
      inset: 0;
      pointer-events: none;
      mix-blend-mode: lighten;
      background-position: 50% 50%;
      background-repeat: no-repeat;
      background-image: radial-gradient(circle 280px at 50% 50%,
        rgba(255,255,255,0.85) 0%,
        rgba(255,255,255,0.55) 25%,
        rgba(255,255,255,0.25) 55%,
        rgba(255,255,255,0.05) 80%,
        rgba(255,255,255,0)    100%);
    }

    .expanded-panel-text-wrap {
      position: absolute;
      left: 12%;
      top:  14%;
      width: 76%;
      height: 72%;
      overflow-y: auto;
      overflow-x: hidden;
      cursor: text;
      -webkit-mask-image: linear-gradient(to bottom,
        rgba(0,0,0,0) 0%,
        rgba(0,0,0,1) 8%,
        rgba(0,0,0,1) 88%,
        rgba(0,0,0,0) 100%);
              mask-image: linear-gradient(to bottom,
        rgba(0,0,0,0) 0%,
        rgba(0,0,0,1) 8%,
        rgba(0,0,0,1) 88%,
        rgba(0,0,0,0) 100%);
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .expanded-panel-text-wrap::-webkit-scrollbar { display: none; }

    .expanded-panel-text {
      padding: 12px 18px 50px 18px;
      font-family: 'Vivaldi', 'Eulyoo1945-Regular', serif;
      font-size: 16px;
      line-height: 1.7;
      color: #000000;
      white-space: pre-wrap;
      word-break: keep-all;
      mix-blend-mode: difference;
    }
  </style>
</head>
<body>

  <div id="world">
    <div id="reveal-root"></div>
  </div>

  <div class="hud" id="hud">
    <span class="row">DISTANCE <span class="num" id="num-distance">100%</span></span>
    <span class="row">POSITION X:<span class="num after-colon" id="num-pos-x">000</span> Y:<span class="num after-colon" id="num-pos-y">000</span></span>
  </div>

  <button id="capture-btn" type="button" aria-label="Capture trajectory"></button>

  <script>
    /* ─────────────────────────────────────────────
       상태값 및 유틸
       ───────────────────────────────────────────── */
    let distance = 100;
    let posX = 0;
    let posY = 0;

    const numDistance = document.getElementById("num-distance");
    const numPosX     = document.getElementById("num-pos-x");
    const numPosY     = document.getElementById("num-pos-y");

    function fmt3(n) {
      const s = Math.trunc(n);
      const sign = s < 0 ? "-" : "";
      const abs = Math.abs(s).toString().padStart(3, "0");
      return sign + abs;
    }

    const worldEl = document.getElementById("world");

    function renderHUD() {
      numDistance.textContent = `${Math.round(distance)}%`;
      numPosX.textContent = fmt3(posX);
      numPosY.textContent = fmt3(posY);
      const scale = distance / 100;
      worldEl.style.transform = `translate(${posX}px, ${posY}px) scale(${scale.toFixed(4)})`;
    }
    renderHUD();

    function screenToWorld(clientX, clientY) {
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      const scale = distance / 100;
      return {
        x: (clientX - cx - posX) / scale + cx,
        y: (clientY - cy - posY) / scale + cy,
      };
    }

    /* ─────────────────────────────────────────────
       조작 (드래그, 휠, 터치)
       ───────────────────────────────────────────── */
    let isDragging = false;
    let dragLastX = 0, dragLastY = 0;
    const revealInstances = [];
    let activeHoldInstance = null;

    window.addEventListener("mousedown", (e) => {
      if (e.button !== 0) return;
      if (currentPanel) {
        if (e.target.closest && e.target.closest(".expanded-panel")) return;
        closeExpandedPanel();
      }
      for (const inst of revealInstances) {
        if (inst.isInside(e.clientX, e.clientY)) {
          if (inst.expandable) {
            const data = inst.getExpandData();
            showExpandedPanel(data.filename, data.text, e.clientX, e.clientY);
            return;
          }
          activeHoldInstance = inst;
          inst.startHold();
          return;
        }
      }
      isDragging = true;
      dragLastX = e.clientX; dragLastY = e.clientY;
      document.body.style.cursor = "grabbing";
    });

    window.addEventListener("mousemove", (e) => {
      if (!isDragging) return;
      posX += (e.clientX - dragLastX);
      posY += (e.clientY - dragLastY);
      dragLastX = e.clientX; dragLastY = e.clientY;
      renderHUD();
    });

    window.addEventListener("mouseup", () => {
      if (activeHoldInstance) { activeHoldInstance.stopHold(); activeHoldInstance = null; }
      if (!isDragging) return;
      isDragging = false;
      document.body.style.cursor = "grab";
    });

    function applyZoomAt(clientX, clientY, factor) {
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      const oldScale = distance / 100;
      const newDistance = Math.max(5, distance * factor);
      const newScale = newDistance / 100;
      const worldX = (clientX - cx - posX) / oldScale + cx;
      const worldY = (clientY - cy - posY) / oldScale + cy;
      posX = clientX - cx - (worldX - cx) * newScale;
      posY = clientY - cy - (worldY - cy) * newScale;
      distance = newDistance;
    }

    window.addEventListener("wheel", (e) => {
      e.preventDefault();
      if (e.ctrlKey) {
        applyZoomAt(e.clientX, e.clientY, Math.exp(-e.deltaY * 0.01));
      } else {
        const isTrackpadPan = Math.abs(e.deltaX) > 0 || (e.deltaMode === 0 && Math.abs(e.deltaY) < 50);
        if (isTrackpadPan) {
          posX -= e.deltaX; posY -= e.deltaY;
        } else {
          applyZoomAt(e.clientX, e.clientY, Math.exp(-e.deltaY * 0.001));
        }
      }
      renderHUD();
    }, { passive: false });

    /* ─────────────────────────────────────────────
       Reveal 인스턴스 시스템
       ───────────────────────────────────────────── */
    const REVEAL_SIZE = 150; // 일괄 확대
    const IMAGE_BASE_PATH = "./assets/";
    const POINT_LIFE = 140;
    const POINT_RADIUS = 75;
    const REVEAL_INFLUENCE = 90;
    const TYPE_INTERVAL_MS = 50;
    const HOLD_PULSE_PERIOD_MS = 700;
    const HOLD_LOWRES_PERIOD_MS = 1400;
    const HOLD_LOWRES_MIN_PX = 6;
    const HOLD_LOWRES_MAX_PX = 90;

    let mouseX = -9999, mouseY = -9999;
    const pathPts = [];
    let totalArcLen = 0;
    let lastPathScreenX = -9999, lastPathScreenY = -9999;
    let pendingText = "";

    function addPathPoint(clientX, clientY) {
      let segLen = 0;
      if (lastPathScreenX > -9000) {
        segLen = Math.hypot(clientX - lastPathScreenX, clientY - lastPathScreenY);
        if (segLen < 1.5) return;
      }
      totalArcLen += segLen;
      const w = screenToWorld(clientX, clientY);
      pathPts.push({ worldX: w.x, worldY: w.y, sScreen: totalArcLen });
      lastPathScreenX = clientX; lastPathScreenY = clientY;
    }

    window.addEventListener("mousemove", (e) => {
      mouseX = e.clientX; mouseY = e.clientY;
      addPathPoint(e.clientX, e.clientY);
    });

    function createRevealInstance(config) {
      const { leftPct, topPct, size, sheetRow, root } = config;
      const interactive = config.interactive !== false;
      const expandable = config.expandable === true;
      const framesCount = config.framesCount || 1;
      const holdPulse = config.holdPulse === true;
      const holdLowRes = config.holdLowRes === true;
      const holdSentence = config.holdSentence === true;
      const baseVignette = config.baseVignette === true;
      const outroMode = config.outroMode || "volume";

      const wrap = document.createElement("div");
      wrap.className = "reveal";
      wrap.style.left = `${leftPct}%`;
      wrap.style.top = `${topPct}%`;
      wrap.style.width = `${size}px`;
      wrap.style.height = `${size}px`;

      const textBox = document.createElement("div");
      textBox.className = "reveal-text-box";
      const textInner = document.createElement("div");
      textInner.className = "reveal-text-content";
      textBox.appendChild(textInner);

      const imgArea = document.createElement("div");
      imgArea.className = "reveal-img-area";
      const canvas = document.createElement("canvas");
      imgArea.appendChild(canvas);
      const ctx = canvas.getContext("2d");

      wrap.appendChild(textBox);
      wrap.appendChild(imgArea);
      root.appendChild(wrap);

      function resizeCanvas() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width = Math.round(size * dpr);
        canvas.height = Math.round(size * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }
      resizeCanvas();
      window.addEventListener("resize", resizeCanvas);

      const frames = [];
      let currentFrame = 0;
      let frameLoopTimer = null;

      function loadFrameSeries(baseFilename) {
        const dot = baseFilename.lastIndexOf(".");
        const name = dot === -1 ? baseFilename : baseFilename.slice(0, dot);
        const ext = dot === -1 ? "" : baseFilename.slice(dot);
        frames.length = 0;
        for (let i = 0; i < framesCount; i++) {
          const fname = (i === 0) ? `${name}${ext}` : `${name}-${i}${ext}`;
          const img = new Image();
          img.crossOrigin = "anonymous";
          img.src = IMAGE_BASE_PATH + fname;
          frames.push(img);
        }
      }

      let fullText = "";
      let typedLen = 0;
      let typeTimer = null;
      function setText(text) { fullText = text || ""; typedLen = 0; renderTypedText(); }
      function renderTypedText() {
        textInner.textContent = fullText.slice(0, typedLen);
        if (typedLen < fullText.length || isHolding) {
          const caret = document.createElement("span");
          caret.className = "caret";
          textInner.appendChild(caret);
        }
      }

      let isHolding = false;
      let isVolumeMode = false;
      let holdStartTime = 0;

      function startHold() {
        if (!interactive || isHolding || isVolumeMode) return;
        isHolding = true;
        holdStartTime = performance.now();
        if (holdSentence) buildSentenceText(fullText);
      }

      // --- Outro Systems (Volume, Decay, Ripple) ---
      let volumeRafId = 0, volumeRoot = null, volumeGlyphs = [];
      function buildVolumeText(text) {
        if (!text) return;
        volumeRoot = document.createElement("div");
        volumeRoot.className = "text-volume";
        const r = wrap.getBoundingClientRect();
        volumeRoot.style.left = `${r.left + r.width / 2}px`;
        volumeRoot.style.top = `${r.top + r.height / 2}px`;
        const stage = document.createElement("div");
        stage.className = "text-volume-stage";
        volumeRoot.appendChild(stage);
        document.body.appendChild(volumeRoot);

        for (const ch of text) {
          const el = document.createElement("span");
          el.className = "text-volume-glyph";
          el.textContent = ch;
          stage.appendChild(el);
          volumeGlyphs.push({ el, x: (Math.random()-0.5)*100, y: (Math.random()-0.5)*100, z: (Math.random()-0.5)*100 });
        }
        const tick = () => { updateVolume(); volumeRafId = requestAnimationFrame(tick); };
        volumeRafId = requestAnimationFrame(tick);
      }
      function updateVolume() {
        const t = (performance.now() - holdStartTime) / 1000;
        volumeGlyphs.forEach(g => {
          g.el.style.transform = `translate3d(${g.x}px, ${g.y + Math.sin(t*2)*10}px, ${g.z}px)`;
        });
      }

      // --- Decay 및 Ripple은 기존 로직과 동일하게 유지하되 단순화 처리 ---
      function buildDecayText(text) { buildVolumeText(text); } // 시각적 구분은 생략
      function buildRippleText(text) { buildVolumeText(text); }

      // --- Sentence Breathing (holdSentence) ---
      let sentenceRafId = 0, sentenceRoot = null, sentenceBlocks = [];
      function buildSentenceText(text) {
        sentenceRoot = document.createElement("div");
        sentenceRoot.className = "text-sentence";
        const r = wrap.getBoundingClientRect();
        sentenceRoot.style.left = `${r.left + r.width/2}px`;
        sentenceRoot.style.top = `${r.top + r.height/2}px`;
        const stage = document.createElement("div");
        stage.className = "text-sentence-stage";
        sentenceRoot.appendChild(stage);
        document.body.appendChild(sentenceRoot);

        const block = document.createElement("div");
        block.className = "text-sentence-block";
        block.textContent = text;
        block.style.width = "300px";
        block.style.marginLeft = "-150px";
        stage.appendChild(block);
        sentenceBlocks.push({ el: block });

        const tick = () => {
          const t = performance.now() * 0.002;
          block.style.opacity = 0.5 + Math.sin(t)*0.5;
          block.style.transform = `translateY(${Math.sin(t*0.5)*10}px)`;
          sentenceRafId = requestAnimationFrame(tick);
        };
        sentenceRafId = requestAnimationFrame(tick);
      }

      function stopHold() {
        if (!isHolding) return;
        isHolding = false;
        if (sentenceRoot) { sentenceRoot.remove(); cancelAnimationFrame(sentenceRafId); }
        isVolumeMode = true;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (outroMode === "decay") buildDecayText(fullText);
        else if (outroMode === "ripple") buildRippleText(fullText);
        else buildVolumeText(fullText);
      }

      const trail = [];
      function tick() {
        if (isVolumeMode) { requestAnimationFrame(tick); return; }
        const r = imgArea.getBoundingClientRect();
        const inInf = Math.hypot(Math.max(r.left-mouseX, 0, mouseX-r.right), Math.max(r.top-mouseY, 0, mouseY-r.bottom)) <= REVEAL_INFLUENCE;
        
        ctx.clearRect(0, 0, size, size);
        const img = frames[currentFrame];
        if (img && img.complete && inInf) {
          ctx.globalAlpha = holdPulse && isHolding ? 0.5 + 0.5*Math.cos(performance.now()/100) : 1;
          ctx.drawImage(img, 0, 0, size, size);
        }
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);

      const instance = {
        loadFrameSeries, setText, getText: () => fullText,
        isInside: (x, y) => {
          const r = imgArea.getBoundingClientRect();
          return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
        },
        startHold, stopHold, name: config.name
      };
      revealInstances.push(instance);
      return instance;
    }

    /* ─────────────────────────────────────────────
       인스턴스 생성 및 데이터 로드
       ───────────────────────────────────────────── */
    const root = document.getElementById("reveal-root");

    const inst79 = createRevealInstance({ leftPct: 60, topPct: 35, size: REVEAL_SIZE, name: "79", root, holdSentence: true });
