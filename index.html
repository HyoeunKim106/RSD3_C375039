<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Image Map</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden; background: #000;
      cursor: none;
    }
    canvas#webgl {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
    }
    #cursor-dot {
      position: fixed; z-index: 100;
      width: 6px; height: 6px;
      background: rgba(255,255,255,0.8);
      border-radius: 50%;
      pointer-events: none;
      mix-blend-mode: difference;
      transform: translate(-50%,-50%);
    }
  </style>
</head>
<body>

  <canvas id="webgl"></canvas>
  <div id="cursor-dot"></div>

  <script>
    /* ═══════════ 설정 ═══════════ */
    const BG_SRC     = "./assets/sample2.jpg";   // 배경
    const REVEAL_SRC = "./assets/sample1.jpg";   // 개체
    const BRUSH_SIZE = 0.12;   // 브러시 크기 (0~1, 화면 대비)
    const FADE_SPEED = 0.985;  // 붓자국 사라지는 속도 (1에 가까울수록 오래 남음)
    const RIPPLE_STR = 0.045;  // 일렁임 강도
    const LERP       = 0.06;   // 마우스 따라오는 속도

    /* ═══════════ WebGL 초기화 ═══════════ */
    const canvas = document.getElementById("webgl");
    const gl = canvas.getContext("webgl", { premultipliedAlpha: false });
    const dot = document.getElementById("cursor-dot");

    let W, H;
    function resize() {
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W;
      canvas.height = H;
      gl.viewport(0, 0, W, H);
    }
    resize();
    window.addEventListener("resize", resize);

    /* ═══════════ 셰이더 ═══════════ */
    const VERT = `
      attribute vec2 a_pos;
      varying vec2 vUv;
      void main() {
        vUv = a_pos * 0.5 + 0.5;
        gl_Position = vec4(a_pos, 0.0, 1.0);
      }
    `;

    // 메인 합성 셰이더
    const FRAG = `
      precision highp float;
      varying vec2 vUv;

      uniform sampler2D u_bg;
      uniform sampler2D u_reveal;
      uniform sampler2D u_mask;
      uniform float u_time;
      uniform float u_ripple;
      uniform vec2 u_resolution;

      void main() {
        vec2 uv = vUv;

        // 마스크 값 읽기
        float m = texture2D(u_mask, uv).r;

        // ★ 일렁임: 마스크 경계에서 displacement
        float edge = smoothstep(0.0, 0.6, m) * (1.0 - smoothstep(0.4, 1.0, m));
        float rippleX = sin(uv.y * 35.0 + u_time * 3.0) * edge * u_ripple;
        float rippleY = cos(uv.x * 28.0 + u_time * 2.5) * edge * u_ripple;
        // 붓질 느낌: 더 불규칙한 왜곡 추가
        rippleX += sin(uv.y * 80.0 + u_time * 5.0) * edge * u_ripple * 0.4;
        rippleY += cos(uv.x * 65.0 + u_time * 4.2) * edge * u_ripple * 0.3;

        vec2 distortedUv = uv + vec2(rippleX, rippleY);

        vec4 bg     = texture2D(u_bg, distortedUv);
        vec4 reveal = texture2D(u_reveal, distortedUv);

        // 배경을 어둡고 무채색으로
        float gray = dot(bg.rgb, vec3(0.299, 0.587, 0.114));
        vec3 bgDark = vec3(gray) * 0.35;

        // reveal은 선명하게
        vec3 revBright = reveal.rgb * 1.15;

        // 부드러운 블렌딩
        float blend = smoothstep(0.05, 0.55, m);
        vec3 color = mix(bgDark, revBright, blend);

        gl_FragColor = vec4(color, 1.0);
      }
    `;

    // 브러시 → 마스크 텍스처 그리는 셰이더
    const BRUSH_FRAG = `
      precision highp float;
      varying vec2 vUv;

      uniform sampler2D u_prev;
      uniform vec2 u_mouse;
      uniform vec2 u_prevMouse;
      uniform float u_brushSize;
      uniform float u_fade;
      uniform vec2 u_resolution;
      uniform float u_pressure;

      float distToSegment(vec2 p, vec2 a, vec2 b) {
        vec2 pa = p - a, ba = b - a;
        float h = clamp(dot(pa, ba) / dot(ba, ba), 0.0, 1.0);
        return length(pa - ba * h);
      }

      void main() {
        vec2 uv = vUv;
        float prev = texture2D(u_prev, uv).r;

        // 이전 마스크를 서서히 fade
        prev *= u_fade;

        // 브러시 스트로크 (선분 거리)
        vec2 aspect = vec2(u_resolution.x / u_resolution.y, 1.0);
        float dist = distToSegment(uv * aspect, u_mouse * aspect, u_prevMouse * aspect);

        // 붓질 가장자리 불규칙하게
        float noise = sin(uv.x * 120.0) * cos(uv.y * 95.0) * 0.3 + 0.7;
        float brush = smoothstep(u_brushSize, u_brushSize * 0.15, dist * noise);

        brush *= u_pressure;

        float result = max(prev, brush);

        gl_FragColor = vec4(vec3(result), 1.0);
      }
    `;

    /* ═══════════ 유틸 ═══════════ */
    function createShader(src, type) {
      const s = gl.createShader(type);
      gl.shaderSource(s, src);
      gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
        console.error(gl.getShaderInfoLog(s));
      return s;
    }

    function createProgram(vs, fs) {
      const p = gl.createProgram();
      gl.attachShader(p, createShader(vs, gl.VERTEX_SHADER));
      gl.attachShader(p, createShader(fs, gl.FRAGMENT_SHADER));
      gl.linkProgram(p);
      if (!gl.getProgramParameter(p, gl.LINK_STATUS))
        console.error(gl.getProgramInfoLog(p));
      return p;
    }

    function getUniforms(prog, names) {
      const u = {};
      names.forEach(n => u[n] = gl.getUniformLocation(prog, n));
      return u;
    }

    /* ── 풀스크린 쿼드 ── */
    const quad = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, quad);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
      -1,-1, 1,-1, -1,1, 1,1
    ]), gl.STATIC_DRAW);

    function bindQuad(prog) {
      const a = gl.getAttribLocation(prog, "a_pos");
      gl.bindBuffer(gl.ARRAY_BUFFER, quad);
      gl.enableVertexAttribArray(a);
      gl.vertexAttribPointer(a, 2, gl.FLOAT, false, 0, 0);
    }

    /* ── 텍스처 로드 ── */
    function loadTexture(src) {
      return new Promise(resolve => {
        const tex = gl.createTexture();
        const img = new Image();
        img.onload = () => {
          gl.bindTexture(gl.TEXTURE_2D, tex);
          gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
          resolve(tex);
        };
        img.src = src;
      });
    }

    /* ── FBO (마스크 핑퐁) ── */
    function createFBO() {
      const tex = gl.createTexture();
      gl.bindTexture(gl.TEXTURE_2D, tex);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, W, H, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);

      const fb = gl.createFramebuffer();
      gl.bindFramebuffer(gl.FRAMEBUFFER, fb);
      gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
      gl.bindFramebuffer(gl.FRAMEBUFFER, null);

      return { tex, fb };
    }

    let fbo0, fbo1;

    /* ═══════════ 프로그램 ═══════════ */
    const mainProg  = createProgram(VERT, FRAG);
    const brushProg = createProgram(VERT, BRUSH_FRAG);

    const mainU = getUniforms(mainProg, [
      "u_bg", "u_reveal", "u_mask", "u_time", "u_ripple", "u_resolution"
    ]);
    const brushU = getUniforms(brushProg, [
      "u_prev", "u_mouse", "u_prevMouse", "u_brushSize", "u_fade",
      "u_resolution", "u_pressure"
    ]);

    /* ═══════════ 마우스 ═══════════ */
    let mouseX = 0.5, mouseY = 0.5;
    let lerpX  = 0.5, lerpY  = 0.5;
    let prevLerpX = 0.5, prevLerpY = 0.5;
    let isOnScreen = false;
    let velocity = 0;

    document.addEventListener("mousemove", (e) => {
      const newX = e.clientX / W;
      const newY = 1.0 - e.clientY / H;
      velocity = Math.hypot(newX - mouseX, newY - mouseY);
      mouseX = newX;
      mouseY = newY;
      isOnScreen = true;

      dot.style.left = e.clientX + "px";
      dot.style.top  = e.clientY + "px";
    });

    document.addEventListener("mouseleave", () => { isOnScreen = false; });
    document.addEventListener("mouseenter", () => { isOnScreen = true; });

    /* ═══════════ 메인 ═══════════ */
    async function main() {
      const bgTex     = await loadTexture(BG_SRC);
      const revealTex = await loadTexture(REVEAL_SRC);

      fbo0 = createFBO();
      fbo1 = createFBO();

      let time = 0;
      let ping = 0;

      function frame() {
        time += 0.016;

        // lerp 마우스
        prevLerpX = lerpX;
        prevLerpY = lerpY;
        lerpX += (mouseX - lerpX) * LERP;
        lerpY += (mouseY - lerpY) * LERP;

        // 브러시 압력: 움직일 때 강하고, 멈추면 약해짐
        const pressure = isOnScreen ? Math.min(1.0, velocity * 8 + 0.3) : 0.0;

        const src = ping === 0 ? fbo0 : fbo1;
        const dst = ping === 0 ? fbo1 : fbo0;

        /* ── 1단계: 브러시 → 마스크 FBO에 그리기 ── */
        gl.bindFramebuffer(gl.FRAMEBUFFER, dst.fb);
        gl.viewport(0, 0, W, H);
        gl.useProgram(brushProg);
        bindQuad(brushProg);

        gl.activeTexture(gl.TEXTURE0);
        gl.bindTexture(gl.TEXTURE_2D, src.tex);
        gl.uniform1i(brushU.u_prev, 0);

        gl.uniform2f(brushU.u_mouse, lerpX, lerpY);
        gl.uniform2f(brushU.u_prevMouse, prevLerpX, prevLerpY);
        gl.uniform1f(brushU.u_brushSize, BRUSH_SIZE);
        gl.uniform1f(brushU.u_fade, FADE_SPEED);
        gl.uniform2f(brushU.u_resolution, W, H);
        gl.uniform1f(brushU.u_pressure, pressure);

        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

        /* ── 2단계: 합성 → 화면에 그리기 ── */
        gl.bindFramebuffer(gl.FRAMEBUFFER, null);
        gl.viewport(0, 0, W, H);
        gl.useProgram(mainProg);
        bindQuad(mainProg);

        gl.activeTexture(gl.TEXTURE0);
        gl.bindTexture(gl.TEXTURE_2D, bgTex);
        gl.uniform1i(mainU.u_bg, 0);

        gl.activeTexture(gl.TEXTURE1);
        gl.bindTexture(gl.TEXTURE_2D, revealTex);
        gl.uniform1i(mainU.u_reveal, 1);

        gl.activeTexture(gl.TEXTURE2);
        gl.bindTexture(gl.TEXTURE_2D, dst.tex);
        gl.uniform1i(mainU.u_mask, 2);

        gl.uniform1f(mainU.u_time, time);
        gl.uniform1f(mainU.u_ripple, RIPPLE_STR);
        gl.uniform2f(mainU.u_resolution, W, H);

        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

        ping = 1 - ping;
        requestAnimationFrame(frame);
      }

      frame();
    }

    main();

    /* ── 리사이즈 시 FBO 재생성 ── */
    window.addEventListener("resize", () => {
      resize();
      fbo0 = createFBO();
      fbo1 = createFBO();
    });
  </script>
</body>
</html>
