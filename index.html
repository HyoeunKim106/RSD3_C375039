<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eyes on the Road</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <header>
      <h1 id="site-title"></h1>
      <p id="site-desc"></p>
    </header>

    <section class="about">
      <p id="about-text"></p>
    </section>

    <section class="works">
      <div id="grid"></div>
    </section>

    <script>
      // 1. 시트 ID 설정
      const SPREADSHEET_ID = "1pintIO8VNpryzS56eqXaNjqzx5f3EeAV"; // 교수님 템플릿 시트
      const MY_SPREADSHEET_ID = "1gwxvcHqxgNHOOoS1R_NV8EH7WHNudGd7EhsvWHG76p8"; // 효은님 데이터 시트

      const KEYS = {
        title:       "Meta-Title",
        description: "Meta-Description",
        about:       "About",
        project:     "UL-Project",
        date:        "UL-Date",
        location:    "UL-Location",
        note:        "UL-Note",
        image:       "UL-Images",
      };

      const CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv`;
      const MY_CSV_URL = `https://docs.google.com/spreadsheets/d/${MY_SPREADSHEET_ID}/export?format=csv`;

      // CSV 파싱 함수
      function parseCSV(text) {
        const lines = text.trim().split("\n");
        const headers = splitCSVLine(lines[0]);
        return lines.slice(1).map((line) => {
          const values = splitCSVLine(line);
          const obj = {};
          headers.forEach((h, i) => {
            obj[h.trim()] = (values[i] || "").trim();
          });
          return obj;
        });
      }

      function splitCSVLine(line) {
        const result = [];
        let current = "";
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (ch === '"') {
            inQuotes = !inQuotes;
          } else if (ch === "," && !inQuotes) {
            result.push(current);
            current = "";
          } else {
            current += ch;
          }
        }
        result.push(current);
        return result;
      }

      // 무작위 섞기 함수 (Fisher-Yates Shuffle)
      function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
      }

      // 데이터 페칭 및 실행
      Promise.all([
        fetch(CSV_URL).then(res => res.text()),
        fetch(MY_CSV_URL).then(res => res.text())
      ])
      .then(([templateText, myText]) => {
        const rows = parseCSV(templateText);
        const myRows = parseCSV(myText);

        // 1) 메타 정보 설정
        const first = rows[0] || {};
        document.getElementById("site-title").textContent = first[KEYS.title]       || "";
        document.getElementById("site-desc").textContent  = first[KEYS.description] || "";
        document.getElementById("about-text").textContent = first[KEYS.about]       || "";
        document.title = first[KEYS.title] || "";

        // 2) 효은님 시트의 I열(9번째 열 = 인덱스 8) 텍스트 추출 및 섞기
        // I2부터 I81까지의 데이터를 무작위로 섞습니다.
        let randomTexts = myRows
          .map(row => Object.values(row)[8]) 
          .filter(val => val && val.trim() !== "");
        
        randomTexts = shuffleArray(randomTexts);

        // 3) 그리드 생성
        const grid = document.getElementById("grid");
        rows.forEach((row, index) => {
          if (!row[KEYS.project]) return;

          const card = document.createElement("div");
          card.className = "card";

          if (row[KEYS.image]) {
            const img = document.createElement("img");
            img.src     = row[KEYS.image];
            img.alt     = row[KEYS.project];
            img.loading = "lazy";
            card.appendChild(img);
          }

          const body = document.createElement("div");
          body.className = "card-body";

          const year     = row[KEYS.date] ? Math.floor(Number(row[KEYS.date])) || row[KEYS.date] : "";
          const location = row[KEYS.location] || "";
          
          // 랜덤 텍스트 주입 (데이터가 모자라면 반복 사용)
          const note = randomTexts.length > 0 
            ? randomTexts[index % randomTexts.length] 
            : (row[KEYS.note] || "");

          body.innerHTML = `
            <p class="project-name">${row[KEYS.project]}</p>
            <p class="project-meta">${[year, location].filter(Boolean).join(" | ")}</p>
            ${note ? `<p class="project-note">${note}</p>` : ""}
          `;

          card.appendChild(body);
          grid.appendChild(card);
        });
      })
      .catch((err) => {
        console.error("Error:", err);
        document.getElementById("grid").innerHTML = `<p style="color:red">데이터 로드 실패: 시트 공유 설정을 확인하세요.</p>`;
      });
    </script>
  </body>
</html>
