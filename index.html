<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Image Map</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    /* 로컬 폰트 — assets 폴더에 'New Century Schoolbook Roman.otf' 파일 필요 */
    @font-face {
      font-family: 'NewCenturySchoolbook';
      src: url('./assets/New Century Schoolbook Roman.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #f0ede8; }
    .bg-img {
      position: fixed; inset: 0; z-index: 1;
      width: 100%; height: 100%; object-fit: cover;
    }
    #paint-canvas {
      position: fixed; inset: 0; z-index: 2;
      width: 100%; height: 100%; pointer-events: none;
    }
    #shape-canvas {
      position: fixed; inset: 0; z-index: 3;
      width: 100%; height: 100%; pointer-events: none;
    }
    #ui-canvas {
      position: fixed; inset: 0; z-index: 4;
      pointer-events: auto; cursor: crosshair;
    }

    /* Name title — New Century Schoolbook Roman, 흰 박스 + 검정 텍스트 */
    .name-title {
      position: fixed;
      top: 24px;
      left: 28px;
      z-index: 10;
      pointer-events: none;
      font-family: 'NewCenturySchoolbook', 'Century Schoolbook', 'Times New Roman', Times, serif;
      font-weight: 400;
      font-size: 15px;
      color: #000;
      line-height: 1;
      letter-spacing: 0;
    }
    .name-title span {
      display: inline-block;
      background: #fff;
      color: #000;
      padding: 0 4px;
      line-height: 1;
    }
    .name-title .main { }
    .name-title .sub {
      margin-top: 3px;
    }
    .name-title .line {
      display: block;
    }

    .hint {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%); z-index: 5;
      font: 300 11px 'Pretendard', sans-serif;
      color: rgba(80,80,80,0.25);
      letter-spacing: 0.04em; pointer-events: none;
    }
  </style>
</head>
<body>

  <img class="bg-img" src="./assets/sample2.jpg" alt="bg" />
  <canvas id="paint-canvas"></canvas>
  <canvas id="shape-canvas"></canvas>
  <canvas id="ui-canvas"></canvas>

  <div class="name-title">
    <span class="line main">Hyoeun Kim</span>
    <span class="line sub">Scenes without Scenes</span>
  </div>

  <div class="hint">hover to reveal · hold for text · release to drop</div>

  <script>
    const paintCvs = document.getElementById("paint-canvas");
    const paintCtx = paintCvs.getContext("2d");
    const shapeCvs = document.getElementById("shape-canvas");
    const shapeCtx = shapeCvs.getContext("2d");
    const uiCvs = document.getElementById("ui-canvas");
    const ui = uiCvs.getContext("2d");

    let W, H;
    const paintImg = new Image();
    paintImg.src = "./assets/sample1.jpg";
    let imgReady = false;
    paintImg.onload = () => { imgReady = true; };

    function resize() {
      W = window.innerWidth; H = window.innerHeight;
      paintCvs.width = W; paintCvs.height = H;
      shapeCvs.width = W; shapeCvs.height = H;
      uiCvs.width = W; uiCvs.height = H;
    }
    resize();
    window.addEventListener("resize", resize);

    /* ═══════════════════════════════════════
       BRUSH PAINT REVEAL
       ═══════════════════════════════════════ */
    const trail = [];
    const LIFETIME = 50, BRUSH_R = 80;
    let mouseX = 0, mouseY = 0, prevMX = -999, prevMY = -999;

    function addTrail(x0, y0, x1, y1, radiusBoost = 0) {
      const dx = x1 - x0, dy = y1 - y0;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const steps = Math.max(1, Math.floor(dist / 6));
      const r = BRUSH_R + Math.min(dist, 50) * 0.6 + radiusBoost;
      for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        trail.push({ x: x0 + dx * t, y: y0 + dy * t, age: 0, r: r + (Math.random() - 0.5) * 12 });
      }
    }

    // 제자리 홀딩에서도 일렁임이 지속되도록 — 포인터 근처에
    // 랜덤 오프셋으로 브러시 점을 계속 추가
    function addStationaryShimmer(x, y) {
      const count = 2;
      for (let i = 0; i < count; i++) {
        const ang = Math.random() * Math.PI * 2;
        const dist = Math.random() * 22;
        const px = x + Math.cos(ang) * dist;
        const py = y + Math.sin(ang) * dist;
        const r = BRUSH_R + (Math.random() - 0.5) * 24;
        trail.push({ x: px, y: py, age: 0, r });
      }
    }

    function renderPaint() {
      paintCtx.clearRect(0, 0, W, H);
      if (!imgReady || trail.length === 0) return;
      paintCtx.save();
      for (let i = trail.length - 1; i >= 0; i--) {
        const p = trail[i]; p.age++;
        if (p.age > LIFETIME) { trail.splice(i, 1); continue; }
        const life = p.age / LIFETIME;
        let a = life < 0.04 ? life / 0.04 : 1 - Math.pow((life - 0.04) / 0.96, 0.8);
        a *= 0.95;
        if (a < 0.005) continue;
        const g = paintCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
        g.addColorStop(0,   `rgba(255,255,255,${a.toFixed(3)})`);
        g.addColorStop(0.3, `rgba(255,255,255,${(a * 0.7).toFixed(3)})`);
        g.addColorStop(0.6, `rgba(255,255,255,${(a * 0.3).toFixed(3)})`);
        g.addColorStop(1,   `rgba(255,255,255,0)`);
        paintCtx.fillStyle = g;
        paintCtx.beginPath();
        paintCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        paintCtx.fill();
      }
      paintCtx.globalCompositeOperation = "source-in";
      paintCtx.drawImage(paintImg, 0, 0, W, H);
      paintCtx.restore();
    }

    /* ═══════════════════════════════════════
       FLOATING APPLES
       ═══════════════════════════════════════ */
    const apples = [];

    function createApple(x, y) {
      const hue = 350 + (Math.random() - 0.5) * 20;
      const sat = 65 + Math.random() * 15;
      const light = 45 + Math.random() * 10;
      apples.push({
        x, y,
        vx: (Math.random() - 0.5) * 2.2,
        vy: (Math.random() - 0.5) * 2.2 - 0.5,
        size: 22 + Math.random() * 18,
        rot: (Math.random() - 0.5) * 0.4,
        rotSpeed: (Math.random() - 0.5) * 0.015,
        color: `hsl(${hue}, ${sat}%, ${light}%)`,
        highlight: `hsla(${hue + 10}, ${sat - 20}%, ${light + 30}%, 0.55)`,
        stemColor: `hsl(25, 45%, 25%)`,
        leafColor: `hsl(95, 40%, 40%)`,
        birthTime: 0,
        nSeedX: Math.random() * 1000,
        nSeedY: Math.random() * 1000,
      });
    }

    function updateApples() {
      for (const a of apples) {
        a.birthTime++;
        a.nSeedX += 0.01;
        a.nSeedY += 0.008;
        const driftX = Math.sin(a.nSeedX) * 0.04 + Math.cos(a.nSeedX * 0.7) * 0.02;
        const driftY = Math.cos(a.nSeedY) * 0.04 + Math.sin(a.nSeedY * 1.3) * 0.02;
        a.vx += driftX;
        a.vy += driftY;
        a.vx *= 0.995;
        a.vy *= 0.995;
        const sp = Math.sqrt(a.vx * a.vx + a.vy * a.vy);
        const MAX = 1.8;
        if (sp > MAX) {
          a.vx = (a.vx / sp) * MAX;
          a.vy = (a.vy / sp) * MAX;
        }
        a.x += a.vx;
        a.y += a.vy;
        a.rot += a.rotSpeed;
        const pad = a.size;
        if (a.x < pad) { a.x = pad; a.vx = Math.abs(a.vx) * 0.8; }
        if (a.x > W - pad) { a.x = W - pad; a.vx = -Math.abs(a.vx) * 0.8; }
        if (a.y < pad) { a.y = pad; a.vy = Math.abs(a.vy) * 0.8; }
        if (a.y > H - pad) { a.y = H - pad; a.vy = -Math.abs(a.vy) * 0.8; }
      }
    }

    function drawApple(ctx, a) {
      const s = a.size;
      let scale = 1;
      if (a.birthTime < 30) {
        const t = a.birthTime / 30;
        scale = 1 + (Math.sin(t * Math.PI) * 0.15) * (1 - t * 0.5);
        if (a.birthTime < 10) scale *= a.birthTime / 10;
      }

      ctx.save();
      ctx.translate(a.x, a.y);
      ctx.rotate(a.rot);
      ctx.scale(scale, scale);

      ctx.save();
      ctx.globalAlpha = 0.18;
      ctx.fillStyle = "#000";
      ctx.beginPath();
      ctx.ellipse(2, s * 0.95, s * 0.85, s * 0.25, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      ctx.fillStyle = a.color;
      ctx.beginPath();
      ctx.ellipse(-s * 0.22, 0, s * 0.78, s * 0.85, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(s * 0.22, 0, s * 0.78, s * 0.85, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = a.color;
      ctx.beginPath();
      ctx.ellipse(0, -s * 0.7, s * 0.45, s * 0.2, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = a.highlight;
      ctx.beginPath();
      ctx.ellipse(-s * 0.35, -s * 0.25, s * 0.2, s * 0.32, -0.3, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "rgba(255,255,255,0.5)";
      ctx.beginPath();
      ctx.ellipse(-s * 0.4, -s * 0.4, s * 0.08, s * 0.12, -0.3, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = a.stemColor;
      ctx.lineWidth = s * 0.08;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(0, -s * 0.78);
      ctx.quadraticCurveTo(s * 0.08, -s * 1.0, s * 0.18, -s * 1.05);
      ctx.stroke();

      ctx.fillStyle = a.leafColor;
      ctx.beginPath();
      ctx.ellipse(s * 0.3, -s * 0.92, s * 0.22, s * 0.11, -0.6, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "rgba(0,0,0,0.15)";
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(s * 0.14, -s * 0.86);
      ctx.lineTo(s * 0.48, -s * 0.98);
      ctx.stroke();

      ctx.restore();
    }

    function renderShapes() {
      shapeCtx.clearRect(0, 0, W, H);
      for (const a of apples) drawApple(shapeCtx, a);
    }

    /* ═══════════════════════════════════════
       TEXT MOTION — "계산하듯 조직되는" 모션
       각 글자는 초기에 랜덤 위치에서 시작하여
       최종 위치로 스프링처럼 수렴한다.
       글자가 자리를 찾은 뒤 단어별 괄호 브래킷과
       측정선이 그려지며 구조가 조직된다.
       ═══════════════════════════════════════ */
    const SENTENCE = "사과의 시각적 표상은 없지만, 벡터가 포함된 완벽한 3D 모델을 가지고 있어요.";
    const CHARS = [...SENTENCE];

    let isHolding = false;
    let holdX = 0, holdY = 0;

    // Phases: idle → organizing → structuring → hold → fadeout
    let textPhase = "idle";
    let textTimer = 0;
    let textAlpha = 1;
    const HOLD_DUR = 80;
    const ORGANIZE_DUR = 55;    // 글자가 제자리를 찾는 시간
    const STRUCTURE_DUR = 30;   // 구조선이 그어지는 시간

    // 각 글자별 상태 — 초기 위치, 목표 위치, 현재 위치, 도착 시각
    const glyphs = CHARS.map((ch, i) => ({
      ch,
      // 초기 랜덤 오프셋 (격자 밖 어딘가에서 시작)
      startOX: (Math.random() - 0.5) * 140,
      startOY: (Math.random() - 0.5) * 80,
      // 현재 렌더링 오프셋 (목표는 0,0)
      ox: 0, oy: 0,
      // 회전 각도
      startRot: (Math.random() - 0.5) * 0.6,
      rot: 0,
      // 각 글자의 수렴 시작 시점 (연속적으로 순차 도착)
      delay: i * 1.2 + Math.random() * 2,
      // 개별 알파
      alpha: 0,
      // 도착 시 작은 "클릭" 강조 (프레임 카운트)
      settleFlash: 0,
      settled: false,
    }));

    // 단어 경계 계산 (공백 기준)
    function computeWordRanges() {
      const ranges = [];
      let start = 0;
      for (let i = 0; i <= CHARS.length; i++) {
        if (i === CHARS.length || CHARS[i] === " ") {
          if (i > start) ranges.push([start, i - 1]);
          start = i + 1;
        }
      }
      return ranges;
    }
    const WORD_RANGES = computeWordRanges();

    function resetText() {
      textPhase = "organizing";
      textTimer = 0;
      textAlpha = 1;
      glyphs.forEach((g, i) => {
        g.ox = g.startOX;
        g.oy = g.startOY;
        g.rot = g.startRot;
        g.alpha = 0;
        g.settleFlash = 0;
        g.settled = false;
      });
    }

    function updateText() {
      if (textPhase === "idle") {
        if (isHolding) resetText();
        return;
      }
      if (!isHolding && textPhase !== "fadeout") textPhase = "fadeout";
      textTimer++;

      if (textPhase === "organizing") {
        // 각 글자가 제자리로 수렴 — easeOutCubic 기반 스프링
        let allSettled = true;
        for (let i = 0; i < glyphs.length; i++) {
          const g = glyphs[i];
          const localT = textTimer - g.delay;
          if (localT < 0) { g.alpha = 0; allSettled = false; continue; }

          const progress = Math.min(1, localT / 18);
          // easeOutCubic
          const eased = 1 - Math.pow(1 - progress, 3);
          g.ox = g.startOX * (1 - eased);
          g.oy = g.startOY * (1 - eased);
          g.rot = g.startRot * (1 - eased);
          g.alpha = Math.min(1, progress * 1.5);

          if (progress < 1) allSettled = false;
          else if (!g.settled) {
            g.settled = true;
            g.settleFlash = 8;
          }
          if (g.settleFlash > 0) g.settleFlash--;
        }

        if (allSettled && textTimer > ORGANIZE_DUR) {
          textPhase = "structuring";
          textTimer = 0;
        }
      }
      else if (textPhase === "structuring") {
        // 글자는 정렬 완료, 이제 구조선/괄호가 그려지는 단계
        for (const g of glyphs) {
          if (g.settleFlash > 0) g.settleFlash--;
        }
        if (textTimer > STRUCTURE_DUR) {
          textPhase = "hold";
          textTimer = 0;
        }
      }
      else if (textPhase === "hold") {
        if (textTimer > HOLD_DUR) { textPhase = "fadeout"; textTimer = 0; }
      }
      else if (textPhase === "fadeout") {
        textAlpha -= 0.03;
        if (textAlpha <= 0) {
          textAlpha = 0;
          if (isHolding) resetText();
          else textPhase = "idle";
        }
      }
    }

    function drawText() {
      if (textPhase === "idle") return;
      const fontSize = 14;
      ui.font = `300 ${fontSize}px 'Pretendard', sans-serif`;
      ui.textBaseline = "middle";

      // 각 글자 너비 측정
      const cw = [];
      let totalW = 0;
      for (const ch of CHARS) {
        const w = ui.measureText(ch).width;
        cw.push(w); totalW += w;
      }

      const startX = holdX - totalW / 2;
      const baseY = holdY;

      // 각 글자의 "목표" (anchor) x 좌표 계산
      const anchorX = [];
      {
        let cx = startX;
        for (let i = 0; i < CHARS.length; i++) {
          anchorX.push(cx);
          cx += cw[i];
        }
      }

      // ── 측정선(ruler) 및 구조선 ─────────────────
      // organizing 단계에서는 희미하게, structuring에서 선명해짐
      let structAlpha = 0;
      if (textPhase === "organizing") {
        structAlpha = Math.min(1, textTimer / ORGANIZE_DUR) * 0.25;
      } else if (textPhase === "structuring") {
        structAlpha = 0.25 + Math.min(1, textTimer / STRUCTURE_DUR) * 0.35;
      } else if (textPhase === "hold" || textPhase === "fadeout") {
        structAlpha = 0.6;
      }
      structAlpha *= textAlpha;

      if (structAlpha > 0.01) {
        // 상단 기준선 (organizing 초기부터 보임)
        ui.save();
        ui.globalAlpha = structAlpha * 0.5;
        ui.strokeStyle = "#111";
        ui.lineWidth = 0.5;
        ui.setLineDash([2, 3]);
        ui.beginPath();
        ui.moveTo(startX - 8, baseY - fontSize * 0.9);
        ui.lineTo(startX + totalW + 8, baseY - fontSize * 0.9);
        ui.stroke();
        // 하단 기준선
        ui.beginPath();
        ui.moveTo(startX - 8, baseY + fontSize * 0.9);
        ui.lineTo(startX + totalW + 8, baseY + fontSize * 0.9);
        ui.stroke();
        ui.setLineDash([]);
        ui.restore();

        // 좌우 끝 짧은 수직 마커
        ui.save();
        ui.globalAlpha = structAlpha * 0.7;
        ui.strokeStyle = "#111";
        ui.lineWidth = 0.6;
        ui.beginPath();
        ui.moveTo(startX - 6, baseY - fontSize * 0.95);
        ui.lineTo(startX - 6, baseY + fontSize * 0.95);
        ui.moveTo(startX + totalW + 6, baseY - fontSize * 0.95);
        ui.lineTo(startX + totalW + 6, baseY + fontSize * 0.95);
        ui.stroke();
        ui.restore();
      }

      // ── 단어 그룹 브래킷 (structuring 단계에 순차적으로 그려짐) ──
      if (textPhase === "structuring" || textPhase === "hold" || textPhase === "fadeout") {
        const t = textPhase === "structuring" ? Math.min(1, textTimer / STRUCTURE_DUR) : 1;
        for (let w = 0; w < WORD_RANGES.length; w++) {
          // 단어별 순차 등장
          const wordDelay = w / WORD_RANGES.length;
          if (t < wordDelay) continue;
          const wordT = Math.min(1, (t - wordDelay) / (1 / WORD_RANGES.length));

          const [a, b] = WORD_RANGES[w];
          const x0 = anchorX[a];
          const x1 = anchorX[b] + cw[b];
          const by = baseY + fontSize * 1.15;

          ui.save();
          ui.globalAlpha = wordT * textAlpha * 0.55;
          ui.strokeStyle = "#111";
          ui.lineWidth = 0.7;
          ui.beginPath();
          // ⌞ ⌟ 스타일 하단 브래킷
          const tickH = 3;
          ui.moveTo(x0, by - tickH);
          ui.lineTo(x0, by);
          ui.lineTo(x1, by);
          ui.lineTo(x1, by - tickH);
          ui.stroke();
          ui.restore();

          // 단어 위에 작은 인덱스 번호 (w+1)
          if (wordT > 0.5) {
            ui.save();
            ui.globalAlpha = ((wordT - 0.5) / 0.5) * textAlpha * 0.45;
            ui.fillStyle = "#111";
            ui.font = `300 8px 'Pretendard', sans-serif`;
            ui.textAlign = "center";
            ui.fillText(String(w + 1).padStart(2, "0"), (x0 + x1) / 2, by + 9);
            ui.restore();
          }
        }
      }

      // ── 글자 본체 렌더링 ────────────────────────
      ui.font = `300 ${fontSize}px 'Pretendard', sans-serif`;
      ui.textBaseline = "middle";
      ui.textAlign = "left";

      for (let i = 0; i < CHARS.length; i++) {
        const g = glyphs[i];
        if (g.alpha <= 0.01) continue;

        const x = anchorX[i] + g.ox;
        const y = baseY + g.oy;

        // 이동 중 — 목표 위치에 "고스트" 점선 테두리 표시
        if (textPhase === "organizing" && !g.settled) {
          const moveDist = Math.sqrt(g.ox * g.ox + g.oy * g.oy);
          if (moveDist > 2) {
            ui.save();
            ui.globalAlpha = textAlpha * 0.2 * g.alpha;
            ui.strokeStyle = "#111";
            ui.lineWidth = 0.4;
            ui.setLineDash([1.5, 1.5]);
            ui.strokeRect(anchorX[i], baseY - fontSize * 0.55, cw[i], fontSize * 1.1);
            ui.setLineDash([]);
            // 궤적선 — 현재 위치에서 목표 위치로
            ui.globalAlpha = textAlpha * 0.15 * g.alpha;
            ui.beginPath();
            ui.moveTo(x + cw[i] / 2, y);
            ui.lineTo(anchorX[i] + cw[i] / 2, baseY);
            ui.stroke();
            ui.restore();
          }
        }

        // 도착 플래시 — 짧은 흰 하이라이트 박스
        if (g.settleFlash > 0) {
          const fa = (g.settleFlash / 8) * textAlpha * 0.35;
          ui.fillStyle = `rgba(30,30,30,${fa.toFixed(3)})`;
          ui.fillRect(anchorX[i] - 1, baseY - fontSize * 0.55, cw[i] + 2, fontSize * 1.1);
        }

        ui.save();
        ui.globalAlpha = textAlpha * g.alpha;
        ui.translate(x + cw[i] / 2, y);
        ui.rotate(g.rot);
        ui.translate(-cw[i] / 2, 0);
        ui.fillStyle = "#111";
        ui.fillText(CHARS[i], 0, 0);
        ui.restore();
      }
    }

    /* ═══════════════════════════════════════
       EVENTS
       ═══════════════════════════════════════ */
    uiCvs.addEventListener("mousemove", e => {
      mouseX = e.clientX; mouseY = e.clientY;
      if (prevMX > -900) {
        // 홀딩 중에는 브러시 반경을 키워 더 강한 일렁임
        addTrail(prevMX, prevMY, mouseX, mouseY, isHolding ? 15 : 0);
      }
      prevMX = mouseX; prevMY = mouseY;
      if (isHolding) { holdX = mouseX; holdY = mouseY; }
    });
    uiCvs.addEventListener("mouseleave", () => { prevMX = -999; });

    uiCvs.addEventListener("mousedown", e => {
      isHolding = true;
      holdX = e.clientX; holdY = e.clientY;
      mouseX = e.clientX; mouseY = e.clientY;
    });
    uiCvs.addEventListener("mouseup", e => {
      isHolding = false;
      createApple(e.clientX, e.clientY);
    });

    uiCvs.addEventListener("touchstart", e => {
      e.preventDefault(); isHolding = true;
      mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY;
      holdX = mouseX; holdY = mouseY;
      prevMX = mouseX; prevMY = mouseY;
    });
    uiCvs.addEventListener("touchmove", e => {
      const tx = e.touches[0].clientX, ty = e.touches[0].clientY;
      if (prevMX > -900) addTrail(prevMX, prevMY, tx, ty, isHolding ? 15 : 0);
      mouseX = tx; mouseY = ty; prevMX = tx; prevMY = ty;
      holdX = tx; holdY = ty;
    });
    uiCvs.addEventListener("touchend", () => {
      isHolding = false; prevMX = -999;
      createApple(mouseX, mouseY);
    });

    /* ═══════════════════════════════════════
       LOOP
       ═══════════════════════════════════════ */
    function animate() {
      // 홀딩 중에는 제자리에서도 일렁임 지속
      if (isHolding) addStationaryShimmer(holdX, holdY);

      renderPaint();
      updateApples();
      renderShapes();
      ui.clearRect(0, 0, W, H);
      updateText();
      drawText();
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
