<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory Typo Map - Drifting Shapes</title>
    
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    
    <style>
      /* 2. 전체 스타일 정의 */
      body {
        margin: 0; padding: 0; width: 100vw; height: 100vh;
        overflow: hidden; background-color: #ffffff; 
        /* 프리텐다드 우선 적용, Medium(500), 자간 -3% */
        font-family: "Pretendard Variable", "Pretendard", sans-serif;
        font-weight: 500;
        letter-spacing: -0.03em;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      #canvas { position: relative; width: 100%; height: 100%; }

      /* 텍스트 스타일 */
      .floating-text {
        position: absolute; font-size: 11px; color: #000000;
        max-width: 150px; word-break: keep-all; line-height: 1.5;
        user-select: none; transition: all 0.3s ease; z-index: 10; cursor: pointer;
        font-weight: 500;
      }

      .floating-text:hover {
        font-size: 16px; font-weight: 700;
        text-shadow: 0 0 10px rgba(255,255,255,0.5);
      }

      /* 유영하는 도형 스타일 */
      .memory-shape {
        position: absolute; width: 40px; height: 40px;
        background-color: #111111; 
        pointer-events: none; z-index: 5;
        margin-left: -20px; margin-top: -20px;
        opacity: 0;
        transition: left 8s ease-in-out, top 8s ease-in-out, transform 8s ease-in-out, opacity 0.8s ease-out;
      }

      /* 8가지 도형 클립패스 */
      .shape-0 { clip-path: circle(50% at 50% 50%); } 
      .shape-1 { clip-path: inset(5% 10% 5% 10%); } 
      .shape-2 { clip-path: polygon(50% 0%, 0% 100%, 100% 100%); } 
      .shape-3 { clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); } 
      .shape-4 { clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); } 
      .shape-5 { clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); } 
      .shape-6 { clip-path: ellipse(25% 45% at 50% 50%); } 
      .shape-7 { clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%); } 

      /* 기억 형식별 애니메이션 */
      .type-0 { animation: fadeUpFlow 8s infinite ease-in-out; }
      @keyframes fadeUpFlow { 0%, 100% { opacity: 0; transform: translateY(10px); } 50% { opacity: 1; transform: translateY(-10px); } }
      .type-1 { animation: snapAlign 4s infinite step-end; }
      @keyframes snapAlign { 0%, 100% { transform: skewX(-5deg); opacity: 0.7; } 50% { transform: skewX(0deg); opacity: 1; } }
      .type-2 { animation: slowDrift 10s infinite alternate linear; }
      @keyframes slowDrift { 0% { transform: translate(0, 0); } 100% { transform: translate(20px, -10px); } }
      .type-3 { animation: trackNetwork 6s infinite alternate ease-in-out; }
      @keyframes trackNetwork { 0% { letter-spacing: -0.03em; } 100% { letter-spacing: 0.05em; } }
      .type-4 { animation: compressSchema 5s infinite alternate ease-in-out; }
      @keyframes compressSchema { 0% { transform: scaleY(1); opacity: 1; } 100% { transform: scaleY(0.5); opacity: 0.6; } }
      .type-5 { animation: skewImage 8s infinite alternate ease-in-out; }
      @keyframes skewImage { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(30deg) skewX(-5deg); } }
      .type-6 { animation: breathResidual 6s infinite alternate ease-in-out; }
      @keyframes breathResidual { 0% { transform: scale(1); filter: blur(0px); } 100% { transform: scale(1.1); filter: blur(2px); } }
      .type-7 { animation: flashAfterimage 7s infinite; }
      @keyframes flashAfterimage { 0%, 80%, 100% { opacity: 0.1; } 85%, 95% { opacity: 0.9; } }
    </style>
  </head>
  <body>
    <div id="canvas"></div>

    <script>
      // 3. 데이터 연동 설정
      const SPREADSHEET_ID = "1gwxvcHqxgNHOOoS1R_NV8EH7WHNudGd7EhsvWHG76p8";
      const CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv`;
      
      const KEYS = { 
        note: "당사자의 직접 설명", 
        type: "기억 형식" 
      }; 

      // 도형 생성 및 유영 로직
      function createDriftingShape(typeId, startX, startY) {
        const canvas = document.getElementById("canvas");
        const shape = document.createElement("div");
        shape.className = `memory-shape shape-${typeId}`;
        shape.style.left = `${startX}px`;
        shape.style.top = `${startY}px`;
        canvas.appendChild(shape);

        setTimeout(() => { shape.style.opacity = "0.5"; }, 50);

        function drift() {
          if (!shape.parentElement) return;
          const newX = Math.random() * (window.innerWidth - 80) + 40;
          const newY = Math.random() * (window.innerHeight - 80) + 40;
          const newRot = Math.random() * 360;
          shape.style.left = `${newX}px`;
          shape.style.top = `${newY}px`;
          shape.style.transform = `rotate(${newRot}deg)`;
        }
        setTimeout(drift, 100);
        setInterval(drift, 8000);
      }

      // CSV 파싱 함수
      function parseCSV(text) {
        const lines = text.trim().split("\n");
        const headers = splitCSVLine(lines[0]);
        return lines.slice(1).map(line => {
          const values = splitCSVLine(line);
          const obj = {};
          headers.forEach((h, i) => { obj[h.trim()] = (values[i] || "").trim(); });
          return obj;
        });
      }

      function splitCSVLine(line) {
        const result = []; let current = ""; let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (ch === '"') inQuotes = !inQuotes;
          else if (ch === "," && !inQuotes) { result.push(current); current = ""; }
          else current += ch;
        }
        result.push(current); return result;
      }

      // 데이터 호출 및 배치
      fetch(CSV_URL)
        .then(res => {
          if(!res.ok) throw new Error("시트 공유 설정을 확인하세요.");
          return res.text();
        })
        .then(text => {
          const rows = parseCSV(text);
          const canvas = document.getElementById("canvas");
          const typeMap = new Map();
          let typeCounter = 0;

          rows.forEach(row => {
            const noteText = row[KEYS.note];
            const typeName = row[KEYS.type] || "기타";
            if (!noteText) return;

            if (!typeMap.has(typeName)) {
              typeMap.set(typeName, typeCounter % 8);
              typeCounter++;
            }

            const typeId = typeMap.get(typeName);
            const span = document.createElement("div");
            span.className = `floating-text type-${typeId}`;
            span.innerText = noteText;

            // 랜덤 초기 위치 (화면 중앙 부근 위주)
            span.style.top = `${Math.random() * 70 + 15}vh`;
            span.style.left = `${Math.random() * 70 + 15}vw`;

            span.addEventListener("click", (e) => {
              createDriftingShape(typeId, e.pageX, e.pageY);
              span.style.opacity = "0";
              setTimeout(() => span.remove(), 300);
            });

            canvas.appendChild(span);
          });
        })
        .catch(err => console.error("Error:", err));
    </script>
  </body>
</html>
