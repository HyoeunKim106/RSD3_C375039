<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Image Map</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@200;300&display=swap" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden; background: #000;
    }

    .layer {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
    }
    .layer img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    /* background = desaturated / darker version */
    #bg-layer {
      z-index: 1;
      filter: saturate(0.15) brightness(0.45);
    }

    /* reveal = full-color, masked + displaced */
    #reveal-layer {
      z-index: 2;
      -webkit-mask-image: radial-gradient(circle 0px at 50% 50%, black 0%, transparent 100%);
      mask-image: radial-gradient(circle 0px at 50% 50%, black 0%, transparent 100%);
    }

    /* ripple displacement canvas sits between */
    #ripple-canvas {
      position: fixed; inset: 0;
      z-index: 3;
      pointer-events: none;
      mix-blend-mode: normal;
      opacity: 0;
    }

    /* interaction + 3d text canvas on top */
    #text-canvas {
      position: fixed; inset: 0;
      z-index: 4;
      pointer-events: auto;
    }

    .click-hint {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      font-family: 'Noto Serif KR', serif;
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.08em;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="bg-layer" class="layer">
    <img src="./assets/sample2.jpg?v=4" alt="background" />
  </div>
  <div id="reveal-layer" class="layer">
    <img src="./assets/sample1.jpg?v=4" alt="reveal" />
  </div>
  <canvas id="ripple-canvas"></canvas>
  <canvas id="text-canvas"></canvas>

  <div class="click-hint">click &amp; hold</div>

  <script>
    /* ═══════════════════════════════════════════
       1. RIPPLE DISPLACEMENT SYSTEM
       Renders a displacement map on a hidden canvas,
       then applies it via CSS filter on the reveal layer.
       Inspired by immersive-g.com's liquid hover reveal.
       ═══════════════════════════════════════════ */

    const reveal = document.getElementById("reveal-layer");
    const rippleCvs = document.getElementById("ripple-canvas");
    const rippleCtx = rippleCvs.getContext("2d");

    let W, H;
    function resizeAll() {
      W = window.innerWidth;
      H = window.innerHeight;
      rippleCvs.width = Math.floor(W / 4);   // low-res for perf
      rippleCvs.height = Math.floor(H / 4);
      tc.width = W;
      tc.height = H;
    }

    // Ripple simulation buffers (2D heightmap)
    const GRID_SCALE = 4;
    let cols, rows;
    let bufA, bufB; // ping-pong buffers

    function initRipple() {
      cols = Math.floor(W / GRID_SCALE);
      rows = Math.floor(H / GRID_SCALE);
      bufA = new Float32Array(cols * rows);
      bufB = new Float32Array(cols * rows);
    }

    function addRippleDrop(x, y, strength) {
      const gx = Math.floor(x / GRID_SCALE);
      const gy = Math.floor(y / GRID_SCALE);
      const radius = 4;
      for (let dy = -radius; dy <= radius; dy++) {
        for (let dx = -radius; dx <= radius; dx++) {
          const px = gx + dx, py = gy + dy;
          if (px < 0 || px >= cols || py < 0 || py >= rows) continue;
          const d = Math.sqrt(dx*dx + dy*dy);
          if (d < radius) {
            bufA[py * cols + px] += strength * (1 - d / radius);
          }
        }
      }
    }

    // Continuous mouse trail ripple
    function addRippleTrail(x, y) {
      const gx = Math.floor(x / GRID_SCALE);
      const gy = Math.floor(y / GRID_SCALE);
      const radius = 3;
      for (let dy = -radius; dy <= radius; dy++) {
        for (let dx = -radius; dx <= radius; dx++) {
          const px = gx + dx, py = gy + dy;
          if (px < 0 || px >= cols || py < 0 || py >= rows) continue;
          const d = Math.sqrt(dx*dx + dy*dy);
          if (d < radius) {
            bufA[py * cols + px] += 0.6 * (1 - d / radius);
          }
        }
      }
    }

    function stepRipple() {
      const damping = 0.965;
      for (let y = 1; y < rows - 1; y++) {
        for (let x = 1; x < cols - 1; x++) {
          const i = y * cols + x;
          bufB[i] = (
            bufA[(y-1)*cols+x] +
            bufA[(y+1)*cols+x] +
            bufA[y*cols+(x-1)] +
            bufA[y*cols+(x+1)]
          ) / 2 - bufB[i];
          bufB[i] *= damping;
        }
      }
      // swap
      const tmp = bufA;
      bufA = bufB;
      bufB = tmp;
    }

    function drawRippleMap() {
      const w = rippleCvs.width, h = rippleCvs.height;
      const imgData = rippleCtx.createImageData(w, h);
      const data = imgData.data;

      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const bx = Math.min(Math.floor(x * cols / w), cols - 2);
          const by = Math.min(Math.floor(y * rows / h), rows - 2);
          const i = by * cols + bx;

          // Compute gradient (normals) for displacement
          const dx = (bufA[i + 1] - bufA[i]) * 8;
          const dy = (bufA[i + cols] - bufA[i]) * 8;

          const pi = (y * w + x) * 4;
          data[pi]     = Math.max(0, Math.min(255, 128 + dx * 128));
          data[pi + 1] = Math.max(0, Math.min(255, 128 + dy * 128));
          data[pi + 2] = 128;
          data[pi + 3] = 255;
        }
      }
      rippleCtx.putImageData(imgData, 0, 0);
    }


    /* ═══════════════════════════════════════════
       2. REVEAL MASK (radial gradient following cursor)
       ═══════════════════════════════════════════ */

    let targetX = W || 960, targetY = H || 540;
    let currentX = targetX, currentY = targetY;
    let targetR = 0, currentR = 0;
    let mouseInside = false;
    let prevMX = targetX, prevMY = targetY;

    const RADIUS = 380;
    const EASE = 0.08;
    const R_EASE = 0.06;

    // SVG filter for displacement — applied via CSS
    // We'll create an inline SVG filter that references our canvas as displacement map
    // But CSS filter(url) with feImage from canvas is tricky cross-browser.
    // Instead, we'll apply displacement directly by distorting the mask + using CSS backdrop trick.

    // Simpler approach: use the ripple data to modulate the reveal mask with slight offset
    // and render the reveal layer through a feDisplacementMap SVG filter with turbulence + mouse modulation.

    // Let's use a dynamic SVG filter approach:
    const svgNS = "http://www.w3.org/2000/svg";
    const svgEl = document.createElementNS(svgNS, "svg");
    svgEl.setAttribute("width", "0");
    svgEl.setAttribute("height", "0");
    svgEl.style.position = "absolute";
    svgEl.innerHTML = `
      <defs>
        <filter id="ripple-filter" x="-10%" y="-10%" width="120%" height="120%">
          <feTurbulence id="turb" type="fractalNoise" baseFrequency="0.015 0.015" numOctaves="3" seed="2" result="noise"/>
          <feDisplacementMap id="disp" in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
      </defs>
    `;
    document.body.appendChild(svgEl);

    const turbEl = document.getElementById("turb");
    const dispEl = document.getElementById("disp");

    reveal.style.filter = "url(#ripple-filter)";


    /* ═══════════════════════════════════════════
       3. 3D APPLE TEXT (diagonal spirals)
       ═══════════════════════════════════════════ */

    const tc = document.getElementById("text-canvas");
    const ctx = tc.getContext("2d");

    const TEXT = "사과의시각적표상은없지만벡터가포함된완벽한3D모델을가지고있어요";

    let mouseX = 960, mouseY = 540;
    let isHolding = false;
    let holdAlpha = 0;
    let rotY = 0;

    function appleR(t) {
      let r = Math.sin(t * Math.PI);
      r *= 1.0 + 0.3 * Math.pow(Math.sin(t * Math.PI * 0.75), 2);
      if (t < 0.10) r *= 0.15 + 0.85 * (t / 0.10);
      if (t > 0.93) r *= 1.0 - 0.4 * ((t - 0.93) / 0.07);
      r *= 1.0 + 0.08 * Math.exp(-Math.pow((t - 0.35) * 6, 2));
      return r * 82;
    }

    const applePoints = [];
    const NUM_SPIRALS = 10, PTS_PER_SPIRAL = 48;
    let charIdx = 0;

    for (let s = 0; s < NUM_SPIRALS; s++) {
      const uOff = (s / NUM_SPIRALS) * Math.PI * 2;
      for (let i = 0; i < PTS_PER_SPIRAL; i++) {
        const t = i / (PTS_PER_SPIRAL - 1);
        const r = appleR(t);
        const y = (t - 0.5) * 195;
        const u = uOff + t * Math.PI * 2;
        applePoints.push({
          ax: r * Math.cos(u), ay: y, az: r * Math.sin(u),
          char: TEXT[charIdx % TEXT.length], isStem: false, isLeaf: false
        });
        charIdx++;
      }
    }
    // stem
    for (let i = 0; i < 7; i++) {
      const t = i / 6;
      applePoints.push({
        ax: Math.sin(t*0.5)*3, ay: -102 - t*26, az: Math.cos(t*0.3)*2,
        char: "│", isStem: true, isLeaf: false
      });
    }
    // leaf
    for (let i = 0; i < 14; i++) {
      const t = i / 13;
      const along = t * 32, across = Math.sin(t * Math.PI) * 11;
      const ang = -0.55;
      applePoints.push({
        ax: along*Math.cos(ang) - across*Math.sin(ang) + 5,
        ay: -115 + along*Math.sin(ang) - across*Math.cos(ang),
        az: across * 0.3,
        char: "잎", isLeaf: true, isStem: false
      });
    }

    function project(x, y, z, cx, cy, ry) {
      const c = Math.cos(ry), s = Math.sin(ry);
      const rx = x*c - z*s, rz = x*s + z*c;
      const p = 500 / (500 + rz);
      return { x: cx + rx*p, y: cy + y*p, s: p, z: rz };
    }

    function drawApple() {
      const cx = mouseX, cy = mouseY;
      const list = [];
      for (const pt of applePoints) {
        const proj = project(pt.ax, pt.ay, pt.az, cx, cy, rotY);
        list.push({
          x: proj.x, y: proj.y, s: proj.s, z: proj.z,
          facing: proj.z < 50 ? 1.0 : 0.06,
          char: pt.char
        });
      }
      list.sort((a, b) => b.z - a.z);

      for (const d of list) {
        const a = holdAlpha * d.facing;
        if (a < 0.02) continue;
        const size = Math.max(5, 10 * d.s);
        ctx.save();
        ctx.translate(d.x, d.y);
        ctx.font = `300 ${size}px 'Noto Serif KR', serif`;
        ctx.globalAlpha = a;
        ctx.fillStyle = "#000";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(d.char, 0, 0);
        ctx.restore();
      }
    }


    /* ═══════════════════════════════════════════
       4. EVENTS
       ═══════════════════════════════════════════ */

    tc.addEventListener("mousemove", (e) => {
      targetX = e.clientX; targetY = e.clientY;
      mouseX = e.clientX; mouseY = e.clientY;
      if (!mouseInside) { mouseInside = true; targetR = RADIUS; }
      // Add ripple trail on movement
      const vx = e.clientX - prevMX, vy = e.clientY - prevMY;
      const vel = Math.sqrt(vx*vx + vy*vy);
      if (vel > 1.5) {
        addRippleTrail(e.clientX, e.clientY);
      }
      prevMX = e.clientX; prevMY = e.clientY;
    });

    tc.addEventListener("mouseleave", () => {
      mouseInside = false;
      targetR = 0;
    });
    tc.addEventListener("mouseenter", () => {
      mouseInside = true;
      targetR = RADIUS;
    });

    tc.addEventListener("mousedown", () => { isHolding = true; });
    tc.addEventListener("mouseup", () => { isHolding = false; });

    tc.addEventListener("touchstart", (e) => {
      e.preventDefault(); isHolding = true;
      mouseInside = true;
      mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY;
      targetX = mouseX; targetY = mouseY; targetR = RADIUS;
    });
    tc.addEventListener("touchmove", (e) => {
      mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY;
      targetX = mouseX; targetY = mouseY;
      addRippleTrail(mouseX, mouseY);
    });
    tc.addEventListener("touchend", () => {
      isHolding = false;
      mouseInside = false;
      targetR = 0;
    });


    /* ═══════════════════════════════════════════
       5. ANIMATION LOOP
       ═══════════════════════════════════════════ */

    let time = 0;
    let currentDispScale = 0;

    resizeAll();
    initRipple();
    window.addEventListener("resize", () => { resizeAll(); initRipple(); });

    // Seed initial values
    currentX = targetX = W/2;
    currentY = targetY = H/2;
    mouseX = W/2; mouseY = H/2;
    prevMX = W/2; prevMY = H/2;

    function animate() {
      time += 0.016;

      // ── Smooth cursor follow ──
      currentX += (targetX - currentX) * EASE;
      currentY += (targetY - currentY) * EASE;
      currentR += (targetR - currentR) * R_EASE;

      // ── Velocity for displacement intensity ──
      const vx = targetX - prevMX;
      const vy = targetY - prevMY;
      const velocity = Math.sqrt(vx*vx + vy*vy);

      // ── Reveal mask ──
      // Multi-stop gradient for a softer, more organic reveal edge
      reveal.style.webkitMaskImage = reveal.style.maskImage =
        `radial-gradient(circle ${currentR}px at ${currentX}px ${currentY}px,
          rgba(0,0,0,1) 0%,
          rgba(0,0,0,0.85) 30%,
          rgba(0,0,0,0.5) 55%,
          rgba(0,0,0,0.2) 75%,
          rgba(0,0,0,0) 100%)`;

      // ── Ripple simulation step ──
      stepRipple();
      stepRipple(); // double step for speed

      // ── Displacement filter: animate turbulence + scale ──
      // Turbulence base frequency oscillates slightly for organic feel
      const bfX = 0.012 + Math.sin(time * 0.7) * 0.003;
      const bfY = 0.014 + Math.cos(time * 0.5) * 0.004;
      turbEl.setAttribute("baseFrequency", `${bfX.toFixed(4)} ${bfY.toFixed(4)}`);

      // Displacement scale ramps with cursor presence + velocity
      const targetDisp = mouseInside ? (18 + Math.min(velocity * 1.8, 45)) : 0;
      currentDispScale += (targetDisp - currentDispScale) * 0.08;
      dispEl.setAttribute("scale", currentDispScale.toFixed(1));

      // Animate turbulence seed slowly for continuous movement
      turbEl.setAttribute("seed", Math.floor(time * 1.5) % 100);

      // ── Text canvas ──
      ctx.clearRect(0, 0, W, H);

      if (isHolding) holdAlpha = Math.min(1, holdAlpha + 0.03);
      else holdAlpha = Math.max(0, holdAlpha - 0.02);

      rotY += 0.012;

      if (holdAlpha > 0.01) drawApple();

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
